# BayouLex API reverse proxy for Cloudflare Tunnel -> NGINX -> API container.
# Put the limit_req_zone lines in the nginx http{} context if your include path
# only permits server{} blocks.

limit_req_zone $binary_remote_addr zone=bayoulex_api:10m rate=90r/m;
limit_req_zone $binary_remote_addr zone=bayoulex_offline:10m rate=32r/h;

server {
    listen 80;
    server_name api.ladf.us;

    client_max_body_size 1m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /bayoulex/v1/offline/ {
        limit_req zone=bayoulex_offline burst=4 nodelay;
        proxy_pass http://bayoulex-api:8080;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }

    location /bayoulex/v1/ {
        limit_req zone=bayoulex_api burst=30 nodelay;
        proxy_pass http://bayoulex-api:8080;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
    }

    location /healthz {
        proxy_pass http://bayoulex-api:8080;
    }
}
