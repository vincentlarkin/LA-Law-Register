<h1>RS 1:4 - Unambiguous wording not to be disregarded</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=74091">https://www.legis.la.gov/legis/Law.aspx?d=74091</a></div>
<p align="justify" class="A0001">§4.  Unambiguous wording not to be disregarded </p>
<p align="justify" class="A0002">When the wording of a Section is clear and free of ambiguity, the letter of it shall not be disregarded under the pretext of pursuing its spirit. </p>
<p align="justify" class="A0003"><br/></p>
