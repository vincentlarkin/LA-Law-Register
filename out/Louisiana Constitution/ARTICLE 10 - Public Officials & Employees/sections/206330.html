<h1>CONST 10 44 - Director</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=206330">https://www.legis.la.gov/legis/Law.aspx?d=206330</a></div>
<p align="justify" class="A0001">§44.  Director </p>
<p align="justify" class="A0002">Section 44.  The commission shall appoint a director and such personnel as shall be necessary to carry out its duties.</p>
<p align="justify" class="A0002">Added by Acts 1990, No. 1106, §1, approved Oct. 6, 1990, eff. Jan. 1, 1991.</p>
