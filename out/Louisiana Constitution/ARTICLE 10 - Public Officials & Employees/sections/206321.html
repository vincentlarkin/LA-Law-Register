<h1>CONST 10 28 - Definition of Vacancy</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=206321">https://www.legis.la.gov/legis/Law.aspx?d=206321</a></div>
<p align="justify" class="A0001">§28.  Definition of Vacancy </p>
<p align="justify" class="A0002">Section 28.  A vacancy, as used in this Constitution, shall occur in the event of death, resignation, removal by any means, or failure to take office for any reason.  </p>
