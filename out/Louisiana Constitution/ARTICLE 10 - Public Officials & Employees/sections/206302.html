<h1>CONST 10 11 - Penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=206302">https://www.legis.la.gov/legis/Law.aspx?d=206302</a></div>
<p align="justify" class="A0001">§11.  Penalties </p>
<p align="justify" class="A0002">Section 11.  Willful violation of any provision of this Part shall be a misdemeanor punishable by a fine of not more than five hundred dollars or by imprisonment for not more than six months, or both.  </p>
