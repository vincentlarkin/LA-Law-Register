<h1>CONST 14 21 - References to 1921 Constitution</h1>

<p align="center" class="A0001">PART III</p>
<p align="justify" class="A0002">§21.  References to 1921 Constitution </p>
<p align="justify" class="A0003">Section 21.  Whenever reference is made in this constitution to the Constitution of 1921, it shall mean the Louisiana Constitution of 1921, as amended.  </p>
