<p align="center" class="A0001">ARTICLE XI.  ELECTIONS</p>
<p align="justify" class="A0002">§1.  Election Code </p>
<p align="justify" class="A0003">Section 1.  The legislature shall adopt an election code which shall provide for permanent registration of voters and for the conduct of all elections.  </p>
