<h1>CONST 1 14 - Right to Preliminary Examination</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=206279">https://www.legis.la.gov/legis/Law.aspx?d=206279</a></div>
<p align="justify" class="A0001">§14.  Right to Preliminary Examination </p>
<p align="justify" class="A0002">Section 14.  The right to a preliminary examination shall not be denied in felony cases except when the accused is indicted by a grand jury.</p>
