<p align="center" class="A0001">ARTICLE V.  JUDICIAL BRANCH </p>
<p align="justify" class="A0002">§1.  Judicial Power </p>
<p align="justify" class="A0003">Section 1.  The judicial power is vested in a supreme court, courts of appeal, district courts, and other courts authorized by this Article.  </p>
