<h1>CONST 12 13 - Prescription Against State</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=206352">https://www.legis.la.gov/legis/Law.aspx?d=206352</a></div>
<p align="justify" class="A0001">§13.  Prescription Against State </p>
<p align="justify" class="A0002">Section 13.  Prescription shall not run against the state in any civil matter, unless otherwise provided in this constitution or expressly by law. </p>
