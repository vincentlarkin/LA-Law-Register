<h1>CONST 12 3 - Right to Direct Participation</h1>

<p align="justify" class="A0001">§3.  Right to Direct Participation </p>
<p align="justify" class="A0002">Section 3.  No person shall be denied the right to observe the deliberations of public bodies and examine public documents, except in cases established by law.  </p>
