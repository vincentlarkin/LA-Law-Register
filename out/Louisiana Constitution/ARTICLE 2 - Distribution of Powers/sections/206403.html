<p align="center" class="A0001">ARTICLE II.  DISTRIBUTION OF POWERS </p>
<p align="justify" class="A0002">§1.  Three Branches </p>
<p align="justify" class="A0003">Section 1.  The powers of government of the state are divided into three separate branches: legislative, executive, and judicial.  </p>
