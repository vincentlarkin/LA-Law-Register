<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=180410">https://www.legis.la.gov/legis/Law.aspx?d=180410</a></div>
<p class="A0001">Rule 13.2.  Chairman and vice chairman </p>
<p class="A0002">The President shall appoint one member of each standing committee as chairman and one member as vice chairman.  He may remove any member so appointed from such office. </p>
