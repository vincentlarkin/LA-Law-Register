<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=180356">https://www.legis.la.gov/legis/Law.aspx?d=180356</a></div>
<p class="A0001">Rule 10.11. Committee report required </p>
<p class="A0002">No bill or joint resolution shall be engrossed and passed to third reading unless a committee has held a public hearing thereon and has reported thereon. </p>
