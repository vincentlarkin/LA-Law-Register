<h1>SRULE 13.6 - Meeting while Senate is in session</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=180427">https://www.legis.la.gov/legis/Law.aspx?d=180427</a></div>
<p class="A0001">Rule 13.6.  Meeting while Senate is in session </p>
<p class="A0002">No committee of the Senate shall meet during the time the Senate is in session, unless the Senate has granted leave for the committee to do so. </p>
