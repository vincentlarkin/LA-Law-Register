<h1>CHC 1260 - Appellate jurisdiction</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72735">https://www.legis.la.gov/legis/Law.aspx?d=72735</a></div>
<p align="justify" class="A0001">Art. 1260.  Appellate jurisdiction</p>
<p align="justify" class="A0002">All appeals from any judgment rendered in accordance with this Title shall be to the proper court of appeal on both law and fact.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §12, eff. Jan. 1, 1992.</p>
