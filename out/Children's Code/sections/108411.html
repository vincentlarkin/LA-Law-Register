<h1>CHC 402 - Court of record</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108411">https://www.legis.la.gov/legis/Law.aspx?d=108411</a></div>
<p align="center" class="A0001">CHAPTER 2.  SCHEDULING AND CONDUCT OF CASES</p>
<p align="justify" class="A0002">Art. 402.  Court of record</p>
<p align="justify" class="A0003">A court exercising juvenile jurisdiction is a court of record.</p>
<p align="justify" class="A0003">Acts 1991, No. 235, §4, eff. Jan. 1, 1992.</p>
