<p align="justify" class="A0001">Art. 1546.  Venue</p>
<p align="justify" class="A0002">A proceeding brought pursuant to this Chapter may be commenced in the parish in which the minor resides or the marriage ceremony is to be performed.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §15, eff. Jan. 1, 1992.</p>
