<p align="justify" class="A0001">Art. 1278.  Rules and regulations</p>
<p align="justify" class="A0002">The department shall adopt such reasonable rules and regulations as are necessary to implement the provisions of this Chapter.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §12, eff. Jan. 1, 1992.</p>
