<h1>CHC 107 - Mandatory and permissive language</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72580">https://www.legis.la.gov/legis/Law.aspx?d=72580</a></div>
<p align="justify" class="A0001">Art. 107.  Mandatory and permissive language</p>
<p align="justify" class="A0002">The word "shall" is mandatory, and the word "may" is permissive.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §1, eff. Jan. 1, 1992.</p>
