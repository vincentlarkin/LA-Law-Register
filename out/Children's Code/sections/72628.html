<h1>CHC 1140 - Continuing jurisdiction</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72628">https://www.legis.la.gov/legis/Law.aspx?d=72628</a></div>
<p align="justify" class="A0001">Art. 1140.  Continuing jurisdiction</p>
<p align="justify" class="A0002">The court rendering an order pursuant to this Chapter shall have exclusive, original jurisdiction to modify that order.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §11, eff. Jan. 1, 1992.</p>
