<h1>CHC 660 - Order of adjudication hearing</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=73254">https://www.legis.la.gov/legis/Law.aspx?d=73254</a></div>
<p align="justify" class="A0001">Art. 660.  Order of adjudication hearing</p>
<p align="justify" class="A0002">The court shall determine the order of the presentation of evidence at an adjudication hearing.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §6, eff. Jan. 1, 1992.</p>
