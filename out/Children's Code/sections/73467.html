<h1>CHC 876 - Dismissal of petition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=73467">https://www.legis.la.gov/legis/Law.aspx?d=73467</a></div>
<p align="justify" class="A0001">Art. 876.  Dismissal of petition</p>
<p align="justify" class="A0002">The court shall dismiss a petition on the motion of the district attorney.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §8, eff. Jan. 1, 1992; Acts 2011, No. 172, §1.</p>
