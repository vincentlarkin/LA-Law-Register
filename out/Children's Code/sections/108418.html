<h1>CHC 410 - Recording of proceedings</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108418">https://www.legis.la.gov/legis/Law.aspx?d=108418</a></div>
<p align="justify" class="A0001">Art. 410.  Recording of proceedings</p>
<p align="justify" class="A0002">Juvenile proceedings, except in cases of traffic violations pursuant to Title IX, shall be recorded.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §4, eff. Jan. 1, 1992.</p>
