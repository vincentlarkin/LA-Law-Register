<h1>CHC 1413 - Time for hearing</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72909">https://www.legis.la.gov/legis/Law.aspx?d=72909</a></div>
<p align="justify" class="A0001">Art. 1413.  Time for hearing</p>
<p align="justify" class="A0002">The hearing shall be held within five days of the filing of the petition.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §14, eff. Jan. 1, 1992; Acts 1997, No. 612, §3.</p>
