<h1>CHC 1529 - Procedure</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72997">https://www.legis.la.gov/legis/Law.aspx?d=72997</a></div>
<p align="justify" class="A0001">Art. 1529.  Procedure</p>
<p align="justify" class="A0002">Proceedings pursuant to this Chapter shall be conducted in accordance with the Louisiana Code of Criminal Procedure.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §15, eff. Jan. 1, 1992.</p>
