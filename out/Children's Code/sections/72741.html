<h1>CHC 1266 - Hearing</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72741">https://www.legis.la.gov/legis/Law.aspx?d=72741</a></div>
<p align="justify" class="A0001">Art. 1266.  Hearing</p>
<p align="justify" class="A0002">The motion for limited visitation rights shall be set for hearing contradictorily with the adoptive parents.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §12, eff. Jan. 1, 1992.</p>
