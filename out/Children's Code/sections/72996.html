<h1>CHC 1528 - Method of instituting prosecution</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72996">https://www.legis.la.gov/legis/Law.aspx?d=72996</a></div>
<p align="justify" class="A0001">Art. 1528.  Method of instituting prosecution</p>
<p align="justify" class="A0002">Criminal prosecutions in a juvenile court shall be instituted by affidavit, information, or indictment.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §15, eff. Jan. 1, 1992.</p>
