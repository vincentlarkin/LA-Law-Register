<h1>CHC 1544 - Definitions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=73002">https://www.legis.la.gov/legis/Law.aspx?d=73002</a></div>
<p align="justify" class="A0001">Art. 1544.  Definitions</p>
<p align="justify" class="A0002"> Except when the context clearly indicates otherwise, as used in this Chapter, "officiant" is a person authorized by law to perform marriage ceremonies.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §15, eff. Jan. 1, 1992.</p>
