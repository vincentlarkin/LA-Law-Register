<p align="justify" class="A0001">Art. 872.  Motion to suppress</p>
<p align="justify" class="A0002">The child may move to suppress evidence obtained in violation of the Constitution of the United States or the Constitution of Louisiana.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §8, eff. Jan. 1, 1992.</p>
