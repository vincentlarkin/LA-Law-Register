<h1>CHC 882 - Adjudication by the court</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=73473">https://www.legis.la.gov/legis/Law.aspx?d=73473</a></div>
<p align="justify" class="A0001">Art. 882.  Adjudication by the court</p>
<p align="justify" class="A0002">The adjudication hearing shall be held before the court without a jury.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §8, eff. Jan. 1, 1992.</p>
