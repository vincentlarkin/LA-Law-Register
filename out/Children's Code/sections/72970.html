<h1>CHC 1503 - Purpose</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72970">https://www.legis.la.gov/legis/Law.aspx?d=72970</a></div>
<p align="center" class="A0001">CHAPTER 2.  CONTEMPT</p>
<p align="justify" class="A0002">Art. 1503.  Purpose</p>
<p align="justify" class="A0003">The purpose of this Chapter is to provide procedures for allowing each juvenile court to enforce its orders and maintain proper court decorum.</p>
<p align="justify" class="A0003">Acts 1991, No. 235, §15, eff. Jan. 1, 1992.</p>
