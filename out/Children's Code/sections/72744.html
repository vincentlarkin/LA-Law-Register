<h1>CHC 1269 - Order</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72744">https://www.legis.la.gov/legis/Law.aspx?d=72744</a></div>
<p align="justify" class="A0001">Art. 1269.  Order</p>
<p align="justify" class="A0002">The court may issue any limited visitation order that is consistent with the findings of the court and the best interests of the child.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §12, eff. Jan. 1, 1992.</p>
