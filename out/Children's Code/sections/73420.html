<h1>CHC 829 - Cancellation of bail bond</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=73420">https://www.legis.la.gov/legis/Law.aspx?d=73420</a></div>
<p align="justify" class="A0001">Art. 829.  Cancellation of bail bond</p>
<p align="justify" class="A0002">The court shall order the bail bond cancelled or other security released when there is no further liability thereon.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §8, eff. Jan. 1, 1992.</p>
