<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=859180">https://www.legis.la.gov/legis/Law.aspx?d=859180</a></div>
<p align="justify" class="A0001">Art. 1284.4.  Effect of final decree</p>
<p align="justify" class="A0002">The final decree of adoption shall have the same force and effect as any final decree of adoption rendered by a court of this state.</p>
<p align="justify" class="A0002">Acts 2013, No. 86, §1.</p>
