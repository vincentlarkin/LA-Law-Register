<h1>CHC 1262 - Grounds</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72737">https://www.legis.la.gov/legis/Law.aspx?d=72737</a></div>
<p align="center" class="A0001">CHAPTER 13.  ANNULMENT OF FINAL DECREES</p>
<p align="justify" class="A0002">Art. 1262.  Grounds</p>
<p align="justify" class="A0003">No action to annul a final decree of adoption of any type may be brought except on the grounds of fraud or duress.</p>
<p align="justify" class="A0003">Acts 1991, No. 235, §12, eff. Jan. 1, 1992.</p>
