<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72939">https://www.legis.la.gov/legis/Law.aspx?d=72939</a></div>
<p align="justify" class="A0001">Art. 1443.  Hearing; priority</p>
<p align="justify" class="A0002">On the day appointed, the hearing shall take precedence over all other matters, except pending cases of the same type.</p>
<p align="justify" class="A0002">Acts 1991, No. 235, §14, eff. Jan. 1, 1992.</p>
