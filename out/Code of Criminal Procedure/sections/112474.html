<h1>CCRP 352 - Venue</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112474">https://www.legis.la.gov/legis/Law.aspx?d=112474</a></div>
<p align="justify" class="A0001">Art. 352.  Venue </p>
<p align="justify" class="A0002">Habeas corpus proceedings by or on behalf of a person in custody shall be instituted in the parish in which the person is in custody.</p>
<p align="justify" class="A0002">Amended by Acts 1980, No. 429, §2, eff. Jan. 1, 1981.</p>
