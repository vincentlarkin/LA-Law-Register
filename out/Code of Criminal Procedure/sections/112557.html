<h1>CCRP 472 - General intent</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112557">https://www.legis.la.gov/legis/Law.aspx?d=112557</a></div>
<p align="justify" class="A0001">Art. 472.  General intent </p>
<p align="justify" class="A0002">In offenses requiring only a general criminal intent, the indictment need not allege that the act was intentionally done.</p>
