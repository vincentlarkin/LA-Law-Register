<h1>CCRP 925 - Venue</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112935">https://www.legis.la.gov/legis/Law.aspx?d=112935</a></div>
<p align="justify" class="A0001">Art. 925.  Venue </p>
<p align="justify" class="A0002">Applications for post conviction relief shall be filed in the parish in which the petitioner was convicted.</p>
<p align="justify" class="A0002">Added by Acts 1980, No. 429, §1, eff. Jan. 1, 1981.</p>
