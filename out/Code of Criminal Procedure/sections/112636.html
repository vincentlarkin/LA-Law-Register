<h1>CCRP 593 - Method of pleading</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112636">https://www.legis.la.gov/legis/Law.aspx?d=112636</a></div>
<p align="justify" class="A0001">Art. 593.  Method of pleading </p>
<p align="justify" class="A0002">Double jeopardy shall be raised by a written motion setting forth the name of the court, the proceeding in which the defendant was in jeopardy, and the facts constituting double jeopardy.</p>
