<h1>CCRP 495 - Objections to misjoinder</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112582">https://www.legis.la.gov/legis/Law.aspx?d=112582</a></div>
<p align="justify" class="A0001">Art. 495.  Objections to misjoinder </p>
<p align="justify" class="A0002">The objections of misjoinder of defendants or misjoinder of offenses may be urged only by a motion to quash the indictment.</p>
<p align="justify" class="A0002">Amended by Acts 1975, No. 528, §2.</p>
