<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112366">https://www.legis.la.gov/legis/Law.aspx?d=112366</a></div>
<p align="justify" class="A0001">Art. 216.  Time and place of making arrest </p>
<p align="justify" class="A0002">An arrest may be made on any day and at any time of the day or night, and at any place.</p>
