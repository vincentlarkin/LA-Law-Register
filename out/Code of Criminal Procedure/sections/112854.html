<h1>CCRP 879 - Determinate sentence required</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112854">https://www.legis.la.gov/legis/Law.aspx?d=112854</a></div>
<p align="justify" class="A0001">Art. 879.  Determinate sentence required </p>
<p align="justify" class="A0002">If a defendant who has been convicted of an offense is sentenced to imprisonment, the court shall impose a determinate sentence.</p>
