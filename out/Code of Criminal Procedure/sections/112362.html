<h1>CCRP 214 - Arrest by private person; when lawful</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112362">https://www.legis.la.gov/legis/Law.aspx?d=112362</a></div>
<p align="justify" class="A0001">Art. 214.  Arrest by private person; when lawful </p>
<p align="justify" class="A0002">A private person may make an arrest when the person arrested has committed a felony, whether in or out of his presence.</p>
