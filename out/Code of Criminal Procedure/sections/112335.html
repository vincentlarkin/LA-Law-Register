<h1>CCRP 164 - Means and force in executing warrant</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112335">https://www.legis.la.gov/legis/Law.aspx?d=112335</a></div>
<p align="justify" class="A0001">Art. 164.  Means and force in executing warrant</p>
<p align="justify" class="A0002">In order to execute a search warrant a peace officer may use such means and force as are authorized for arrest by Title V.*</p>
<p align="justify" class="A0002">*C.Cr.P. Art. 201 et seq.</p>
