<h1>CCRP 878 - Cruel or unusual punishment</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112853">https://www.legis.la.gov/legis/Law.aspx?d=112853</a></div>
<p align="justify" class="A0001">Art. 878.  Cruel or unusual punishment </p>
<p align="justify" class="A0002">A sentence shall not be set aside on the ground that it inflicts cruel or unusual punishment unless the statute under which it is imposed is found unconstitutional.</p>
