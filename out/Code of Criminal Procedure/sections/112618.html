<h1>CCRP 560 - Change of plea of not guilty to guilty</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112618">https://www.legis.la.gov/legis/Law.aspx?d=112618</a></div>
<p align="justify" class="A0001">Art. 560.  Change of plea of not guilty to guilty </p>
<p align="justify" class="A0002">A defendant may at any time withdraw a plea of not guilty and plead guilty, subject to the limitations stated in Articles 556 through 559.</p>
