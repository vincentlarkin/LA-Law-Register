<h1>CCRP 19 - Special sessions of court</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112341">https://www.legis.la.gov/legis/Law.aspx?d=112341</a></div>
<p align="justify" class="A0001">Art. 19.  Special sessions of court </p>
<p align="justify" class="A0002">A court may call a special criminal session at any time, including vacation, and any criminal proceeding or prosecution may be tried or heard during the special session.</p>
