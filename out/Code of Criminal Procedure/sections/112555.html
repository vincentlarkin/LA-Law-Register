<h1>CCRP 470 - Value, price, or damage</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112555">https://www.legis.la.gov/legis/Law.aspx?d=112555</a></div>
<p align="justify" class="A0001">Art. 470.  Value, price, or damage </p>
<p align="justify" class="A0002">Value, price, or amount of damage need not be alleged in the indictment, unless such allegation is essential to charge or determine the grade of the offense.</p>
