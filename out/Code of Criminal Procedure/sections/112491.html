<h1>CCRP 369 - Appeal not permitted</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112491">https://www.legis.la.gov/legis/Law.aspx?d=112491</a></div>
<p align="justify" class="A0001">Art. 369.  Appeal not permitted </p>
<p align="justify" class="A0002">There shall be no appeal from a judgment granting or refusing to grant release upon a petition for a writ of habeas corpus.</p>
