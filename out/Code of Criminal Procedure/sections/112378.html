<h1>CCRP 226 - Duty of private person after making arrest</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112378">https://www.legis.la.gov/legis/Law.aspx?d=112378</a></div>
<p align="justify" class="A0001">Art. 226.  Duty of private person after making arrest </p>
<p align="justify" class="A0002">A private person who has made an arrest shall immediately turn the prisoner and all effects removed from him over to a peace officer.</p>
