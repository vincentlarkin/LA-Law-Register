<h1>CCRP 363 - Effect of appeal</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112485">https://www.legis.la.gov/legis/Law.aspx?d=112485</a></div>
<p align="justify" class="A0001">Art. 363.  Effect of appeal </p>
<p align="justify" class="A0002">The writ of habeas corpus shall not be granted to a convicted person for a cause under Article 362, if he may appeal, or has done so and the appeal is pending.</p>
