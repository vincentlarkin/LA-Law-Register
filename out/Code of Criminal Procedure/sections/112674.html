<h1>CCRP 652 - Burden of proof</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112674">https://www.legis.la.gov/legis/Law.aspx?d=112674</a></div>
<p align="justify" class="A0001">Art. 652.  Burden of proof </p>
<p align="justify" class="A0002">The defendant has the burden of establishing the defense of insanity at the time of the offense by a preponderance of the evidence.</p>
