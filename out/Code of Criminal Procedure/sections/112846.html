<h1>CCRP 872 - Basis for valid sentence</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112846">https://www.legis.la.gov/legis/Law.aspx?d=112846</a></div>
<p align="justify" class="A0001">Art. 872.  Basis for valid sentence </p>
<p align="justify" class="A0002">A valid sentence must rest upon a valid and sufficient: </p>
<p align="justify" class="A0002">(1)  Statute; </p>
<p align="justify" class="A0002">(2)  Indictment; and </p>
<p align="justify" class="A0002">(3)  Verdict, judgment, or plea of guilty.</p>
