<p align="justify" class="A0001">Art. 713.  Peremptory grounds </p>
<p align="justify" class="A0002">A motion for a continuance based upon peremptory grounds as provided by law shall be granted.</p>
<p align="justify" class="A0002">Amended by Acts 1982, No. 734, §1, eff. Jan. 1, 1983.</p>
