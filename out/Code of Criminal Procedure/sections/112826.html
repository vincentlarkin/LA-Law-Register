<h1>CCRP 836 - Presence of corporation or association</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112826">https://www.legis.la.gov/legis/Law.aspx?d=112826</a></div>
<p align="justify" class="A0001">Art. 836.  Presence of corporation or association </p>
<p align="justify" class="A0002">When a corporation, partnership, or other association is a defendant, the requirements of this Title are fulfilled if its counsel is present.</p>
