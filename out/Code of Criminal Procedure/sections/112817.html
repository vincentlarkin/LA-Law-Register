<h1>CCRP 819 - Separate verdict for each count</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112817">https://www.legis.la.gov/legis/Law.aspx?d=112817</a></div>
<p align="justify" class="A0001">Art. 819.  Separate verdict for each count </p>
<p align="justify" class="A0002">If there is more than one count in an indictment, the jury must find a verdict as to each count, unless it cannot agree on a verdict as to a count.</p>
