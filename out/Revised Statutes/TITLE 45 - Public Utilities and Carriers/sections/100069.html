<h1>RS 45:691 - Fenders, requirement</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=100069">https://www.legis.la.gov/legis/Law.aspx?d=100069</a></div>
<p align="center" class="A0001">PART II.  CARS AND EQUIPMENT</p>
<p align="justify" class="A0002">§691.  Fenders, requirement</p>
<p align="justify" class="A0003">Any person operating any line of street or interurban railroad shall equip the front end of all motor cars with fenders for the protection of life and limb. </p>
