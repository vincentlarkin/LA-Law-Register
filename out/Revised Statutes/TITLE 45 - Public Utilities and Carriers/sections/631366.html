<p align="center" class="A0001">CHAPTER 10-A.  CONSUMER CHOICE FOR TELEVISION ACT</p>
<p align="justify" class="A0002">§1361.  Short title</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the "Consumer Choice for Television Act."</p>
