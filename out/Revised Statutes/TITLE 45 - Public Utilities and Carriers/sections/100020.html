<h1>RS 45:4 - Principal and surety bound in solido</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=100020">https://www.legis.la.gov/legis/Law.aspx?d=100020</a></div>
<p align="justify" class="A0001">§4.  Principal and surety bound in solido</p>
<p align="justify" class="A0002">The bond required by R.S. 45:2 shall provide that the principal and the surety are bound in solido for the amount thereof. </p>
