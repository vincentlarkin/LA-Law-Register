<p align="justify" class="A0001">§851.  Meters and deposits; penalty</p>
<p align="justify" class="A0002">Whoever violates R.S. 45:845 through 45:850 shall be fined not less than twenty-five dollars and not more than two hundred dollars for each offense. </p>
