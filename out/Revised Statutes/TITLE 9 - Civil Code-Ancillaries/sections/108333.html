<h1>RS 9:754 - Transfer by gift</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108333">https://www.legis.la.gov/legis/Law.aspx?d=108333</a></div>
<p align="justify" class="A0001">§754.  Transfer by gift </p>
<p align="justify" class="A0002">A person may make a transfer by irrevocable gift to a custodian for the benefit of a minor pursuant to R.S. 9:759.  </p>
<p align="justify" class="A0002">Acts 1987, No. 469, §1, eff. Jan. 1, 1988.  </p>
