<h1>RS 9:372.1 - Injunction against harassment</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=181249">https://www.legis.la.gov/legis/Law.aspx?d=181249</a></div>
<p align="justify" class="A0001">§372.1.  Injunction against harassment</p>
<p align="justify" class="A0002">In a proceeding for divorce, a court may grant an injunction prohibiting a spouse from harassing the other spouse.</p>
<p align="justify" class="A0002">Acts 2003, No. 750, §3.</p>
