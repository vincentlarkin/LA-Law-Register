<p align="justify" class="A0001">§465.  Adult adoption; change of name</p>
<p align="justify" class="A0002">The name of the adopted person may be changed in the act of adult adoption.</p>
<p align="justify" class="A0002">Acts 2008, No. 351, §3, eff. Jan. 1, 2009.</p>
