<h1>RS 9:297 - Decisionmaking in interest of family</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=285186">https://www.legis.la.gov/legis/Law.aspx?d=285186</a></div>
<p align="justify" class="A0001">§297.  Decisionmaking in interest of family</p>
<p align="justify" class="A0002">Spouses by mutual consent after collaboration shall make decisions relating to family life in the best interest of the family.</p>
<p align="justify" class="A0002">Acts 2004, No. 490, §1.</p>
