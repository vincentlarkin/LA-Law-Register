<h1>RS 9:369 - Limitations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=107789">https://www.legis.la.gov/legis/Law.aspx?d=107789</a></div>
<p align="justify" class="A0001">§369.  Limitations </p>
<p align="justify" class="A0002">No public funds allocated to programs which provide services to victims of domestic violence shall be used to provide services to the perpetrator of domestic violence.  </p>
<p align="justify" class="A0002">Acts 1992, No. 1091, §1.  </p>
