<h1>RS 28:754 - Council officers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=85281">https://www.legis.la.gov/legis/Law.aspx?d=85281</a></div>
<p align="justify" class="A0001">§754.  Council officers </p>
<p align="justify" class="A0002">The officers of the council shall be the chairperson and vice-chairperson and shall be elected by the council in accordance with the bylaws.  </p>
<p align="justify" class="A0002">Added by Acts 1982, No. 528, §1.  </p>
