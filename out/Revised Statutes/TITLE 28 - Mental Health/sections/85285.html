<p align="justify" class="A0001">§758.  Regulations </p>
<p align="justify" class="A0002">The council may adopt regulations in fulfillment of its responsibilities in accordance with Chapter 13 of Title 49 of the Louisiana Revised Statutes of 1950.  </p>
<p align="justify" class="A0002">Added by Acts 1982, No. 528, §1.  </p>
