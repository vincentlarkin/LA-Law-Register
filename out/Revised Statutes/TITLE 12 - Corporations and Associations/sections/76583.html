<h1>RS 12:499.7 - Power to make, amend, or repeal by-laws</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76583">https://www.legis.la.gov/legis/Law.aspx?d=76583</a></div>
<p align="justify" class="A0001">§499.7.  Power to make, amend, or repeal by-laws </p>
<p align="justify" class="A0002">The power to make, amend, or repeal by-laws shall be reserved to the stockholders.  </p>
<p align="justify" class="A0002">Acts 1990, No. 857, §1.  </p>
