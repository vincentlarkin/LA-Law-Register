<p align="justify" class="A0001">§912.  Merger and consolidation </p>
<p align="justify" class="A0002">Professional medical corporations may be merged into or consolidated only with other professional medical corporations.  </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 27, §1.  </p>
