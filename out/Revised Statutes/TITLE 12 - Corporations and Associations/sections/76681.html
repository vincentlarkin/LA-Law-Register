<p align="justify" class="A0001">§970.  Fiscal year </p>
<p align="justify" class="A0002">Corporations organized under this Chapter shall adopt the calendar year as their fiscal year.  </p>
<p align="justify" class="A0002">Acts 1969, No. 49, §20.  </p>
