<p align="justify" class="A0001">§202.  Incorporation </p>
<p align="justify" class="A0002">One or more natural or artificial persons capable of contracting may form a nonprofit corporation under this Chapter.  </p>
<p align="justify" class="A0002">Acts 1968, No. 105, §1.  </p>
