<h1>RS 12:1176 - Directors</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76223">https://www.legis.la.gov/legis/Law.aspx?d=76223</a></div>
<p align="justify" class="A0001">§1176.  Directors </p>
<p align="justify" class="A0002">The numbers and qualifications of directors shall be determined by a majority vote of the shareholders.  </p>
<p align="justify" class="A0002">Added by Acts 1983, No. 465, §1, eff. July 6, 1983.  </p>
