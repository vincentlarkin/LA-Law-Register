<p align="justify" class="A0001">§1082.  Merger and consolidation </p>
<p align="justify" class="A0002">Professional nursing corporations may be merged into or consolidated only with other professional nursing corporations.  </p>
<p align="justify" class="A0002">Added by Acts 1977, No. 730, §1.  </p>
