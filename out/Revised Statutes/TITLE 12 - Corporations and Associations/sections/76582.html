<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76582">https://www.legis.la.gov/legis/Law.aspx?d=76582</a></div>
<p align="justify" class="A0001">§499.6.  Name </p>
<p align="justify" class="A0002">The name of each cooperative housing corporation shall comply with the provisions of Chapter 2 of this Title, and in addition, shall contain the word "cooperative".  </p>
<p align="justify" class="A0002">Acts 1990, No. 857, §1.  </p>
