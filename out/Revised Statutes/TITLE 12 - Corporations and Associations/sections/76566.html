<p align="justify" class="A0001">§471.  Short title </p>
<p align="justify" class="A0002">This Part of this Chapter shall be known and may be referred to by the short title: "Cooperative Sea Food Marketing Law." </p>
<p align="justify" class="A0002">Renumbered from R.S.1950, §12:381 by Acts 1968, No. 105, §3, eff. Jan. 1, 1969.  </p>
