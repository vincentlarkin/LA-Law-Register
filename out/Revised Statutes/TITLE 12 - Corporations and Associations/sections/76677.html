<h1>RS 12:966 - Pledge of state credit prohibited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76677">https://www.legis.la.gov/legis/Law.aspx?d=76677</a></div>
<p align="justify" class="A0001">§966.  Pledge of state credit prohibited </p>
<p align="justify" class="A0002">Under no circumstances shall the credit of the state be pledged to any corporation organized under the provisions of this Chapter.  </p>
<p align="justify" class="A0002">Acts 1969, No. 49, §16.  </p>
