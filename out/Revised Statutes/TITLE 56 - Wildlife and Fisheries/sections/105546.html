<h1>RS 56:699.4 - Penalty provision</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=105546">https://www.legis.la.gov/legis/Law.aspx?d=105546</a></div>
<p align="justify" class="A0001">§699.4.  Penalty provision </p>
<p align="justify" class="A0002">Violation of any provision in this Part or of any commission rule or regulation adopted pursuant to this Part shall constitute a class one violation.</p>
<p align="justify" class="A0002">Acts 1993, No. 80, §1.  </p>
