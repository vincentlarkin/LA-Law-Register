<h1>RS 56:452 - Penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=105328">https://www.legis.la.gov/legis/Law.aspx?d=105328</a></div>
<p align="justify" class="A0001">§452.  Penalties</p>
<p align="justify" class="A0002">Any person who violates a Section of this Subpart for which no penalty is given has committed a class one violation and shall be punished as provided for in Part II.</p>
<p align="justify" class="A0002">Acts 1994, No. 27, §1.</p>
