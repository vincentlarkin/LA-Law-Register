<h1>RS 56:2028 - Dedication of funds</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=105065">https://www.legis.la.gov/legis/Law.aspx?d=105065</a></div>
<p align="justify" class="A0001">§2028.  Dedication of funds </p>
<p align="justify" class="A0002">All funds received by the district shall be dedicated to accomplish the purposes of this Chapter.  </p>
<p align="justify" class="A0002">Acts 1991, No. 179, §1, eff. July 2, 1991.  </p>
