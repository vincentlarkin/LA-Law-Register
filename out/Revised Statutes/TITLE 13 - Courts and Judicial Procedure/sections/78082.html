<h1>RS 13:762 - Authority of clerks to lease computer equipment</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78082">https://www.legis.la.gov/legis/Law.aspx?d=78082</a></div>
<p align="justify" class="A0001">§762.  Authority of clerks to lease computer equipment </p>
<p align="justify" class="A0002">Clerks of court may lease computer equipment or computer time to private persons for a reasonable fee.  </p>
<p align="justify" class="A0002">Acts 1987, No. 756, §1.  </p>
