<p align="justify" class="A0001">§621.6.  Sixth judicial district </p>
<p align="justify" class="A0002">The sixth judicial district court shall have two judges.  </p>
<p align="justify" class="A0002">Acts 1956, Ex.Sess., No. 7, §1.  Amended by Acts 1974, No. 515, §1, emerg. eff. July 12, 1974.  </p>
