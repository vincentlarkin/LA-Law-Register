<h1>RS 13:5037 - Security for costs not required of defendant</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77915">https://www.legis.la.gov/legis/Law.aspx?d=77915</a></div>
<p align="justify" class="A0001">§5037.  Security for costs not required of defendant </p>
<p align="justify" class="A0002">The defendant shall not be required to give security for costs, or to advance costs in any case in which suit is brought by the state.  </p>
