<p align="justify" class="A0001">§1216.  Docket and index </p>
<p align="justify" class="A0002">The clerk of the civil district court shall keep a docket of each proceeding with a proper index thereto.  </p>
<p align="justify" class="A0002">Acts 1984, No. 36, §1.  </p>
