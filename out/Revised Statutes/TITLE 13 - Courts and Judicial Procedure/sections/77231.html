<p align="justify" class="A0001">§2488.34.  Fines, forfeitures and penalties </p>
<p align="justify" class="A0002">All fines, forfeitures of bonds, and penalties, excluding costs, shall be paid into the city treasury.  </p>
<p align="justify" class="A0002">Acts 1970, No. 424, §14.  </p>
