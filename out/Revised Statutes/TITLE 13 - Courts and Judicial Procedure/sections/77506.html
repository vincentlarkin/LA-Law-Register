<h1>RS 13:3442 - Compensation of curator</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77506">https://www.legis.la.gov/legis/Law.aspx?d=77506</a></div>
<p align="justify" class="A0001">§3442.  Compensation of curator </p>
<p align="justify" class="A0002">The court shall allow the curator reasonable compensation for his services.  </p>
<p align="justify" class="A0002">Acts 1990, No. 989, §4, eff. Jan. 1, 1991.  </p>
