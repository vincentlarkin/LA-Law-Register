<h1>RS 13:3665 - Competency of witnesses</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77541">https://www.legis.la.gov/legis/Law.aspx?d=77541</a></div>
<p align="justify" class="A0001">§3665.  Competency of witnesses </p>
<p align="justify" class="A0002">The competent witness in any civil proceeding in court or before a person having authority to receive evidence shall be a person of proper understanding.  </p>
