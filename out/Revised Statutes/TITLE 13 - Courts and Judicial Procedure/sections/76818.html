<h1>RS 13:1405 - Clerk</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76818">https://www.legis.la.gov/legis/Law.aspx?d=76818</a></div>
<p align="justify" class="A0001">§1405.  Clerk </p>
<p align="justify" class="A0002">The clerk of the Nineteenth Judicial District Court shall be ex officio the clerk of the family court.  </p>
<p align="justify" class="A0002">Added by Acts 1975, No. 89, §1.  </p>
