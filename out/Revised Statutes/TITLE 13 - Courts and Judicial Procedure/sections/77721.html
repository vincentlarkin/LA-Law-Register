<h1>RS 13:4246 - Optional procedure</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77721">https://www.legis.la.gov/legis/Law.aspx?d=77721</a></div>
<p align="justify" class="A0001">§4246.  Optional procedure </p>
<p align="justify" class="A0002">The right of a judgment creditor to bring an action to enforce the judgment under Article 2541 of the Code of Civil Procedure is preserved.</p>
<p align="justify" class="A0002">Acts 1985, No. 464, §1.  </p>
