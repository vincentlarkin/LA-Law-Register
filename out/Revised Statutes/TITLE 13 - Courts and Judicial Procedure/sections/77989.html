<p align="justify" class="A0001">§621.12.  Twelfth judicial district </p>
<p align="justify" class="A0002">The twelfth judicial district court shall have two judges.</p>
<p align="justify" class="A0002">Acts 1984, No. 56, §2(A), eff. June 8, 1984.  </p>
