<h1>RS 13:33 - Chairman; other officers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77472">https://www.legis.la.gov/legis/Law.aspx?d=77472</a></div>
<p align="justify" class="A0001">§33.  Chairman; other officers </p>
<p align="justify" class="A0002">The commission shall select from its members a chairman and such other officers as it deems necessary.  </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 152, §1.  </p>
