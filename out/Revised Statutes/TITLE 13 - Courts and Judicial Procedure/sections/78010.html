<p align="justify" class="A0001">§621.31.  Thirty-first judicial district </p>
<p align="justify" class="A0002">The thirty-first judicial district court shall have one judge.  </p>
<p align="justify" class="A0002">Acts 1968, No. 694, §1.  </p>
