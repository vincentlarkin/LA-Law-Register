<h1>RS 13:5006 - Costs</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77905">https://www.legis.la.gov/legis/Law.aspx?d=77905</a></div>
<p align="justify" class="A0001">§5006.  Costs </p>
<p align="justify" class="A0002">In all such cases the defendant judge shall be condemned to pay the costs, if judgment be rendered against him; otherwise judgment for costs shall be rendered as provided in the rules of the Supreme Court.  </p>
