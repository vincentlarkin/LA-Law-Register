<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76835">https://www.legis.la.gov/legis/Law.aspx?d=76835</a></div>
<p align="justify" class="A0001">§1449.  Venue </p>
<p align="justify" class="A0002">Venue in suits in a parish court shall be determined in the same manner as venue in suits brought in the district court.  </p>
<p align="justify" class="A0002">Added by Acts 1979, No. 328, §1, eff. Jan. 1, 1980.  </p>
