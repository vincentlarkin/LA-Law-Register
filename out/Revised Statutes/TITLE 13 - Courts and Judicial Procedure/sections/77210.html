<p align="justify" class="A0001">§2487.5.  Marriage ceremonies </p>
<p align="justify" class="A0002">The city judge may perform the marriage ceremony within the territorial jurisdiction of his court.  </p>
<p align="justify" class="A0002">Acts 1964, No. 102, §5.  </p>
