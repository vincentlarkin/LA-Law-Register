<p align="justify" class="A0001">§621.39.  Thirty-Ninth judicial district </p>
<p align="justify" class="A0002">The Thirty-Ninth Judicial District Court shall have one judge.  </p>
<p align="justify" class="A0002">Added by Acts 1979, No. 635, §2, eff. March 1, 1980.  </p>
