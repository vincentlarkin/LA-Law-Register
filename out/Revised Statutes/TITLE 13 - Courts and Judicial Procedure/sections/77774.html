<h1>RS 13:4436 - Same; decree may not be executed until final</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77774">https://www.legis.la.gov/legis/Law.aspx?d=77774</a></div>
<p align="justify" class="A0001">§4436.  Same; decree may not be executed until final </p>
<p align="justify" class="A0002">Nothing in R.S. 13:4434 through 13:4436 shall be construed to permit a writ in execution of a decree to issue until the decree is final.  </p>
