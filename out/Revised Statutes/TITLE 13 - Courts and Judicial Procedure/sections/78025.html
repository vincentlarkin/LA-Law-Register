<p align="justify" class="A0001">§621.9.  Ninth judicial district </p>
<p align="justify" class="A0002">The Ninth Judicial District Court shall have seven judges.</p>
<p align="justify" class="A0002">Acts 1997, No. 127, §1, eff. June 13, 1997.</p>
