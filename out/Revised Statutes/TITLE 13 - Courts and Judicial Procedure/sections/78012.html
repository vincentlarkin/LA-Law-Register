<p align="justify" class="A0001">§621.33.  Thirty-third judicial district</p>
<p align="justify" class="A0002">The thirty-third judicial district court shall have two judges.</p>
<p align="justify" class="A0002">Added by Acts 1968, No. 694; Acts 2001, No. 240, §1, eff. Jan. 1, 2002.</p>
