<h1>RS 13:5702 - Conservator of the peace</h1>

<p align="justify" class="A0001">§5702.  Conservator of the peace</p>
<p align="justify" class="A0002">The coroner shall be a conservator of the peace.</p>
<p align="justify" class="A0002">Amended by Acts 1952, No. 151, §2.  Acts 1984, No. 570, §1; Redesignated from R.S. 33:1552 pursuant to Acts 2011, No. 248, §3.</p>
