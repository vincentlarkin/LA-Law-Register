<p align="justify" class="A0001">§5210.  State agencies </p>
<p align="justify" class="A0002">The provisions of this Part shall not apply to agencies of the state.  </p>
<p align="justify" class="A0002">Added by Acts 1977, No. 710, §1.  </p>
