<p align="justify" class="A0001">§2487.29.  Rules for conduct of business </p>
<p align="justify" class="A0002">The city court may adopt and from time to time amend its rules for the conduct of the judicial business before it.  </p>
<p align="justify" class="A0002">Acts 1964, No. 102, §29.  </p>
