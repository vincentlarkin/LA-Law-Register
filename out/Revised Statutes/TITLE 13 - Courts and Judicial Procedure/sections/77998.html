<p align="justify" class="A0001">§621.20.  Twentieth Judicial District </p>
<p align="justify" class="A0002">The Twentieth Judicial District shall have two judges.  </p>
<p align="justify" class="A0002">Acts 1956, Ex.Sess., No. 7, §1.  Amended by Acts 1981, Ex.Sess., No. 34, §1, eff. Nov.  19, 1981.  </p>
