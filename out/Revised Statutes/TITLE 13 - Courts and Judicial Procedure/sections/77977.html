<h1>RS 13:581 - Judge's powers at chambers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77977">https://www.legis.la.gov/legis/Law.aspx?d=77977</a></div>
<p align="center" class="A0001">PART III.  JUDGE</p>
<p align="center" class="A0001">SUBPART A.  GENERAL PROVISIONS </p>
<p align="justify" class="A0002">§581.  Judge's powers at chambers </p>
<p align="justify" class="A0003">District judges may grant at chambers all orders not required by law to be granted in open court.  </p>
