<p align="justify" class="A0001">§621.7.  Seventh judicial district </p>
<p align="justify" class="A0002">The Seventh Judicial District Court shall have two judges. </p>
<p align="justify" class="A0002">Acts 1956, Ex.Sess., No. 7, §1.  Amended by Acts 1978, No. 39, §7, eff. June 1, 1978.  </p>
