<h1>RS 13:1453 - Criminal procedure</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76840">https://www.legis.la.gov/legis/Law.aspx?d=76840</a></div>
<p align="justify" class="A0001">§1453.  Criminal procedure </p>
<p align="justify" class="A0002">The procedure in a criminal proceeding in a parish court shall be as provided by the Code of Criminal Procedure.  </p>
<p align="justify" class="A0002">Added by Acts 1979, No. 328, §1, eff. Jan. 1, 1980.  </p>
