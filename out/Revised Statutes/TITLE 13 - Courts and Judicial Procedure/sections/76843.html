<p align="justify" class="A0001">§1456.  Citation of Chapter </p>
<p align="justify" class="A0002">This Chapter shall be designated and may be cited as the "Uniform Parish Court Jurisdiction and Procedure Act." </p>
<p align="justify" class="A0002">Added by Acts 1979, No. 328, §1, eff. Jan. 1, 1980.  </p>
