<h1>RS 13:2488.32 - Vacancy</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77229">https://www.legis.la.gov/legis/Law.aspx?d=77229</a></div>
<p align="justify" class="A0001">§2488.32.  Vacancy </p>
<p align="justify" class="A0002">In the event there is a vacancy in the office of the city judge, because of death, resignation or otherwise, the office shall be filled as provided by law.  </p>
<p align="justify" class="A0002">Acts 1970, No. 424, §12.  </p>
