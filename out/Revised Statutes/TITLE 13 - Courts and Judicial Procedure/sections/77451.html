<h1>RS 13:3203 - Venue</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=77451">https://www.legis.la.gov/legis/Law.aspx?d=77451</a></div>
<p align="justify" class="A0001">§3203.  Venue </p>
<p align="justify" class="A0002">A suit on a cause of action described in R.S. 13:3201 may be instituted in the parish where the plaintiff is domiciled, or in any parish of proper venue.</p>
<p align="justify" class="A0002">Added by Acts 1964, No. 47, §3; Acts 1997, No. 1056, §2.</p>
