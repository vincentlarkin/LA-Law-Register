<h1>RS 13:5589 - Date when fees are due</h1>

<p class="A0001">§5589.  Date when fees are due</p>
<p class="A0002">All fees proper of the sheriff shall be due and collectible every six months from the institution of the suit.</p>
<p class="A0002">Redesignated from R.S. 33:1510 pursuant to Acts 2011, No. 248, §3.</p>
