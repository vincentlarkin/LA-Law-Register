<h1>RS 13:1625 - Clerk</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=76922">https://www.legis.la.gov/legis/Law.aspx?d=76922</a></div>
<p align="justify" class="A0001">§1625.  Clerk </p>
<p align="justify" class="A0002">The clerk of the Nineteenth Judicial District Court shall be ex officio the clerk of the juvenile court.  </p>
<p align="justify" class="A0002">Acts 1990, No. 158, §1, eff. July 1, 1990.  </p>
