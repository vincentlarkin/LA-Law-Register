<h1>RS 48:853 - Bridges are public utilities</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103392">https://www.legis.la.gov/legis/Law.aspx?d=103392</a></div>
<p align="justify" class="A0001">§853.  Bridges are public utilities </p>
<p align="justify" class="A0002">Any bridge constructed, acquired, extended, or improved under the terms of this Sub-part for the use of which tolls are charged is a revenue producing public utility.  </p>
