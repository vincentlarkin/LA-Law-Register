<p align="center" class="A0001">CHAPTER 15.  REGIONAL TRANSIT AUTHORITY </p>
<p align="justify" class="A0002">§1651.  Short title </p>
<p align="justify" class="A0003">The Chapter shall be known and may be cited as the Regional Transit Authority Act of 1979.  </p>
<p align="justify" class="A0003">Added by Acts 1979, No. 439, §1, eff. Aug. 1, 1979.  </p>
