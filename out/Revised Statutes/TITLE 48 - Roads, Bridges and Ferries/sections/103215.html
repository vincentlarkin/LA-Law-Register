<p align="justify" class="A0001">§451.11.  Time for peremptory challenge </p>
<p align="justify" class="A0002">After the entire jury has been accepted and sworn, no party has the right to challenge peremptorily.  </p>
<p align="justify" class="A0002">Acts 1974, Ex.Sess., No. 30, §1, eff. Jan. 1, 1975.  </p>
