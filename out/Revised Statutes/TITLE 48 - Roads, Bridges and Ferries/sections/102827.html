<h1>RS 48:1406 - Cooperation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=102827">https://www.legis.la.gov/legis/Law.aspx?d=102827</a></div>
<p align="justify" class="A0001">§1406.  Cooperation </p>
<p align="justify" class="A0002">All public agencies shall cooperate fully with the Commission, to the end that it may effectively and comprehensively carry out its functions and duties.  </p>
<p align="justify" class="A0002">Acts 1968, No. 232, §6.  </p>
