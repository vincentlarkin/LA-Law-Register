<h1>RS 48:865 - Negotiability of bonds</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103404">https://www.legis.la.gov/legis/Law.aspx?d=103404</a></div>
<p align="justify" class="A0001">§865.  Negotiability of bonds </p>
<p align="justify" class="A0002">All bridge revenue bonds issued under the provisions of this Sub-part have all the qualities and incidents of negotiable instruments under the Negotiable Instruments Law.  </p>
