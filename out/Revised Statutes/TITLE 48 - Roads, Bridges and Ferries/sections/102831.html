<p align="center" class="A0001">CHAPTER 10.  CAPITAL AREA TRANSIT SYSTEM ACT</p>
<p align="justify" class="A0002">§1451.  Short title</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the Capital Area Transit System Act.</p>
<p align="justify" class="A0003">Acts 2005, No. 463, §1, eff. Jan. 1, 2006.</p>
