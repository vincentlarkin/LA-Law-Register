<h1>RS 48:451.19 - Number required for verdict</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103223">https://www.legis.la.gov/legis/Law.aspx?d=103223</a></div>
<p align="justify" class="A0001">§451.19.  Number required for verdict </p>
<p align="justify" class="A0002">In order to reach any verdict, five of the jurors trying the case must concur therein.  </p>
<p align="justify" class="A0002">Acts 1974, Ex.Sess., No. 30, §1, eff. Jan. 1, 1975.  </p>
