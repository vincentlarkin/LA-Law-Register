<p align="justify" class="A0001">§948.  Cessation of tolls </p>
<p align="justify" class="A0002">When the cost of the bridge has been paid, it shall be immediately opened as a free bridge to the travelling public and shall thereafter be maintained as part of the state highway system.  </p>
