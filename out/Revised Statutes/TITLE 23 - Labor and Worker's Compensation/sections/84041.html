<h1>RS 23:994 - Private remedy</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84041">https://www.legis.la.gov/legis/Law.aspx?d=84041</a></div>
<p align="justify" class="A0001">§994.  Private remedy</p>
<p align="justify" class="A0002">No provision of this Part shall be construed to be a bar to any civil action by a private party against any person for the violation of R.S. 23:992.</p>
<p align="justify" class="A0002">Added by Acts 1979, No. 534, §1.</p>
