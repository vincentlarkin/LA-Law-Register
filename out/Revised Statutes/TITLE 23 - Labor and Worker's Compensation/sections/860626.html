<p align="center" class="A0001">CHAPTER 6-A.  LOUISIANA EQUAL PAY FOR WOMEN ACT</p>
<p align="justify" class="A0002">§661.  Short title; citation</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the "Louisiana Equal Pay for Women Act".</p>
<p align="justify" class="A0003">Acts 2013, No. 374, §1.</p>
