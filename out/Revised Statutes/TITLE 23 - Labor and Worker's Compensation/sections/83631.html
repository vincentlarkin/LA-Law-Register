<h1>RS 23:1622 - Filing of claim</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=83631">https://www.legis.la.gov/legis/Law.aspx?d=83631</a></div>
<p align="justify" class="A0001">§1622.  Filing of claim</p>
<p align="justify" class="A0002">Claims for benefits shall be made in accordance with the provisions of this Chapter and such regulations as the administrator may prescribe.</p>
<p align="justify" class="A0002">Acts 1997, No. 912, §1, eff. July 10, 1997.</p>
