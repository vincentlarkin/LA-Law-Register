<h1>RS 23:311 - Application</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=83867">https://www.legis.la.gov/legis/Law.aspx?d=83867</a></div>
<p align="center" class="A0001">PART II.  AGE</p>
<p align="justify" class="A0002">§311.  Application</p>
<p align="justify" class="A0003">The prohibitions of this Part shall be limited to individuals who are at least forty years of age.</p>
<p align="justify" class="A0003">Acts 1997, No. 1409, §1, eff. Aug. 1, 1997; Acts 1999, No. 1366, §1.</p>
