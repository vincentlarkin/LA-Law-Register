<h1>RS 23:2198 - Presiding officer</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=631205">https://www.legis.la.gov/legis/Law.aspx?d=631205</a></div>
<p align="justify" class="A0001">§2198.  Presiding officer</p>
<p align="justify" class="A0002">The presiding officer of a board shall be selected from among the members of the board who represent the private sector.</p>
<p align="justify" class="A0002">Acts 2008, No. 743, §2, eff. July 1, 2008.</p>
