<p align="justify" class="A0001">§2050.  Domicile</p>
<p align="justify" class="A0002">The council shall be domiciled in East Baton Rouge Parish.</p>
<p align="justify" class="A0002">Acts 1997, No. 1, §1, eff. April 30, 1997; Acts 2008, No. 743, §2, eff. July 1, 2008.</p>
