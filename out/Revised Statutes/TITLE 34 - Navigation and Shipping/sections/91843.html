<h1>RS 34:1079 - Application of provisions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91843">https://www.legis.la.gov/legis/Law.aspx?d=91843</a></div>
<p align="justify" class="A0001">§1079.  Application of provisions</p>
<p align="justify" class="A0002">None of the provisions of this Part shall apply to the Parish of Orleans and port of New Orleans nor to any other pilot's association in the Mississippi river. </p>
