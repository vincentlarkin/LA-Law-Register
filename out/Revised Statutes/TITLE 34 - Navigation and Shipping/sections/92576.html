<h1>RS 34:963 - Pilot associations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=92576">https://www.legis.la.gov/legis/Law.aspx?d=92576</a></div>
<p align="justify" class="A0001">§963.  Pilot associations</p>
<p align="justify" class="A0002">Bar pilots may, for the furtherance of their interest, form themselves into a voluntary private association, partnership, corporation, or limited liability company.</p>
<p align="justify" class="A0002">Acts 2011, No. 111, §1.</p>
