<h1>RS 34:994 - Oath; bond</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=92584">https://www.legis.la.gov/legis/Law.aspx?d=92584</a></div>
<p align="justify" class="A0001">§994.  Oath; bond</p>
<p align="justify" class="A0002">Each river port pilot shall take an oath of office and furnish bond to the extent of one thousand dollars. </p>
<p align="justify" class="A0002">Acts 1952, No. 177, §4; Acts 1986, No. 960, §1. </p>
