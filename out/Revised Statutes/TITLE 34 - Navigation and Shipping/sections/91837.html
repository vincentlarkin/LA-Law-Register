<h1>RS 34:1074 - Oath of office and bond of pilots</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91837">https://www.legis.la.gov/legis/Law.aspx?d=91837</a></div>
<p align="justify" class="A0001">§1074.  Oath of office and bond of pilots</p>
<p align="justify" class="A0002">All the pilots shall take an oath of office and furnish bond to the extent of one thousand dollars approved by the board of examiners of each port. </p>
