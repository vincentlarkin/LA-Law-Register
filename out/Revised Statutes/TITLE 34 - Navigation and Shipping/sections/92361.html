<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=92361">https://www.legis.la.gov/legis/Law.aspx?d=92361</a></div>
<p align="justify" class="A0001">§340.5.  Bonds; character</p>
<p align="justify" class="A0002">Such bonds shall have all the qualities of negotiable instruments under the law merchant and the Negotiable Instrument Law of the state of Louisiana. </p>
<p align="justify" class="A0002">Added by Acts 1975, No. 101, §1. </p>
