<p align="justify" class="A0001">§340.16.  Short title</p>
<p align="justify" class="A0002">The provisions of this Subpart may be cited as the Rodent Control and Prevention of Infectious Diseases Act.</p>
<p align="justify" class="A0002">Acts 1997, No. 554, §1, eff. July 3, 1997.</p>
