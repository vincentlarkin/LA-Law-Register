<p align="justify" class="A0001">§3276.  Construction of Chapter </p>
<p align="justify" class="A0002">This Chapter shall be liberally construed to promote the purposes for which it is enacted.  </p>
<p align="justify" class="A0002">Added by Acts 1982, No. 391, §1.  </p>
