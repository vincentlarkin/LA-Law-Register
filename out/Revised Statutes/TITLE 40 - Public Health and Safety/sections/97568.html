<h1>RS 40:1485.6 - Parent or guardian conduct</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97568">https://www.legis.la.gov/legis/Law.aspx?d=97568</a></div>
<p align="justify" class="A0001">§1485.6.  Parent or guardian conduct</p>
<p align="justify" class="A0002">Parents or guardians of riders have a duty to ensure that a rider complies with all provisions of this Subpart.</p>
<p align="justify" class="A0002">Acts 2003, No. 928, §1.</p>
