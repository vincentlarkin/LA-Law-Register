<h1>RS 40:1568.1 - Investigation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97666">https://www.legis.la.gov/legis/Law.aspx?d=97666</a></div>
<p align="justify" class="A0001">§1568.1.  Investigation</p>
<p align="justify" class="A0002">The fire marshal shall order a special investigation of any fire resulting in any human death within this state.</p>
<p align="justify" class="A0002">Acts 1974, No. 235, §2; Acts 2003, No. 290, §1.</p>
