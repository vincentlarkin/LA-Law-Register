<h1>RS 40:1744 - Compliance with ADA</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97821">https://www.legis.la.gov/legis/Law.aspx?d=97821</a></div>
<p align="justify" class="A0001">§1744.  Compliance with ADA</p>
<p align="justify" class="A0002">Nothing in this Part shall be construed to relieve any person of his responsibility to comply with the ADA.</p>
<p align="justify" class="A0002">Added by Acts 1977, No. 625, §1.  Acts 1995, No. 880, §1.</p>
