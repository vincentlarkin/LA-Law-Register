<p align="justify" class="A0001">§1730.55.  Third-party providers</p>
<p align="justify" class="A0002">Third-party providers shall be registered with the council in accordance with R.S. 40:1730.35.</p>
<p align="justify" class="A0002">Acts 2007, No. 364, §1.</p>
