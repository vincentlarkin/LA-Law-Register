<p style="text-align:left; text-indent: -0.5in; margin-left: 0.5in"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt">§824.  Penalty</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>Whoever violates any of the provisions of this Subpart shall be fined not more than
five hundred dollars or imprisoned for not more than six months, or both.</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>Acts 2018, No. 206, §4.</span></span></p>
