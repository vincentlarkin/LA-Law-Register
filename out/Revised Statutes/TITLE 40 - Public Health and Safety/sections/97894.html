<h1>RS 40:19 - Domicile of parish health unit</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97894">https://www.legis.la.gov/legis/Law.aspx?d=97894</a></div>
<p align="justify" class="A0001">§19.  Domicile of parish health unit </p>
<p align="justify" class="A0002">All parish health units shall have their legal domicile in the parish seat of its particular parish.  </p>
<p align="justify" class="A0002">Acts 1976, No. 346, §1.  </p>
