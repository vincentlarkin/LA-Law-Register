<h1>RS 40:1353 - Officers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97436">https://www.legis.la.gov/legis/Law.aspx?d=97436</a></div>
<p align="justify" class="A0001">§1353.  Officers </p>
<p align="justify" class="A0002">The officers of the board shall be a chairman, who shall be appointed by the governor, and such other officers as the board deems necessary.  </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 281, §1.  </p>
