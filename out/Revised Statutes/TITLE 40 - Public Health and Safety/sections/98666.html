<p align="justify" class="A0001">§592.4.  Designated area </p>
<p align="justify" class="A0002">The provisions of this Part shall apply only within the boundaries of properly approved housing development areas as provided by law.  </p>
<p align="justify" class="A0002">Acts 1984, No. 571, §1.  </p>
