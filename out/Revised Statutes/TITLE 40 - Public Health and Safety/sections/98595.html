<p align="justify" class="A0001">§530.  Conflict of interest</p>
<p align="justify" class="A0002">All housing authority officials and employees are subject to the state Code of Governmental Ethics.</p>
<p align="justify" class="A0002">Acts 1997, No. 1188, §1.</p>
