<h1>RS 40:2535 - Retaliation for exercising rights</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98280">https://www.legis.la.gov/legis/Law.aspx?d=98280</a></div>
<p align="justify" class="A0001">§2535.  Retaliation for exercising rights</p>
<p align="justify" class="A0002">There shall be no penalty nor threat of any penalty for the exercise by a law enforcement officer of his rights under this Chapter.</p>
<p align="justify" class="A0002">Acts 1985, No. 425, §1.</p>
