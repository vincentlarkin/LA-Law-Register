<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98244">https://www.legis.la.gov/legis/Law.aspx?d=98244</a></div>
<p align="justify" class="A0001">§2454.  Grants; ability to contract</p>
<p align="justify" class="A0002">The council may accept grants, gifts, and bequests and enter into contracts to carry out the purposes of this Chapter.</p>
<p align="justify" class="A0002">Added by Acts 1980, No. 751, §2.</p>
