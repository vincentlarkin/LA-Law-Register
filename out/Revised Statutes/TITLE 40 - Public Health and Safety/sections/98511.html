<h1>RS 40:465 - Pre-existing powers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98511">https://www.legis.la.gov/legis/Law.aspx?d=98511</a></div>
<p align="justify" class="A0001">§465.  Pre-existing powers</p>
<p align="justify" class="A0002">A local housing authority may have and exercise any power not enumerated in this Chapter which a housing authority possessed immediately prior to August 15, 1997.</p>
<p align="justify" class="A0002">Acts 1997, No. 1188, §1.</p>
