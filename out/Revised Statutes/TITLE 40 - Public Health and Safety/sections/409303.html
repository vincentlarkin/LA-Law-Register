<p align="center" class="A0001">CHAPTER 3-C.  LOUISIANA HOUSING PRESERVATION ACT</p>
<p align="justify" class="A0002">§600.31.  Short title</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the "Louisiana Housing Preservation Act".</p>
<p align="justify" class="A0003">Acts 2006, No. 355, §1, eff. June 13, 2006.</p>
