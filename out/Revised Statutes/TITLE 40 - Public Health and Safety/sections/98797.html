<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98797">https://www.legis.la.gov/legis/Law.aspx?d=98797</a></div>
<p align="justify" class="A0001">§715.  Term of permit; renewal </p>
<p align="justify" class="A0002">This permit shall extend for one year from the date of its issue, unless sooner revoked as provided in this Part and shall be renewed annually thereafter.  </p>
