<h1>RS 40:1749.26 - Public work projects</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=97842">https://www.legis.la.gov/legis/Law.aspx?d=97842</a></div>
<p align="justify" class="A0001">§1749.26.  Public work projects</p>
<p align="justify" class="A0002">In addition to any other applicable provision of this Part, R.S. 38:2223 shall apply to any public work project.</p>
<p align="justify" class="A0002">Acts 2001, No. 1005, §2, eff. June 27, 2001.</p>
