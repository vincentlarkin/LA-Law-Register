<p align="justify" class="A0001">§4003.  Rules and regulations </p>
<p align="justify" class="A0002">The commissioner shall promulgate rules and regulations for the administration and enforcement of this subpart.</p>
<p align="justify" class="A0002">Acts 1974, No. 306, §1; Acts 1985, No. 74, §1.</p>
