<p style="text-align:left; text-indent: -0.5in; margin-left: 0.5in"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt">§4742. Purpose</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>The purpose of this Part is to protect consumers from misleading and false labeling
of food products that are edible by humans.</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>Acts 2019, No. 273, §1, eff. Oct 1, 2020.</span></span></p>
