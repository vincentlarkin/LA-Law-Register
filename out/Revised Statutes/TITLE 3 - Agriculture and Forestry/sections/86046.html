<h1>RS 3:2476 - Fees</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86046">https://www.legis.la.gov/legis/Law.aspx?d=86046</a></div>
<p align="justify" class="A0001">§2476.  Fees</p>
<p align="justify" class="A0002">All costs of sterilization pursuant to this Part shall be paid by the prospective adopter or purchaser, unless otherwise provided.</p>
<p align="justify" class="A0002">Acts 1990, No. 567, §1, eff. July 19, 1990.</p>
