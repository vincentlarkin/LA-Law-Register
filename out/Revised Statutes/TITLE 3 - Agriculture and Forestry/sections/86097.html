<h1>RS 3:2774 - Parishes to provide animal facilities</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86097">https://www.legis.la.gov/legis/Law.aspx?d=86097</a></div>
<p align="justify" class="A0001">§2774.  Parishes to provide animal facilities</p>
<p align="justify" class="A0002">Each parish shall provide suitable shelters or facilities for dogs seized under the provisions of this Part.</p>
<p align="justify" class="A0002">Acts 2003, No. 133, §1, eff. May 28, 2003.</p>
