<p align="justify" class="A0001">§4403.  Prohibitions </p>
<p align="justify" class="A0002">No portion of the Alexander State Forest shall be used for private commercial development.</p>
<p align="justify" class="A0002">Acts 1989, No. 423, §1, eff.  June 30, 1989.</p>
