<h1>RS 3:4618 - Sales contrary to law prohibited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86573">https://www.legis.la.gov/legis/Law.aspx?d=86573</a></div>
<p align="justify" class="A0001">§4618.  Sales contrary to law prohibited </p>
<p align="justify" class="A0002">No one shall keep for the purpose of sale, offer or expose for sale, or sell any commodity in a manner contrary to law.</p>
<p align="justify" class="A0002">Acts 1992, No. 55, §1.</p>
