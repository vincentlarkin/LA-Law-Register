<p align="center" class="A0001">PART VII.  STRUCTURAL PEST CONTROL</p>
<p align="justify" class="A0002">§3361.  Short title </p>
<p align="justify" class="A0003">The provisions of this Part shall be known and may be cited as the Structural Pest Control Law.</p>
<p align="justify" class="A0003">Acts 1984, No. 800, §1, eff. July 13, 1984.</p>
