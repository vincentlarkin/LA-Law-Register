<p align="center" class="A0001">PART XVI.  LOUISIANA AQUACULTURAL DEVELOPMENT ACT</p>
<p align="justify" class="A0002">§559.1.  Short title</p>
<p align="justify" class="A0003">This Part shall be known and may be referred to as the "Louisiana Aquacultural Development Act".</p>
<p align="justify" class="A0003">Acts 2004, No. 865, §1, eff. July 12, 2004.</p>
