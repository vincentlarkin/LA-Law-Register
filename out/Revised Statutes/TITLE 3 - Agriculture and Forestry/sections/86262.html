<h1>RS 3:3377 - Savings clause</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86262">https://www.legis.la.gov/legis/Law.aspx?d=86262</a></div>
<p align="justify" class="A0001">§3377.  Savings clause </p>
<p align="justify" class="A0002">The provisions of this Part shall not affect the validity of licenses issued prior to the date this Part becomes effective in 1984.</p>
<p align="justify" class="A0002">Acts 1984, No. 800, §1, eff. July 13, 1984.</p>
