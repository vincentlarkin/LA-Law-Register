<h1>RS 3:3304 - Cooperative agreements</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86232">https://www.legis.la.gov/legis/Law.aspx?d=86232</a></div>
<p align="justify" class="A0001">§3304.  Cooperative agreements </p>
<p align="justify" class="A0002">In order to accomplish the objectives of this Part, the commissioner may enter into cooperative agreements with appropriate governmental agencies.</p>
<p align="justify" class="A0002">Added by Acts 1988, No. 349, §1.</p>
