<h1>RS 3:3624 - Restrictions and limitations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86333">https://www.legis.la.gov/legis/Law.aspx?d=86333</a></div>
<p align="justify" class="A0001">§3624.  Restrictions and limitations</p>
<p align="justify" class="A0002">Nothing in this Part shall restrict any other remedy or right that any person or class of persons may have under any other provision of law.</p>
<p align="justify" class="A0002">Acts 1995, No. 302, §1.</p>
