<p align="justify" class="A0001">§2775.  Use of dogs for hunting</p>
<p align="justify" class="A0002">Nothing in this Part shall prevent any citizen of this state from lawfully hunting with a dog, provided the dog is accompanied by the owner or keeper.</p>
