<p align="justify" class="A0001">§823.  Inspection services </p>
<p align="justify" class="A0002">Any financially interested person, may, upon request secure federal inspection services at nominal charges or fees as outlined and in accordance with USDA Bulletin SRA-AMS No. 137 (Revised). </p>
