<h1>RS 3:2895 - Penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86134">https://www.legis.la.gov/legis/Law.aspx?d=86134</a></div>
<p align="justify" class="A0001">§2895.  Penalties</p>
<p align="justify" class="A0002">Any person convicted of violating the provisions of R.S. 3:2891 shall be fined not less than twenty-five dollars nor more than one hundred dollars.</p>
<p align="justify" class="A0002">Added by Acts 1972, No. 419, §5.</p>
