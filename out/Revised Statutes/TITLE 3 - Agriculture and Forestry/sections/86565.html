<h1>RS 3:4610 - Removal of tag unlawfully</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86565">https://www.legis.la.gov/legis/Law.aspx?d=86565</a></div>
<p align="justify" class="A0001">§4610.  Removal of tag unlawfully </p>
<p align="justify" class="A0002">No one shall remove from any weight, measure, or weighing or measuring device, contrary to law or regulation, any tag placed thereon by the department.</p>
<p align="justify" class="A0002">Acts 1992, No. 55, §1.</p>
