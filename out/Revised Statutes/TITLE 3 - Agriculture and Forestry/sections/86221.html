<h1>RS 3:3273 - Monitoring</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86221">https://www.legis.la.gov/legis/Law.aspx?d=86221</a></div>
<p align="justify" class="A0001">§3273.  Monitoring </p>
<p align="justify" class="A0002">The commissioner shall establish a program for monitoring pesticide wastes in the state.</p>
<p align="justify" class="A0002">Added by Acts 1982, No. 198, §1, eff. Jan. 1, 1983; Acts 1990, No. 136, §1.</p>
