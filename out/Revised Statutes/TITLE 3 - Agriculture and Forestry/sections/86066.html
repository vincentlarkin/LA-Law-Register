<p align="center" class="A0001">CHAPTER 3-B.  LOUISIANA AGRICULTURAL FINANCE ACT</p>
<p align="justify" class="A0002">§261.  Short title </p>
<p align="justify" class="A0003">A.  This Chapter shall be known and may be referred to as the "Louisiana Agricultural Finance Act." </p>
<p align="justify" class="A0003">Added by Acts 1983, No. 96, § 1, eff. July 23, 1983. </p>
