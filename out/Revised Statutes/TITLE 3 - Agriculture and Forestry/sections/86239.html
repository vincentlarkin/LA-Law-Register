<h1>RS 3:3310 - Violations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86239">https://www.legis.la.gov/legis/Law.aspx?d=86239</a></div>
<p align="justify" class="A0001">§3310.  Violations </p>
<p align="justify" class="A0002">No person shall violate any provision of this Part or of any rule or regulation adopted under the provisions of this Part.</p>
<p align="justify" class="A0002">Added by Acts 1988, No. 349, §1.</p>
