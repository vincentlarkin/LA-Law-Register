<h1>RS 35:10 - Place of executing notarial acts</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=92593">https://www.legis.la.gov/legis/Law.aspx?d=92593</a></div>
<p align="justify" class="A0001">§10.  Place of executing notarial acts</p>
<p align="justify" class="A0002">All notarial acts shall be made and executed at any place within the jurisdictional limits of the notary.</p>
<p align="justify" class="A0002">Amended by Acts 1974, No. 460, §1.</p>
