<h1>RS 25:1215.3 - Museum board; membership</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=285416">https://www.legis.la.gov/legis/Law.aspx?d=285416</a></div>
<p align="justify" class="A0001">§1215.3.  Museum board; membership</p>
<p align="justify" class="A0002">A.  The ordinance creating the museum board shall establish the membership thereof.</p>
<p align="justify" class="A0002">B.  The members of the board shall serve without compensation.</p>
<p align="justify" class="A0002">Acts 2004, No. 424, §1.</p>
