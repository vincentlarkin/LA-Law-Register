<h1>RS 25:1212 - Fiscal year</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84305">https://www.legis.la.gov/legis/Law.aspx?d=84305</a></div>
<p align="justify" class="A0001">§1212.  Fiscal year </p>
<p align="justify" class="A0002">The fiscal year of the board shall be the same as the fiscal year of the governing authority.  </p>
<p align="justify" class="A0002">Acts 1991, No. 120, §1, eff. June 30, 1991.  </p>
