<h1>RS 25:636 - Withdrawal from compact</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84518">https://www.legis.la.gov/legis/Law.aspx?d=84518</a></div>
<p align="justify" class="A0001">§636.  Withdrawal from compact </p>
<p align="justify" class="A0002">In the event of withdrawal from the compact the state librarian shall send and receive any notices required by Article XI(b) of the compact.  </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 216, §1.  </p>
