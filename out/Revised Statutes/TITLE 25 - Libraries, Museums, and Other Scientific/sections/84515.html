<h1>RS 25:633 - State Library of Louisiana</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84515">https://www.legis.la.gov/legis/Law.aspx?d=84515</a></div>
<p align="justify" class="A0001">§633.  State Library of Louisiana </p>
<p align="justify" class="A0002">As used in the compact, "state library agency", with reference to this state, means the State Library of Louisiana.  </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 216, §1; Acts 1991, No. 938, §2.  </p>
