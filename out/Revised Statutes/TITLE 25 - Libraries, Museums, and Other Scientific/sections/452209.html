<p align="center" class="A0001">PART V. FRENCH QUARTER MANAGEMENT DISTRICT</p>
<p align="justify" class="A0002">§796. Short title</p>
<p align="justify" class="A0003">This Part shall be referred to as the "French Quarter Management District."</p>
