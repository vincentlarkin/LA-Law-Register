<h1>RS 22:1260.37 - Injunction and penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=919521">https://www.legis.la.gov/legis/Law.aspx?d=919521</a></div>
<p align="justify" class="A0001">§1260.37.  Injunction </p>
<p align="justify" class="A0002">Any physician or other healthcare provider may request a court of appropriate jurisdiction to issue an injunction to enforce any provision of this Subpart.</p>
<p align="justify" class="A0002">Acts 2014, No. 174, §1.</p>
