<p align="justify" class="A0001">§2070.  Effective date </p>
<p align="justify" class="A0002">The provisions of this Part shall become effective on September 1, 1970.</p>
<p align="justify" class="A0002">Added by Acts 1970, No. 81, §1; Redesignated from R.S. 22:1394 by Acts 2008, No. 415, §1, eff. Jan. 1, 2009.</p>
