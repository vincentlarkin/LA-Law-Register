<h1>RS 47:41 - Net income</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=102113">https://www.legis.la.gov/legis/Law.aspx?d=102113</a></div>
<p align="center" class="A0001">SUBPART C.  COMPUTATION OF NET INCOME</p>
<p align="justify" class="A0002">§41.  Net income </p>
<p align="justify" class="A0003">"Net income" means the gross income computed under R.S. 47:42 through 47:53, less the deductions allowed by R.S. 47:54 through 47:77.  </p>
