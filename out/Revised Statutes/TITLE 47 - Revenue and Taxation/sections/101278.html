<h1>RS 47:1575 - Injunctions prohibited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101278">https://www.legis.la.gov/legis/Law.aspx?d=101278</a></div>
<p align="justify" class="A0001">§1575.  Injunctions prohibited </p>
<p align="justify" class="A0002">No court of this state shall issue any process whatsoever to restrain the collection of any tax, penalty, interest, or other charge imposed in this Sub-title.  </p>
