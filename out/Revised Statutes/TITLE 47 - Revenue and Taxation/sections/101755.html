<h1>RS 47:291 - Application of Part</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101755">https://www.legis.la.gov/legis/Law.aspx?d=101755</a></div>
<p align="justify" class="A0001">§291.  Application of Part </p>
<p align="justify" class="A0002">The provisions of this Part shall apply only to individual taxpayers.  This Part is not applicable to estates or trusts.  </p>
<p align="justify" class="A0002">Acts 1980, No. 316, §1.  </p>
