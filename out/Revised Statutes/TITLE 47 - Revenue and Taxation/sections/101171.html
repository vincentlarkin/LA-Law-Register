<h1>RS 47:140 - Unadjusted basis; in general</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101171">https://www.legis.la.gov/legis/Law.aspx?d=101171</a></div>
<p align="justify" class="A0001">§140.  Unadjusted basis; in general </p>
<p align="justify" class="A0002">The basis of property shall be the cost of such property, except as provided otherwise in R.S. 47:141 through 47:155.  </p>
