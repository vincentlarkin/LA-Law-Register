<h1>RS 47:225 - Computation of gross income</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101562">https://www.legis.la.gov/legis/Law.aspx?d=101562</a></div>
<p align="justify" class="A0001">§225.  Computation of gross income </p>
<p align="justify" class="A0002">The gross income of insurance companies subject to the tax imposed by R.S. 47:221 or 47:224 shall not be determined in the manner provided in R.S. 47:161.  </p>
