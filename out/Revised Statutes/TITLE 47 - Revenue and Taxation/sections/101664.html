<h1>RS 47:2701 - Imposition of tax</h1>

<p align="center" class="A0001">PART III.  SWEET POTATO TAX </p>
<p align="justify" class="A0002">§2701.  Imposition of tax </p>
<p align="justify" class="A0003">There shall be a tax levied on all sweet potatoes shipped in the state to be imposed and collected as provided in Title 3.  </p>
