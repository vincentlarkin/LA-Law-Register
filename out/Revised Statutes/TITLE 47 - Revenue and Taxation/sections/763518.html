<h1>RS 47:338.74 - Tax exemption</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=763518">https://www.legis.la.gov/legis/Law.aspx?d=763518</a></div>
<p align="justify" class="A0001">§338.74.  Tax exemption</p>
<p align="justify" class="A0002">All bonds issued under the provisions of R.S. 47:338.48 through 338.78 shall be exempt from taxation.</p>
<p align="justify" class="A0002">Acts 1957, No. 50, §1; Redesignated from R.S. 33:2730 pursuant to Acts 2011, No. 248, §4.</p>
