<h1>RS 47:2610 - Exceptions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101657">https://www.legis.la.gov/legis/Law.aspx?d=101657</a></div>
<p align="justify" class="A0001">§2610.  Exceptions </p>
<p align="justify" class="A0002">Nothing in this Part requires persons lawfully in possession of marijuana or a controlled dangerous substance to pay the tax required under this Part.  </p>
<p align="justify" class="A0002">Acts 1990, No. 90, §1, eff. Jan. 1, 1991.  </p>
