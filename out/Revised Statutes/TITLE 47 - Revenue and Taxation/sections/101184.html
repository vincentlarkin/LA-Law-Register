<h1>RS 47:1412 - Rules of evidence</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=101184">https://www.legis.la.gov/legis/Law.aspx?d=101184</a></div>
<p align="justify" class="A0001">§1412.  Rules of evidence </p>
<p align="justify" class="A0002">The rules of evidence which the board shall adopt as those binding upon it shall be those rules of evidence followed in the district courts of Louisiana.  </p>
