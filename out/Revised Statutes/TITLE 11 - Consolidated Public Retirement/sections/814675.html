<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=814675">https://www.legis.la.gov/legis/Law.aspx?d=814675</a></div>
<p align="justify" class="A0001">§2242.3.  Eligibility for plan membership</p>
<p align="justify" class="A0002">Membership in this subplan is limited to employees whose employment does not qualify them to receive state supplemental pay.</p>
<p align="justify" class="A0002">Acts 2012, No. 522, §1.</p>
