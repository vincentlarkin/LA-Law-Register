<p align="justify" class="A0001">§80.  Fees</p>
<p align="justify" class="A0002">The recorder may charge and collect such fees as are permitted or prescribed by law.</p>
<p align="justify" class="A0002">Acts 2005, No. 169, §6, eff. July 1, 2006; Acts 2005, 1<sup>st</sup> Ex. Sess., No. 13, §1, eff. Nov. 29, 2005.</p>
