<h1>RS 44:326 - Court costs</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99697">https://www.legis.la.gov/legis/Law.aspx?d=99697</a></div>
<p align="justify" class="A0001">§326.  Court costs</p>
<p align="justify" class="A0002">The costs incurred in suits to establish the instrument shall be paid by the plaintiff when there is no opposition, but if opposition be made it shall be paid by the party cast. </p>
