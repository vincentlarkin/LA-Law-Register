<h1>RS 44:403 - Counsel</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99723">https://www.legis.la.gov/legis/Law.aspx?d=99723</a></div>
<p align="justify" class="A0001">§403.  Counsel</p>
<p align="justify" class="A0002">Legal services for the division shall be provided by the secretary or the attorney general and the various district attorneys in their various districts. </p>
<p align="justify" class="A0002">Acts 1985, No. 238, §1, eff. July 6, 1985. </p>
