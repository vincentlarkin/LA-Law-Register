<h1>RS 26:99 - Place of hearing</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84880">https://www.legis.la.gov/legis/Law.aspx?d=84880</a></div>
<p align="justify" class="A0001">§99.  Place of hearing </p>
<p align="justify" class="A0002">Hearings by the commissioner shall, in his discretion, be held either at the state capital or in the parish in which the licensed premises in question is located.  </p>
<p align="justify" class="A0002">Acts 1987, No. 696, §1.  </p>
