<h1>RS 26:938 - Reports to the commissioner</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84873">https://www.legis.la.gov/legis/Law.aspx?d=84873</a></div>
<p align="justify" class="A0001">§938.  Reports to the commissioner</p>
<p align="justify" class="A0002">Beginning January 1, 1999, the program administrator shall provide the commissioner and the legislature with annual reports regarding the program.</p>
<p align="justify" class="A0002">Acts 1997, No. 1054, §1.</p>
