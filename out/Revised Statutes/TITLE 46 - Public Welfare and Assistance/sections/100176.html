<h1>RS 46:104 - Applications for assistance</h1>

<p align="justify" class="A0001">§104.  Applications for assistance </p>
<p align="justify" class="A0002">Applications for assistance shall be in writing in the manner and upon the form prescribed by the department.  </p>
<p align="justify" class="A0002">Amended by Acts 1978, No. 786, §6, eff. July 17, 1978.  </p>
