<h1>RS 46:2139 - Other relief not affected</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=100564">https://www.legis.la.gov/legis/Law.aspx?d=100564</a></div>
<p align="justify" class="A0001">§2139.  Other relief not affected </p>
<p align="justify" class="A0002">The granting of any relief authorized under this Part shall not preclude any other relief authorized by law.  </p>
<p align="justify" class="A0002">Added by Acts 1982, No. 782, §2.  </p>
