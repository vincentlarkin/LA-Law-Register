<p align="center" class="A0001">CHAPTER 55.  CHILDREN'S PRODUCT SAFETY ACT</p>
<p align="justify" class="A0002">§2701.  Short title</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the "Children's Product Safety Act".</p>
<p align="justify" class="A0003">Acts 2001, No. 1164, §1.</p>
