<h1>RS 46:1139 - Waiver; suspension of obligation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=100241">https://www.legis.la.gov/legis/Law.aspx?d=100241</a></div>
<p align="justify" class="A0001">§1139.  Waiver; suspension of obligation </p>
<p align="justify" class="A0002">The board shall arrange for waiver or suspension of any financial obligation where compliance would involve extreme or unusual hardship.</p>
<p align="justify" class="A0002">Acts 1988, No. 54, §1.  </p>
