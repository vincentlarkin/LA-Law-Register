<h1>RS 46:979.6 - Termination</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=920109">https://www.legis.la.gov/legis/Law.aspx?d=920109</a></div>
<p align="justify" class="A0001">§979.6.  Termination</p>
<p align="justify" class="A0002">Annually during each regular session of the legislature, the legislature shall have the authority to decide whether to continue the program.</p>
<p align="justify" class="A0002">Acts 2014, No. 783, §1, eff. June 19, 2014.</p>
