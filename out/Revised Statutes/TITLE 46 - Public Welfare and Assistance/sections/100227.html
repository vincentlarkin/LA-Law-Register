<h1>RS 46:111 - Assistance not assignable</h1>

<p align="justify" class="A0001">§111.  Assistance not assignable </p>
<p align="justify" class="A0002">All assistance shall be inalienable by any assignment or transfer and shall be exempt from levy or execution under the laws of this state.  </p>
