<h1>RS 46:2172 - Definitions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=920198">https://www.legis.la.gov/legis/Law.aspx?d=920198</a></div>
<p align="justify" class="A0001">§2172.  Definitions</p>
<p align="justify" class="A0002">As used in this Chapter, "stalking" means any act that would constitute the crime of stalking under R.S. 14:40.2 or cyberstalking under R.S. 14:40.3.</p>
<p align="justify" class="A0002">Acts 2014, No. 355, §2.</p>
