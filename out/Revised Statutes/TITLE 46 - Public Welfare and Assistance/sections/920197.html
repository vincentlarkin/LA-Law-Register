<h1>RS 46:2171.1 - Jurisdiction</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=920197">https://www.legis.la.gov/legis/Law.aspx?d=920197</a></div>
<p align="justify" class="A0001">§2171.1.  Jurisdiction</p>
<p align="justify" class="A0002">Any district court in the state of Louisiana which is empowered to hear civil matters shall have jurisdiction over proceedings appropriate to it under this Chapter.</p>
<p align="justify" class="A0002">Acts 2014, No. 355, §2.</p>
