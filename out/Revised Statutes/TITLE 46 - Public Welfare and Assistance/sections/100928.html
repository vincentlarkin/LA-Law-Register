<h1>RS 46:464 - Persons eligible</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=100928">https://www.legis.la.gov/legis/Law.aspx?d=100928</a></div>
<p align="justify" class="A0001">§464.  Persons eligible </p>
<p align="justify" class="A0002">No parish or parish official shall, at the public expense, support or aid any persons as paupers, except such as are infirm, sick or disabled.  </p>
