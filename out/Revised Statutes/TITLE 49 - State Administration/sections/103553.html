<h1>RS 49:160 - State tree</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103553">https://www.legis.la.gov/legis/Law.aspx?d=103553</a></div>
<p align="justify" class="A0001">§160.  State tree </p>
<p align="justify" class="A0002">The baldcypress (Taxodium distichum), commonly known as the "cypress" tree, is hereby designated and hereafter shall be known as the official state tree of the state of Louisiana.  </p>
<p align="justify" class="A0002">Acts 1963, No. 49.  </p>
