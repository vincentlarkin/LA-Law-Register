<h1>RS 49:124 - Vehicles exempt</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103506">https://www.legis.la.gov/legis/Law.aspx?d=103506</a></div>
<p align="justify" class="A0001">§124.  Vehicles exempt </p>
<p align="justify" class="A0002">The provisions of R.S. 49:123, 49:124 shall not be applicable to those motor vehicles, water craft and air craft already identified in accordance with existing law.  </p>
<p align="justify" class="A0002">Acts 1962, No. 292, §2.  </p>
