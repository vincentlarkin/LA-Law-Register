<h1>RS 49:309 - Endorsement of warrants</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103706">https://www.legis.la.gov/legis/Law.aspx?d=103706</a></div>
<p align="justify" class="A0001">§309.  Endorsement of warrants </p>
<p align="justify" class="A0002">The state treasurer shall endorse on each warrant its payment and the date of payment.  </p>
<p align="justify" class="A0002">Acts 1976, No. 428, §1, eff. July 31, 1976.  </p>
