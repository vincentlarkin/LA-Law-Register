<h1>RS 49:303 - Seal</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103695">https://www.legis.la.gov/legis/Law.aspx?d=103695</a></div>
<p align="justify" class="A0001">§303.  Seal </p>
<p align="justify" class="A0002">The state treasurer shall keep a seal of office, which shall be used to authenticate all written papers, documents, and certificates from his office.</p>
<p align="justify" class="A0002">Acts 1976, No. 428, §1, eff. July 31, 1976.  </p>
