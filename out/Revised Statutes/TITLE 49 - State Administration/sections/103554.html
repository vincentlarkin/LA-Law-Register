<h1>RS 49:161 - State colors</h1>

<p align="justify" class="A0001">§161.  State colors </p>
<p align="justify" class="A0002">The official colors of the State of Louisiana shall be blue, white and gold.  </p>
<p align="justify" class="A0002">Added by Acts 1972, No. 603, §1.  </p>
