<p align="justify" class="A0001">§304.  Residence </p>
<p align="justify" class="A0002">The state treasurer shall reside at the seat of government.  </p>
<p align="justify" class="A0002">Acts 1976, No. 428, §1, eff. July 31, 1976.  </p>
