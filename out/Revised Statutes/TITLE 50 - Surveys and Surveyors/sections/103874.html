<h1>RS 50:62 - Liability for entry or work done</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103874">https://www.legis.la.gov/legis/Law.aspx?d=103874</a></div>
<p align="justify" class="A0001">§62.  Liability for entry or work done </p>
<p align="justify" class="A0002">The person making use of the authority conferred in R.S. 50:61 is liable for any damage caused by the entry on the land or by the work done.</p>
