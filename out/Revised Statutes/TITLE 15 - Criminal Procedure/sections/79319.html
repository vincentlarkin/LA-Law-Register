<p align="justify" class="A0001">§760.  Hospital quarters </p>
<p align="justify" class="A0002">Where large numbers of prisoners are confined the proper authorities in charge shall provide hospital quarters with necessary arrangement, conveniences, attendants, etc.  </p>
