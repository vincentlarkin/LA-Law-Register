<p align="center" class="A0001">PART I-D.  SAFE PREGNANCY FOR INCARCERATED WOMEN</p>
<p align="justify" class="A0002">§744. Title</p>
<p align="justify" class="A0003">This Part shall be known as the Safe Pregnancy for Incarcerated Women Act.</p>
