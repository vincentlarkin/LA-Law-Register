<h1>RS 15:452 - Rights of arrested person as to confession</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=79100">https://www.legis.la.gov/legis/Law.aspx?d=79100</a></div>
<p align="justify" class="A0001">§452.  Rights of arrested person as to confession </p>
<p align="justify" class="A0002">No person under arrest shall be subjected to any treatment designed by effect on body or mind to compel a confession of crime.  </p>
