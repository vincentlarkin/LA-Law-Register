<h1>RS 15:1355 - Arrest; warrant</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78956">https://www.legis.la.gov/legis/Law.aspx?d=78956</a></div>
<p align="justify" class="A0001">§1355.  Arrest; warrant</p>
<p align="justify" class="A0002">No person shall be arrested under the provisions of this Chapter without a warrant, except in emergency circumstances.  </p>
<p align="justify" class="A0002">Added by Acts 1983, No. 727, §1, eff. July 22, 1983.  </p>
