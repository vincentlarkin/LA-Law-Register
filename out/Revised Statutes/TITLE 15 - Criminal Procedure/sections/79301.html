<h1>RS 15:704 - Sheriff keeper of jail</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=79301">https://www.legis.la.gov/legis/Law.aspx?d=79301</a></div>
<p align="justify" class="A0001">§704.  Sheriff keeper of jail </p>
<p align="justify" class="A0002">Each sheriff shall be the keeper of the public jail of his parish, and shall by all lawful means preserve the peace and apprehend all disturbers thereof, and other public offenders.  </p>
