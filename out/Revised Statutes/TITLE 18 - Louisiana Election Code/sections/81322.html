<p align="justify" class="A0001">§1300.16.  Penalty</p>
<p align="justify" class="A0002">Whoever violates any provision of this Chapter shall be fined not less than one hundred dollars nor more than one thousand dollars, and imprisoned for not less than thirty days nor more than ninety days.</p>
