<h1>RS 18:442 - Organization</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=81576">https://www.legis.la.gov/legis/Law.aspx?d=81576</a></div>
<p align="justify" class="A0001">§442.  Organization</p>
<p align="justify" class="A0002">A recognized political party shall be controlled and directed by one state central committee and a parish executive committee for each parish.</p>
<p align="justify" class="A0002">Acts 1976, No. 697, §1, eff. Jan. 1, 1978.</p>
