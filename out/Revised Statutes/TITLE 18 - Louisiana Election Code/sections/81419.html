<h1>RS 18:1414 - Code of Civil Procedure</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=81419">https://www.legis.la.gov/legis/Law.aspx?d=81419</a></div>
<p align="justify" class="A0001">§1414.  Code of Civil Procedure</p>
<p align="justify" class="A0002">Any procedural matter not specifically provided for in this Code shall be governed by the Code of Civil Procedure.</p>
<p align="justify" class="A0002">Added by Acts 1980, No. 506, §1, eff. Jan. 1, 1981.</p>
