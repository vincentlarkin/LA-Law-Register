<h1>RS 18:42 - Rule making power</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=81556">https://www.legis.la.gov/legis/Law.aspx?d=81556</a></div>
<p align="justify" class="A0001">§42.  Rule making power</p>
<p align="justify" class="A0002">The board shall have power to adopt and promulgate rules and regulations necessary to implement the provisions of this Part.</p>
<p align="justify" class="A0002">Acts 1989, No. 45, §1.</p>
