<p align="justify" class="A0001">§57.  Arbor Day </p>
<p align="justify" class="A0002">The third Friday in January is hereby designated as Arbor Day throughout the state of Louisiana. </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 217, §1. </p>
