<p align="justify" class="A0001">§58.3.  Ronald Reagan Day</p>
<p align="justify" class="A0002">To honor one of America's greatest presidents, February sixth shall annually be recognized and designated as Ronald Reagan Day throughout the state of Louisiana.</p>
<p align="justify" class="A0002">Acts 2004, No. 680, §1.</p>
