<h1>RS 1:9 - Use of disjunctive</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=74107">https://www.legis.la.gov/legis/Law.aspx?d=74107</a></div>
<p align="justify" class="A0001">§9.  Use of disjunctive </p>
<p align="justify" class="A0002">Unless it is otherwise clearly indicated by the context, whenever the term "or" is used in the Revised Statutes, it is used in the disjunctive and does not mean "and/or". </p>
<p align="justify" class="A0003"><br/></p>
