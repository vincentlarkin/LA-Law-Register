<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt">§55.1.  Days of public rest; Juneteenth Day</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>The third Saturday in June, Juneteenth Day, shall be a day of public rest and a legal
