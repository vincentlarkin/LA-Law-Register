<p align="justify" class="A0001">§1146.  Private sponsor</p>
<p align="justify" class="A0002">The department shall endeavor to locate a private sector sponsor or group of sponsors to assume administration of the Venture Capital Network.</p>
<p align="justify" class="A0002">Acts 1987, No. 449, §1.</p>
