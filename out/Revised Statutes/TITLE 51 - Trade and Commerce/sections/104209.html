<h1>RS 51:1946 - Other remedies</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104209">https://www.legis.la.gov/legis/Law.aspx?d=104209</a></div>
<p align="justify" class="A0001">§1946.  Other remedies </p>
<p align="justify" class="A0002">Nothing in this Chapter shall in any way limit the rights or remedies which are otherwise available to a consumer under any other law.  </p>
<p align="justify" class="A0002">Acts 1984, No. 228, §1.  </p>
