<p align="justify" class="A0001">§543.  Purchasers and carriers; penalty </p>
<p align="justify" class="A0002">Whoever violates R.S. 51:541 or 51:542 shall be fined not less than fifty dollars nor more than one hundred dollars for each offense.  </p>
