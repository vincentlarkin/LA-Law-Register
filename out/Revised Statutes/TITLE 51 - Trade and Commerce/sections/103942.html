<h1>RS 51:121 - Commerce defined</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=103942">https://www.legis.la.gov/legis/Law.aspx?d=103942</a></div>
<p align="center" class="A0001">PART IV.  MONOPOLIES </p>
<p align="justify" class="A0002">§121.  Commerce defined </p>
<p align="justify" class="A0003">Commerce means trade or commerce within the geographic boundaries of this state.</p>
<p align="justify" class="A0003">Acts 2003, No. 933, §4.</p>
