<h1>RS 51:667 - Penalty</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104622">https://www.legis.la.gov/legis/Law.aspx?d=104622</a></div>
<p align="justify" class="A0001">§667.  Penalty </p>
<p align="justify" class="A0002">Whoever violates this Part shall be fined not more than five hundred dollars, or imprisoned for not more than six months, or both.  </p>
