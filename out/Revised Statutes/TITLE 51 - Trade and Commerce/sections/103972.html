<p align="center" class="A0001">SUBPART C.  LOUISIANA TOURISM PROMOTION DISTRICT ACT</p>
<p align="justify" class="A0002">§1281.  Short title </p>
<p align="justify" class="A0003">This Subpart shall be known and be cited as the "Louisiana Tourism Promotion District Act".  </p>
<p align="justify" class="A0003">Acts 1990, No. 1038, §1, eff. July 26, 1990.  </p>
