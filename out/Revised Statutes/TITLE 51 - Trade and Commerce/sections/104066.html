<h1>RS 51:148 - Discovery; adjournment of examination</h1>

<p align="justify" class="A0001">§148.  Discovery; adjournment of examination </p>
<p align="justify" class="A0002">The officer designated under the authority of R.S. 51:144 may adjourn the examination from time to time, and witnesses shall attend accordingly.  </p>
