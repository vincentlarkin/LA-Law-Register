<p align="justify" class="A0001">§1455.  Prescription </p>
<p align="justify" class="A0002">No such suit shall be maintained unless commenced within two years after cancellation of, or failure to renew such franchise.  </p>
<p align="justify" class="A0002">Added by Acts 1974, No. 628, §1.  </p>
