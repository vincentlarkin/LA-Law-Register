<h1>RS 51:912.30 - Mobile homes not covered</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104726">https://www.legis.la.gov/legis/Law.aspx?d=104726</a></div>
<p align="justify" class="A0001">§912.30.  Mobile homes not covered</p>
<p align="justify" class="A0002">The provisions of this Part do not apply to the installation and setup of mobile homes in Louisiana.</p>
<p align="justify" class="A0002">Acts 2001, No. 718, §2.</p>
