<h1>RS 51:1824 - Unfair practice</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104158">https://www.legis.la.gov/legis/Law.aspx?d=104158</a></div>
<p align="justify" class="A0001">§1824.  Unfair practice </p>
<p align="justify" class="A0002">A violation of any of the provisions of this Chapter shall constitute an unfair practice under the provisions of R.S. 51:1401 through R.S. 51:1418.  </p>
<p align="justify" class="A0002">Added by Acts 1981, No. 814, §1.  </p>
