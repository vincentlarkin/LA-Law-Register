<h1>RS 51:928 - Compensation of board members</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104746">https://www.legis.la.gov/legis/Law.aspx?d=104746</a></div>
<p align="justify" class="A0001">§928.  Compensation of board members</p>
<p align="justify" class="A0002">Appointed members of the board shall serve without compensation.</p>
<p align="justify" class="A0002">Acts 1964, No. 403, §1; Acts 2012, No. 32, §1, eff. May 4, 2012.</p>
