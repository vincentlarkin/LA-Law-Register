<h1>RS 51:668 - Cumulative nature of law</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=104623">https://www.legis.la.gov/legis/Law.aspx?d=104623</a></div>
<p align="justify" class="A0001">§668.  Cumulative nature of law </p>
<p align="justify" class="A0002">The provisions of this Part shall be cumulative of each other and of all other laws in any way affecting the subject matter of this Part now in force in this state.  </p>
