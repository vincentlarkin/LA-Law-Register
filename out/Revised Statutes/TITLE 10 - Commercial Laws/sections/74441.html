<h1>RS 10:9-339 - Priority subject to subordination</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=74441">https://www.legis.la.gov/legis/Law.aspx?d=74441</a></div>
<p align="justify" class="A0001">§9-339.  Priority subject to subordination</p>
<p align="justify" class="A0002">This Chapter does not preclude subordination by agreement by a person entitled to priority.</p>
<p align="justify" class="A0002">Acts 2001, No. 128, §1, eff. July 1, 2001.</p>
