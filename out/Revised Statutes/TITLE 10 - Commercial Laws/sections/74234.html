<h1>RS 10:4A-102 - Subject Matter</h1>

<p align="justify" class="A0001">§4A-102.  Subject Matter </p>
<p align="justify" class="A0002">Except as otherwise provided in R.S. 10:4A-108, this Chapter applies to funds transfers defined in R.S. 10:4A-104.</p>
<p align="justify" class="A0002">Added by Acts 1990, No. 1079, §4, eff. Sept. 1, 1990.</p>
