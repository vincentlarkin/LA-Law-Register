<h1>RS 10:1-102 - Scope of Chapter</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=74110">https://www.legis.la.gov/legis/Law.aspx?d=74110</a></div>
<p align="justify" class="A0001">§1-102.  Scope of Chapter</p>
<p align="justify" class="A0002">This Chapter applies to a transaction to the extent that it is governed by another Chapter of this Title.</p>
<p align="justify" class="A0002">Added by Acts 1974, No. 92, §1, eff.  Jan. 1, 1975 ; Acts 2006, No. 533, §1.</p>
