<h1>RS 39:783 - Endorsing name on ballot</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=96595">https://www.legis.la.gov/legis/Law.aspx?d=96595</a></div>
<p align="justify" class="A0001">§783.  Endorsing name on ballot</p>
<p align="justify" class="A0002">In all elections held under the provisions of this Part, the voter shall endorse his name on his ballot before depositing it in the ballot box.</p>
