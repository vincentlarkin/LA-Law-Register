<h1>RS 39:1542 - Worker's compensation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=96037">https://www.legis.la.gov/legis/Law.aspx?d=96037</a></div>
<p align="justify" class="A0001">§1542.  Worker's compensation</p>
<p align="justify" class="A0002">The state shall become self-insured for worker's compensation coverage by January 1, 1981.</p>
<p align="justify" class="A0002">Added by Acts 1980, No. 520, §1, eff. July 1, 1980.  Acts 1983, 1st Ex.Sess., No. 1, §6.</p>
