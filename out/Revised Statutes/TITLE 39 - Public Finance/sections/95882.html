<h1>RS 39:1410.46 - Execution of notes</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95882">https://www.legis.la.gov/legis/Law.aspx?d=95882</a></div>
<p align="justify" class="A0001">§1410.46.  Execution of notes</p>
<p align="justify" class="A0002">The notes shall be executed in such manner as may be provided by the resolution authorizing their issuance.</p>
<p align="justify" class="A0002">Acts 1991, No. 827, §1.</p>
