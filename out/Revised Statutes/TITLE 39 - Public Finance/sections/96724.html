<h1>RS 39:995 - Bonds as negotiable instruments</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=96724">https://www.legis.la.gov/legis/Law.aspx?d=96724</a></div>
<p align="justify" class="A0001">§995.  Bonds as negotiable instruments</p>
<p align="justify" class="A0002">All bonds issued under this Part shall constitute negotiable instruments within the meaning of the negotiable instruments law.</p>
<p align="justify" class="A0002">Acts 1964, No. 520, §5.</p>
