<h1>RS 31:127 - Lessee's right to assign or sublease</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87818">https://www.legis.la.gov/legis/Law.aspx?d=87818</a></div>
<p align="justify" class="A0001">§127.  Lessee's right to assign or sublease </p>
<p align="justify" class="A0002">The lessee's interest in a mineral lease may be assigned or subleased in whole or in part.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §127, eff. Jan. 1, 1975.  </p>
