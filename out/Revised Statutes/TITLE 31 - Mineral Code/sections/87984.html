<h1>RS 31:71 - Partial unitization not a division</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87984">https://www.legis.la.gov/legis/Law.aspx?d=87984</a></div>
<p align="justify" class="A0001">§71.  Partial unitization not a division </p>
<p align="justify" class="A0002">Unitization of a portion of a tract burdened by a mineral servitude does not divide the servitude.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §71, eff. Jan. 1, 1975.  </p>
