<h1>RS 31:148 - Manner of enforcement</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87842">https://www.legis.la.gov/legis/Law.aspx?d=87842</a></div>
<p align="justify" class="A0001">§148.  Manner of enforcement </p>
<p align="justify" class="A0002">The mineral lessor may enforce his right of pledge in the same manner as the right of pledge accorded other lessors.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §148, eff. Jan. 1, 1975.  </p>
