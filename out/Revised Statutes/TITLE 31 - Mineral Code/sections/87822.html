<p align="justify" class="A0001">§130.  Lease not divided by partial assignment or sublease </p>
<p align="justify" class="A0002">A partial assignment or partial sublease does not divide a mineral lease.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §130, eff. Jan. 1, 1975.  </p>
