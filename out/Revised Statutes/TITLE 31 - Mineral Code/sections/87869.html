<h1>RS 31:17 - Rescission for lesion beyond moiety unavailable</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87869">https://www.legis.la.gov/legis/Law.aspx?d=87869</a></div>
<p align="justify" class="A0001">§17.  Rescission for lesion beyond moiety unavailable </p>
<p align="justify" class="A0002">A sale of a mineral right is not subject to rescission for lesion beyond moiety.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §1, eff. Jan. 1, 1975.  </p>
