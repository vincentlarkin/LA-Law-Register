<h1>RS 31:134 - Right to relief for violation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87826">https://www.legis.la.gov/legis/Law.aspx?d=87826</a></div>
<p align="justify" class="A0001">§134.  Right to relief for violation </p>
<p align="justify" class="A0002">If a mineral lease is violated, an aggrieved party is entitled to any appropriate relief provided by law.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §134, eff. Jan. 1, 1975.  </p>
