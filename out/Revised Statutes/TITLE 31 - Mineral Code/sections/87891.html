<h1>RS 31:19 - Capacity to create mineral rights</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87891">https://www.legis.la.gov/legis/Law.aspx?d=87891</a></div>
<p align="justify" class="A0001">§19.  Capacity to create mineral rights </p>
<p align="justify" class="A0002">Capacity to create a mineral right is established by the laws governing capacity to alienate immovables.  </p>
<p align="justify" class="A0002">Acts 1974, No. 50, §1, eff. Jan. 1, 1975.  </p>
