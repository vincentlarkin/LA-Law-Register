<h1>RS 16:107 - Fees collected for convictions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=79473">https://www.legis.la.gov/legis/Law.aspx?d=79473</a></div>
<p align="justify" class="A0001">§107.  Fees collected for convictions </p>
<p align="justify" class="A0002">All fees collected for convictions in said district courts shall be paid into the respective parish treasuries.  </p>
<p align="justify" class="A0002">Added by Acts 1950, No. 345, §5.  </p>
