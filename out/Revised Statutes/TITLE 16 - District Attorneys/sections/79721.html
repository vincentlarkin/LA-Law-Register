<p align="justify" class="A0001">§893.  Assistant district attorney </p>
<p align="justify" class="A0002">The office of the first assistant district attorney for the Thirty-Eighth Judicial District of Louisiana is created.  </p>
<p align="justify" class="A0002">Added by Acts 1981, No. 694, §2, eff. July 20, 1981.</p>
