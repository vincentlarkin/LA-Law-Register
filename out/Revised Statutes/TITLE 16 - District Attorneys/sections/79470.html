<h1>RS 16:104 - Warrant</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=79470">https://www.legis.la.gov/legis/Law.aspx?d=79470</a></div>
<p align="justify" class="A0001">§104.  Warrant </p>
<p align="justify" class="A0002">Said salaries shall be paid monthly to the district attorney of said district on his own warrant, and drawn on the secretary or treasurer of each of said parishes.  </p>
<p align="justify" class="A0002">Added by Acts 1950, No. 345, §2.  </p>
