<p align="justify" class="A0001">§242.  Fees to be paid to parish treasurer </p>
<p align="justify" class="A0002">All fees collected by the district attorney shall be paid to the parish treasurer.  </p>
<p align="justify" class="A0002">Acts 1979, No. 635, §4, eff. March 1, 1980.  </p>
