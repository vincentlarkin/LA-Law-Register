<h1>RS 17:4049 - Other waiver provisions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=727240">https://www.legis.la.gov/legis/Law.aspx?d=727240</a></div>
<p align="justify" class="A0001">§4049.  Other waiver provisions</p>
<p align="justify" class="A0002">The provisions of this Chapter shall not be applicable to any waiver otherwise provided for by law or rule.</p>
<p align="justify" class="A0002">Acts 2010, No. 749, §1, eff. June 29, 2010.</p>
