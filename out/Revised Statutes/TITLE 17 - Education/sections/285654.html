<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=285654">https://www.legis.la.gov/legis/Law.aspx?d=285654</a></div>
<p align="justify" class="A0001">§3042.66.  Funding</p>
<p align="justify" class="A0002">The commission may receive and accept funds from public and private sources to meet administrative and other expenses of the implementation of this Chapter.</p>
<p align="justify" class="A0002">Acts 2004, No. 809, §1, eff. July 12, 2004.</p>
