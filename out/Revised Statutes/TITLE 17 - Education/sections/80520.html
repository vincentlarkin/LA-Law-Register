<h1>RS 17:3041.15 - Rules and regulations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=80520">https://www.legis.la.gov/legis/Law.aspx?d=80520</a></div>
<p align="justify" class="A0001">§3041.15.  Rules and regulations</p>
<p align="justify" class="A0002">The commission shall prescribe such rules and regulations as it deems necessary and proper to implement the provisions of this Chapter.</p>
<p align="justify" class="A0002">Acts 1997, No. 281, §1.</p>
