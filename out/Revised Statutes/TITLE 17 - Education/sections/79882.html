<p align="justify" class="A0001">§1523.  Administration</p>
<p align="justify" class="A0002">The Board of Supervisors of Louisiana State University and Agricultural and Mechanical College shall administer the college.</p>
<p align="justify" class="A0002">Added by Acts 1964, No. 74, §3.</p>
