<h1>RS 17:1180 - Sabbatical leave not to preclude salary increase</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=79770">https://www.legis.la.gov/legis/Law.aspx?d=79770</a></div>
<p align="justify" class="A0001">§1180.  Sabbatical leave not to preclude salary increase</p>
<p align="justify" class="A0002">No person on sabbatical leave shall be denied the regular increment of increase in salary because of absence on sabbatical leave.</p>
