<p align="justify" class="A0001">§2806.  Organizers</p>
<p align="justify" class="A0002">Five or more natural persons, or two or more cooperatives, may organize a cooperative in the manner hereinafter provided.</p>
<p align="justify" class="A0002">Added by Acts 1958, No. 257, §6.</p>
