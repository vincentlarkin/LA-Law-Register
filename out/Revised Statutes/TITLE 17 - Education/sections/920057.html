<h1>RS 17:407.95 - Rules</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=920057">https://www.legis.la.gov/legis/Law.aspx?d=920057</a></div>
<p align="justify" class="A0001">§407.95.  Rules</p>
<p align="justify" class="A0002">The state board shall adopt all rules and regulations required in this Part in accordance with the Administrative Procedure Act.</p>
<p align="justify" class="A0002">Acts 2014, No. 717, §1, eff. June 18, 2014.</p>
