<h1>RS 38:3087.162 - Location</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95325">https://www.legis.la.gov/legis/Law.aspx?d=95325</a></div>
<p align="justify" class="A0001">§3087.162.  Location</p>
<p align="justify" class="A0002">The Turkey Creek Reservoir District is created out of the watershed of that portion of Turkey Creek located within the boundaries of the parish of Franklin.</p>
<p align="justify" class="A0002">Acts 2001, No. 475, §1.</p>
