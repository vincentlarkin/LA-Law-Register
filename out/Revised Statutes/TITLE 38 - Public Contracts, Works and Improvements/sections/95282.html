<h1>RS 38:3087.112 - Location</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95282">https://www.legis.la.gov/legis/Law.aspx?d=95282</a></div>
<p align="justify" class="A0001">§3087.112.  Location</p>
<p align="justify" class="A0002">The district shall be comprised of all of Concordia Parish, to  include precincts 4-6, 5-3, 5-4, 5-5, 5-6, and 5-7.</p>
<p align="justify" class="A0002">Acts 1999, No. 588, §1; Acts 2014, No. 207, §1.</p>
