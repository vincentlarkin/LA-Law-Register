<h1>RS 38:2194 - Exemptions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=94909">https://www.legis.la.gov/legis/Law.aspx?d=94909</a></div>
<p class="A0001"><br/></p>
<p align="justify" class="A0002">§2194.  Exemptions </p>
<p align="justify" class="A0003">Notwithstanding any provision of law to the contrary, the provisions of this Chapter shall not apply to purchases of natural gas by political subdivisions.  </p>
<p align="justify" class="A0003">Acts 1987, No. 793, §1, eff. July 17, 1987.  </p>
