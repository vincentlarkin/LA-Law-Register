<h1>RS 38:2235 - Application</h1>

<p align="justify" class="A0002">§2235.  Application </p>
<p align="justify" class="A0003">The provisions of this Part shall be applicable to any political subdivision of the state as defined in Article VI, Section 44 of the Constitution of Louisiana.  </p>
<p align="justify" class="A0003">Acts 1988, No. 523, §1.  </p>
