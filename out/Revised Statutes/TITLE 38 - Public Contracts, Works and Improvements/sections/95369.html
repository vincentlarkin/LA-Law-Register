<h1>RS 38:3087.52 - Location</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95369">https://www.legis.la.gov/legis/Law.aspx?d=95369</a></div>
<p align="justify" class="A0001">§3087.52.  Location</p>
<p align="justify" class="A0002">The district shall be comprised of the territory within Voting District Seven of Bienville Parish as such district was established on June 17, 1995.</p>
<p align="justify" class="A0002">Acts 1995, No. 443, §2, eff. June 17, 1995.</p>
