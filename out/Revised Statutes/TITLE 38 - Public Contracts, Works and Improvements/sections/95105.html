<p align="justify" class="A0002">§2702.  Location </p>
<p align="justify" class="A0003">The area comprising all of Red River Parish shall be the boundary of the district.  </p>
<p align="justify" class="A0003">Acts 1958, No. 474, §2; Acts 1989, No. 176, §1.  </p>
