<p align="justify" class="A0001">§3085.8.  Taxes </p>
<p align="justify" class="A0002">The board does not have authority to levy taxes of any kind.  </p>
<p align="justify" class="A0002">Added by Acts 1975, No. 28, §1.  </p>
