<h1>RS 38:362 - Right to trial by jury</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95541">https://www.legis.la.gov/legis/Law.aspx?d=95541</a></div>
<p align="justify" class="A0001">§362.  Right to trial by jury </p>
<p align="justify" class="A0002">In a proceeding pursuant to this Part any party has the right to demand a trial by jury to determine just compensation.  </p>
<p align="justify" class="A0002">Acts 1985, No. 785, §1, eff. July 22, 1985.  </p>
