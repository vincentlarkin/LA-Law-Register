<h1>RS 38:1643 - Exemption of bonds from taxation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=94674">https://www.legis.la.gov/legis/Law.aspx?d=94674</a></div>
<p align="justify" class="A0001">§1643.  Exemption of bonds from taxation </p>
<p align="justify" class="A0002">All bonds issued by any drainage or sub-drainage district created, organized or reorganized under the provisions of this Part, shall be exempt from taxation.  </p>
