<h1>RS 38:372 - Time for peremptory challenge</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=95551">https://www.legis.la.gov/legis/Law.aspx?d=95551</a></div>
<p align="justify" class="A0001">§372.  Time for peremptory challenge </p>
<p align="justify" class="A0002">After the entire jury has been accepted and sworn, no party has the right to challenge peremptorily.  </p>
<p align="justify" class="A0002">Acts 1985, No. 785, §1, eff. July 22, 1985.  </p>
