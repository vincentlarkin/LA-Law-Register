<p align="center" class="A0001">PART XXVII.  MOREHOUSE PARISH LAKE COMMISSION</p>
<p align="justify" class="A0002">§3087.211.  Creation</p>
<p align="justify" class="A0003">There is hereby created a lake commission to be known as the Morehouse Parish Lake Commission.</p>
<p align="justify" class="A0003">Acts 2003, No. 233, §1.</p>
