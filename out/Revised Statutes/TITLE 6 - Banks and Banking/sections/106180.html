<h1>RS 6:851 - Home office</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=106180">https://www.legis.la.gov/legis/Law.aspx?d=106180</a></div>
<p align="center" class="A0001">PART XI.  OFFICES</p>
<p align="justify" class="A0002">§851.  Home office</p>
<p align="justify" class="A0003">The home office is the principal office of the association.</p>
<p align="justify" class="A0003">Acts 1970, No. 234, §1.  Acts 1983, No. 675, §1; Acts 1995, No. 248, §1, eff. June 14, 1995.</p>
