<h1>RS 6:551.5 - Location; limitation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=285273">https://www.legis.la.gov/legis/Law.aspx?d=285273</a></div>
<p align="justify" class="A0001">§551.5.  Location; limitation</p>
<p align="justify" class="A0002">A foreign bank may, upon compliance with this Part, establish and operate a state agency, branch, bank, or office in any parish of this state.</p>
<p align="justify" class="A0002">Acts 2004, No. 420, §1.</p>
