<h1>RS 6:831 - Shares or savings accounts as additional security</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=106175">https://www.legis.la.gov/legis/Law.aspx?d=106175</a></div>
<p align="justify" class="A0001">§831.  Shares or savings accounts as additional security</p>
<p align="justify" class="A0002">An association may accept its own shares or its savings accounts as additional security.</p>
<p align="justify" class="A0002">Acts 1983, No. 675, §1.</p>
