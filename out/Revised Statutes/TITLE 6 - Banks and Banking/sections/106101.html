<h1>RS 6:704 - Organization</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=106101">https://www.legis.la.gov/legis/Law.aspx?d=106101</a></div>
<p align="center" class="A0001">PART II.  ORGANIZATION AND INCORPORATION</p>
<p align="justify" class="A0002">§704.  Organization</p>
<p align="justify" class="A0003">Any number of natural persons, not less than five, who are residents of the state, may organize an association.</p>
<p align="justify" class="A0003">Acts 1983, No. 675, §1.</p>
