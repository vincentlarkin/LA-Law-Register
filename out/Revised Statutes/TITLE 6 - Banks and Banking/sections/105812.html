<h1>RS 6:130 - Relocation of main office</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=105812">https://www.legis.la.gov/legis/Law.aspx?d=105812</a></div>
<p align="justify" class="A0001">§130.  Relocation of main office</p>
<p align="justify" class="A0002">The commissioner shall promulgate rules and regulations providing for the establishment and relocation of bank offices.</p>
<p align="justify" class="A0002">Acts 1995, No. 1248, §1, eff. June 29, 1995.</p>
