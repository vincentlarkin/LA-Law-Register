<h1>RS 6:905 - Limitation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=106219">https://www.legis.la.gov/legis/Law.aspx?d=106219</a></div>
<p align="justify" class="A0001">§905.  Limitation</p>
<p align="justify" class="A0002">No conversion of a federal association, direct or indirect, shall be permitted except as specifically authorized by this Chapter.</p>
<p align="justify" class="A0002">Acts 1970, No. 234, §1.  Acts 1983, No. 675, §1.</p>
