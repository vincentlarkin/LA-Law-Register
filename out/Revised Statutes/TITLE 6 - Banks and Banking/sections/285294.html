<h1>RS 6:551.25 - Examination authority</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=285294">https://www.legis.la.gov/legis/Law.aspx?d=285294</a></div>
<p align="justify" class="A0001">§551.25.  Examination authority</p>
<p align="justify" class="A0002">The Office of Financial Institutions shall have full authority to examine, at any time, any branch, agency, or other office authorized under this Chapter.</p>
<p align="justify" class="A0002">Acts 2004, No. 420, §1.</p>
