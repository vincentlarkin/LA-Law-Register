<h1>RS 6:1043 - Disclosure of responsibility</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=105672">https://www.legis.la.gov/legis/Law.aspx?d=105672</a></div>
<p align="justify" class="A0001">§1043.  Disclosure of responsibility</p>
<p align="justify" class="A0002">Every check sold by a licensee, directly or through an agent, shall bear the name of the licensee clearly imprinted thereon.</p>
<p align="justify" class="A0002">Acts 1966, No. 476, §13.</p>
