<h1>RS 37:1570 - Waiver of liability</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93389">https://www.legis.la.gov/legis/Law.aspx?d=93389</a></div>
<p align="justify" class="A0001">§1570.  Waiver of liability</p>
<p align="justify" class="A0002">No veterinarian shall be liable for any act or omission of a registered equine dentist.</p>
<p align="justify" class="A0002">Acts 1999, No. 980, §1, eff. July 9, 1999.</p>
