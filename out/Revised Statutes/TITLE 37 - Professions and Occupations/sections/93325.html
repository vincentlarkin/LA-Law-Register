<p align="justify" class="A0001">§1484.  Reciprocal licenses</p>
<p align="justify" class="A0002">The board may enter into reciprocal agreements with other states regarding home inspector licensing.</p>
<p align="justify" class="A0002">Acts 1999, No. 61, §2.</p>
