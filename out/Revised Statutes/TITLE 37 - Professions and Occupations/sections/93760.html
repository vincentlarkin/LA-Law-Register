<p align="justify" class="A0001">§2702.  Short title</p>
<p align="justify" class="A0002">This Chapter shall be known and may be cited as the "Louisiana Social Work Practice Act".</p>
<p align="justify" class="A0002">Added by Acts 1972, No. 706, §1; Acts 1999, No. 1309, §7, eff. Jan. 1, 2000.</p>
