<h1>RS 37:2598 - Review</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93738">https://www.legis.la.gov/legis/Law.aspx?d=93738</a></div>
<p align="justify" class="A0001">§2598.  Review </p>
<p align="justify" class="A0002">All final administrative decisions of the director hereunder shall be subject to judicial review in the district court of the parish in which the licensee is doing business.  </p>
<p align="justify" class="A0002">Acts 1970, No. 423, §18.  </p>
