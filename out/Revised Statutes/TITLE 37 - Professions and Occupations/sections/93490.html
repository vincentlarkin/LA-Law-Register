<h1>RS 37:1803 - Pledgor's liability prohibited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93490">https://www.legis.la.gov/legis/Law.aspx?d=93490</a></div>
<p align="justify" class="A0001">§1803.  Pledgor's liability prohibited</p>
<p align="justify" class="A0002">A pledgor shall have no obligation to redeem pledged things or make any payment on any pawn transaction.</p>
<p align="justify" class="A0002">Acts 1993, No. 391, §1, eff. Sept. 1, 1993.</p>
