<h1>RS 37:787 - Duty of attorney general</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=94451">https://www.legis.la.gov/legis/Law.aspx?d=94451</a></div>
<p align="justify" class="A0001">§787.  Duty of attorney general </p>
<p align="justify" class="A0002">The attorney general shall see that all violations of the provisions of this Chapter are vigorously and promptly prosecuted by the various district attorneys throughout the state.  </p>
