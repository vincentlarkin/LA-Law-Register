<h1>RS 37:343 - Seal of board</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=94126">https://www.legis.la.gov/legis/Law.aspx?d=94126</a></div>
<p align="justify" class="A0001">§343.  Seal of board </p>
<p align="justify" class="A0002">The board shall adopt and use a common seal for the authentication of its orders and records.  </p>
<p align="justify" class="A0002">Acts 1964, No. 309, §1.  Acts 1984, No. 238, §1.  </p>
