<h1>RS 37:3209 - Examination</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93996">https://www.legis.la.gov/legis/Law.aspx?d=93996</a></div>
<p align="justify" class="A0001">§3209.  Examination </p>
<p align="justify" class="A0002"> Each applicant for licensure shall be required to pass a certification examination designated and approved by the board.</p>
<p align="justify" class="A0002">Acts 1984, No. 485, §1; Acts 2014, No. 250, §1.</p>
