<p align="justify" class="A0001">§3415.5.  Forms</p>
<p align="justify" class="A0002">An applicant for a license as an appraisal management company in this state shall submit to the board an application on a form prescribed by the board.</p>
<p align="justify" class="A0002">Acts 2009, No. 502, §1, eff. Jan. 1, 2010.</p>
