<h1>RS 37:1802 - Minors pledging things</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93489">https://www.legis.la.gov/legis/Law.aspx?d=93489</a></div>
<p align="justify" class="A0001">§1802.  Minors pledging things</p>
<p align="justify" class="A0002">No natural person under the age of eighteen years shall deposit in pledge with a pawnbroker any thing of value for money loaned.</p>
<p align="justify" class="A0002">Acts 1993, No. 391, §1, eff. Sept. 1, 1993.</p>
