<h1>RS 37:1204 - Certificates to be signed by board</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93098">https://www.legis.la.gov/legis/Law.aspx?d=93098</a></div>
<p align="justify" class="A0001">§1204.  Certificates to be signed by board</p>
<p align="justify" class="A0002">The board members shall sign all original pharmacist certificates of licensure issued by the board .</p>
<p align="justify" class="A0002">Acts 1999, No. 767, §1.</p>
