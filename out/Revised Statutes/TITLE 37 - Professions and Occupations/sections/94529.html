<h1>RS 37:963 - Domicile of board</h1>

<p align="justify" class="A0001">§963.  Domicile of board</p>
<p align="justify" class="A0002">The domicile of the board shall be Jefferson Parish, Louisiana.</p>
<p align="justify" class="A0002">Acts 2014, No. 120, §1, eff. May 16, 2014.</p>
