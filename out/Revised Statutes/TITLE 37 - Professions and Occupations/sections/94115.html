<h1>RS 37:3413 - Penalty</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=94115">https://www.legis.la.gov/legis/Law.aspx?d=94115</a></div>
<p align="justify" class="A0001">§3413.  Penalty</p>
<p align="justify" class="A0002">Any person who violates any provision of this Chapter shall be fined not more than five thousand dollars, imprisoned for not more than six months, or both.</p>
<p align="justify" class="A0002">Acts 1995, No. 690, §2; Acts 2003, No. 341, §1.</p>
