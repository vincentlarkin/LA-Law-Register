<h1>RS 37:1206 - Silver certificate</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93100">https://www.legis.la.gov/legis/Law.aspx?d=93100</a></div>
<p align="justify" class="A0001">§1206.  Silver certificate</p>
<p align="justify" class="A0002">The board may issue a silver certificate for twenty-five continuous years of registration.</p>
<p align="justify" class="A0002">Added by Acts 1956, No. 272, §1; Acts 1999, No. 767, §1.</p>
