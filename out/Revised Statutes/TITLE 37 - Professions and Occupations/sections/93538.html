<h1>RS 37:1924 - Penalty</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93538">https://www.legis.la.gov/legis/Law.aspx?d=93538</a></div>
<p align="justify" class="A0001">§1924.  Penalty </p>
<p align="justify" class="A0002">Any itinerant vendor convicted of violating the provisions of this Part shall be fined not less than one hundred dollars nor more than one thousand dollars.  </p>
<p align="justify" class="A0002">Added by Acts 1982, No. 815, §1.  </p>
