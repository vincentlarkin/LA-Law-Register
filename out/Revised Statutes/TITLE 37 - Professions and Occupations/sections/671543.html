<h1>RS 37:1360.72 - Transfer of files</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=671543">https://www.legis.la.gov/legis/Law.aspx?d=671543</a></div>
<p align="justify" class="A0001">§1360.72.  Transfer of files</p>
<p align="justify" class="A0002">The Louisiana State Board of Examiners of Psychologists shall provide the board with copies of all files relating to medical psychologists.</p>
<p align="justify" class="A0002">Acts 2009, No. 251, §11, eff. July 1, 2009.</p>
