<h1>RS 37:1044 - Removal of members</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93012">https://www.legis.la.gov/legis/Law.aspx?d=93012</a></div>
<p align="justify" class="A0001">§1044.  Removal of members </p>
<p align="justify" class="A0002">The governor may remove any member of the board for inefficiency, neglect of duty or a violation of the provisions of this Chapter.  </p>
