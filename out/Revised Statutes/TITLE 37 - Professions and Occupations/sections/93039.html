<h1>RS 37:107 - Waiver of review panel</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93039">https://www.legis.la.gov/legis/Law.aspx?d=93039</a></div>
<p align="justify" class="A0001">§107.  Waiver of review panel</p>
<p align="justify" class="A0002">By written agreement of both parties, the use of the public accountant review panel may be waived.</p>
<p align="justify" class="A0002">Acts 1997, No. 747, §1.</p>
