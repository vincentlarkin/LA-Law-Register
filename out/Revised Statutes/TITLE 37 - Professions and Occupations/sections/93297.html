<h1>RS 37:1458 - Penalty</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=93297">https://www.legis.la.gov/legis/Law.aspx?d=93297</a></div>
<p align="justify" class="A0001">§1458.  Penalty</p>
<p align="justify" class="A0002">Whoever violates any of the provisions of this Chapter shall be fined not more than two thousand dollars or imprisoned not more than five years, or both.</p>
<p align="justify" class="A0002">Acts 1978, No. 514, §1; Acts 2003, No. 713, §1.</p>
