<h1>RS 29:371 - Intent of Part</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=85563">https://www.legis.la.gov/legis/Law.aspx?d=85563</a></div>
<p align="justify" class="A0001">§371.  Intent of Part </p>
<p align="justify" class="A0002">This Part shall be liberally construed to secure the beneficial interests and purposes thereof and shall apply only to beneficiaries of the veterans administration.  </p>
