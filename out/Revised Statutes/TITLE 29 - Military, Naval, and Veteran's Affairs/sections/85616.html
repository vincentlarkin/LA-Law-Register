<p align="center" class="A0001">PART III.  SOLDIERS' HOME </p>
<p align="justify" class="A0002">§511.  Establishment and location </p>
<p align="justify" class="A0003">There is established in New Orleans a home for the care of soldiers, called the "Soldiers' Home of the State of Louisiana (Camp Nicholls)." </p>
