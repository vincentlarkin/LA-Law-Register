<h1>RS 29:202 - Article 102. Forcing a safeguard</h1>

<p align="justify" class="A0001">§202.  Article 102.  Forcing a safeguard </p>
<p align="justify" class="A0002">Any person subject to this code who forces a safeguard shall be punished as a court-martial may direct.  </p>
<p align="justify" class="A0002">Acts 1974, No. 621, §1.  </p>
