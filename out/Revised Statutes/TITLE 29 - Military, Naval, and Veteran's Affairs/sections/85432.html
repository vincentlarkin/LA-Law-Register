<h1>RS 29:2 - Commander in chief</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=85432">https://www.legis.la.gov/legis/Law.aspx?d=85432</a></div>
<p align="justify" class="A0001">§2.  Commander in chief </p>
<p align="justify" class="A0002">The governor of the state, by virtue of his office, shall be the commander in chief of the militia of the state.  </p>
<p align="justify" class="A0002">Acts 1974, No. 622, §1; Acts 1992, No. 530, §1, eff. July 1, 1992.</p>
