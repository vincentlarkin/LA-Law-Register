<h1>RS 29:14 - Oath of officers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=85364">https://www.legis.la.gov/legis/Law.aspx?d=85364</a></div>
<p align="justify" class="A0001">§14.  Oath of officers </p>
<p align="justify" class="A0002">All officers of the national guard and Louisiana State Guard shall take the oath required by law before entering upon the duties of their office.</p>
<p align="justify" class="A0002">Acts 1974, No. 622, §1.  </p>
