<h1>RS 4:74 - Admission of persons under sixteen</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=96954">https://www.legis.la.gov/legis/Law.aspx?d=96954</a></div>
<p align="justify" class="A0001">§74.  Admission of persons under sixteen</p>
<p align="justify" class="A0002">No person under the age of sixteen shall be admitted to a contest unless accompanied by parent or guardian.</p>
<p align="justify" class="A0002">Acts 1974, No. 553, §1.</p>
