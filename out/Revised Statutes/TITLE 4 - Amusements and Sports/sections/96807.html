<h1>RS 4:182 - Racing of Appaloosa horses</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=96807">https://www.legis.la.gov/legis/Law.aspx?d=96807</a></div>
<p align="justify" class="A0001">§182.  Racing of Appaloosa horses</p>
<p align="justify" class="A0002">All race tracks in Louisiana shall be allowed to schedule races of Appaloosa horses.</p>
<p align="justify" class="A0002">Added by Acts 1974, No. 361, §1.</p>
