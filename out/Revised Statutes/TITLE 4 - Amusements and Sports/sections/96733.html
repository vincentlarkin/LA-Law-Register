<p align="justify" class="A0001">§10.2.  False advertising</p>
<p align="justify" class="A0002">False advertising by banner, word-of-mouth, or otherwise is prohibited.</p>
<p align="justify" class="A0002">Added by Acts 1981, No. 918, §1, eff. Aug. 2, 1981.</p>
