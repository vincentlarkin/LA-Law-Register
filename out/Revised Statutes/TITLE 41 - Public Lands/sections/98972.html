<h1>RS 41:1220 - Trespass</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98972">https://www.legis.la.gov/legis/Law.aspx?d=98972</a></div>
<p align="justify" class="A0001">§1220.  Trespass </p>
<p align="justify" class="A0002">It shall be unlawful for anyone to knowingly trespass upon the leased lands, and thereon to trap, hunt, graze stock or engage in other agricultural pursuits, except as provided in this Part.</p>
