<h1>RS 41:1047 - Advertising rates</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98937">https://www.legis.la.gov/legis/Law.aspx?d=98937</a></div>
<p align="justify" class="A0001">§1047.  Advertising rates </p>
<p align="justify" class="A0002">The newspapers publishing the advertisements of sale provided for in this Part shall receive therefor not more than the legal rate for advertising.</p>
<p align="justify" class="A0002">Added by Acts 1978, No. 405, §1.</p>
