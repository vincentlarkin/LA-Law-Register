<h1>RS 41:1135 - Costs</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=98954">https://www.legis.la.gov/legis/Law.aspx?d=98954</a></div>
<p align="justify" class="A0001">§1135.  Costs </p>
<p align="justify" class="A0002">In the settlement of a controversy under the provisions of R.S. 41:1133 and 41:1134, all costs incident to the settlement shall be paid out of the general fund of the State of Louisiana.</p>
