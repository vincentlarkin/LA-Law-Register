<p style="text-align:left; text-indent: -0.5in; margin-left: 0.5in"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 13pt">§547.  Disposition of fees </span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 13pt"><span>           </span>The fees paid by the homesteader, except as may be otherwise provided

State Treasurer.</span></span></p>
