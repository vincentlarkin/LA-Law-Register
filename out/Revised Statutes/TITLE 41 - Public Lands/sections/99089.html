<h1>RS 41:507 - Disposition of fees</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99089">https://www.legis.la.gov/legis/Law.aspx?d=99089</a></div>
<p align="justify" class="A0001">§507.  Disposition of fees </p>
<p align="justify" class="A0002">The Register of the State Land Office may turn into the state treasury, and the state treasurer may receive, the fees received under the provisions of this Part.</p>
