<h1>RS 41:1087 - Advertising rates</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108524">https://www.legis.la.gov/legis/Law.aspx?d=108524</a></div>
<p align="justify" class="A0001">§1087.  Advertising rates </p>
<p align="justify" class="A0002">The newspapers publishing the advertisements of sale provided for in this Part shall receive therefor not more than the legal rate of advertising. </p>
<p align="justify" class="A0002">Acts 1984, No. 846, §2.</p>
