<h1>RS 32:192 - Riding on motor-driven cycles</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88176">https://www.legis.la.gov/legis/Law.aspx?d=88176</a></div>
<p align="justify" class="A0001">§192.  Riding on motor-driven cycles</p>
<p align="justify" class="A0002">Not more than one person shall be allowed to ride upon a motor-driven cycle. </p>
<p align="justify" class="A0002">Acts 1962, No. 310, §1. </p>
