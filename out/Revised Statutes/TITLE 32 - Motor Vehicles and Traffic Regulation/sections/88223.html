<h1>RS 32:288 - Driving through safety zone prohibited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88223">https://www.legis.la.gov/legis/Law.aspx?d=88223</a></div>
<p align="justify" class="A0001">§288.  Driving through safety zone prohibited</p>
<p align="justify" class="A0002">No vehicle shall at any time be driven through or within a safety zone. </p>
<p align="justify" class="A0002">Acts 1962, No. 310, §1. </p>
