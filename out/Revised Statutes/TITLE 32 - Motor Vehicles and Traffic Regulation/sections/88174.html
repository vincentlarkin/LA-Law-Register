<h1>RS 32:191.2 - Clinging to other vehicles</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88174">https://www.legis.la.gov/legis/Law.aspx?d=88174</a></div>
<p align="justify" class="A0001">§191.2.  Clinging to other vehicles</p>
<p align="justify" class="A0002">No person riding upon a motorcycle shall attach himself or the motorcycle to any other vehicle (or streetcar) on a roadway. </p>
<p align="justify" class="A0002">Added by Acts 1970, No. 538, §5. </p>
