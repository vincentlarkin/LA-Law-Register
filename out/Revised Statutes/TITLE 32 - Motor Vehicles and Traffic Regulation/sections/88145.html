<h1>RS 32:1725 - Criminal penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88145">https://www.legis.la.gov/legis/Law.aspx?d=88145</a></div>
<p align="justify" class="A0001">§1725.  Criminal penalties</p>
<p align="justify" class="A0002">Any violation of this Chapter shall be punishable by a fine of not more than five hundred dollars or by imprisonment for not more than six months, or both. </p>
<p align="justify" class="A0002">Acts 1989, No. 522, §1. </p>
