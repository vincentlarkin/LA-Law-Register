<h1>RS 32:447 - Rules and regulations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88433">https://www.legis.la.gov/legis/Law.aspx?d=88433</a></div>
<p align="justify" class="A0001">§447.  Rules and regulations</p>
<p align="justify" class="A0002">The commissioner shall adopt rules and regulations not inconsistent with this Part in order to fully effectuate the purpose and intent hereof. </p>
<p align="justify" class="A0002">Added by Acts 1975, No. 641, §1. </p>
