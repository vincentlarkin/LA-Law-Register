<h1>RS 32:346 - Brakes on bicycles</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88282">https://www.legis.la.gov/legis/Law.aspx?d=88282</a></div>
<p align="justify" class="A0001">§346.  Brakes on bicycles</p>
<p align="justify" class="A0002">Every bicycle shall be equipped with a brake which will enable the operator to make the braked wheels skid on dry, level, clean pavement. </p>
<p align="justify" class="A0002">Acts 1962, No. 310, §1. </p>
