<h1>RS 32:1423 - Executive head" defined</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=88068">https://www.legis.la.gov/legis/Law.aspx?d=88068</a></div>
<p align="justify" class="A0001">§1423.  "Executive head" defined</p>
<p align="justify" class="A0002">As used in the compact, with reference to this state, the term "executive head" shall mean the governor. </p>
<p align="justify" class="A0002">Added by Acts 1968, No. 273, §16; Acts 1968, No. 296, §1. </p>
