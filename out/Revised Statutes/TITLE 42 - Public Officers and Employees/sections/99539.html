<h1>RS 42:82 - Damages</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99539">https://www.legis.la.gov/legis/Law.aspx?d=99539</a></div>
<p align="justify" class="A0001">§82.  Damages </p>
<p align="justify" class="A0002">If the judgment is in favor of the person alleged to be entitled to the office, he may recover the damages he sustained by reason of the usurpation by the defendant.</p>
