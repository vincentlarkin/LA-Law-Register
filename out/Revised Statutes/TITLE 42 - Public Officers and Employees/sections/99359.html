<h1>RS 42:183 - To whom bond payable</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99359">https://www.legis.la.gov/legis/Law.aspx?d=99359</a></div>
<p align="justify" class="A0001">§183.  To whom bond payable </p>
<p align="justify" class="A0002">The bonds of state officers shall be made payable to the governor, and those of the parish officers to the president of the police jury or other governing authority of the parish.</p>
