<h1>RS 42:72 - Recognition of usurper; penalty</h1>

<p align="justify" class="A0001">§72.  Recognition of usurper; penalty </p>
<p align="justify" class="A0002">Any public officer who gives adhesion to, or in any manner recognizes the authority of any usurper as contemplated by R.S. 42:71, forfeits his office.</p>
