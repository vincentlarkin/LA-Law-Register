<h1>RS 42:288 - Penalties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99401">https://www.legis.la.gov/legis/Law.aspx?d=99401</a></div>
<p align="justify" class="A0001">§288.  Penalties </p>
<p align="justify" class="A0002">Whoever violates any of the provisions of R.S. 42:283 through R.S. 42:287 shall be fined one thousand dollars or imprisoned for six months or both.</p>
