<h1>RS 42:67.3 - Additional qualifications</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99504">https://www.legis.la.gov/legis/Law.aspx?d=99504</a></div>
<p align="justify" class="A0001">§67.3.  Additional qualifications </p>
<p align="justify" class="A0002">The civil service commission is hereby authorized to establish additional qualifications for any position defined in R.S. 42:67.</p>
<p align="justify" class="A0002">Added by Acts 1983, No. 693, §1.</p>
