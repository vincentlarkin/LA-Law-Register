<h1>RS 42:192 - Summary proceedings</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=99368">https://www.legis.la.gov/legis/Law.aspx?d=99368</a></div>
<p align="justify" class="A0001">§192.  Summary proceedings </p>
<p align="justify" class="A0002">All suits brought by a surety under R.S. 42:190 shall be preference cases and shall be tried summarily without the intervention of a jury.</p>
