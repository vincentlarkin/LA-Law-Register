<h1>RS 30:2155 - Prohibitions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87198">https://www.legis.la.gov/legis/Law.aspx?d=87198</a></div>
<p align="justify" class="A0001">§2155.  Prohibitions </p>
<p align="justify" class="A0002">No person shall dispose of solid waste in violation of this Subtitle, the regulations of the secretary, or a permit or order issued by the secretary.</p>
<p align="justify" class="A0002">Acts 1983, No. 97, §1, eff. Feb. 1, 1984.  </p>
