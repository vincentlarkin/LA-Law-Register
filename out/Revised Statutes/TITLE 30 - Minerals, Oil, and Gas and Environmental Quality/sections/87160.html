<p align="justify" class="A0001">§2092.  Compact funding </p>
<p align="justify" class="A0002">The legislature shall appropriate funds as required by Article XV of the Mississippi River Interstate Pollution Phase-Out Compact, R.S. 30:2091.</p>
<p align="justify" class="A0002">Acts 1987, No. 866, §1.  </p>
