<p align="center" class="A0001">CHAPTER 9.  SURFACE MINING AND RECLAMATION ACT</p>
<p align="justify" class="A0002">§901.  Short title</p>
<p align="justify" class="A0003">This Chapter shall be known and may be cited as the "Louisiana Surface Mining and Reclamation Act."</p>
<p align="justify" class="A0003">Added by Acts 1976, No. 141, §1. </p>
