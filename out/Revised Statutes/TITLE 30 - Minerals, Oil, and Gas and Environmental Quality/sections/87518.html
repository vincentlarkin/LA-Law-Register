<h1>RS 30:2531.8 - Duties of law enforcement officers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87518">https://www.legis.la.gov/legis/Law.aspx?d=87518</a></div>
<p align="justify" class="A0001">§2531.8.  Duties of law enforcement officers</p>
<p align="justify" class="A0002">It shall be the duty of all law enforcement officers of this state to enforce the provisions of this Part.</p>
<p align="justify" class="A0002">Acts 1998, 1st Ex. Sess., No. 148, §3.</p>
