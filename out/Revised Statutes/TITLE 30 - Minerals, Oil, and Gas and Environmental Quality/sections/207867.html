<h1>RS 30:2398 - Capital improvements</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=207867">https://www.legis.la.gov/legis/Law.aspx?d=207867</a></div>
<p align="justify" class="A0001">§2398.  Capital improvements</p>
<p align="justify" class="A0002">Any capital improvements made under this Chapter shall qualify for any tax deductions as provided by law.</p>
<p align="justify" class="A0002">Acts 2003, No. 985, §1.</p>
