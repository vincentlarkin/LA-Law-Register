<h1>RS 30:1304 - Enabling clause</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=86953">https://www.legis.la.gov/legis/Law.aspx?d=86953</a></div>
<p align="justify" class="A0001">§1304.  Enabling clause </p>
<p align="justify" class="A0002">Any political subdivision of the state may make, extend, amend, adopt, and carry out plans to promote the purposes of this Chapter.  </p>
<p align="justify" class="A0002">Added by Acts 1979, No. 793, §1.  </p>
