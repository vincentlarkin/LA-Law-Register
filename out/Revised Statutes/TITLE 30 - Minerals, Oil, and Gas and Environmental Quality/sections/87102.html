<h1>RS 30:2050.27 - Computation of time</h1>

<p align="justify" class="A0001">§2050.27.  Computation of time</p>
<p align="justify" class="A0002">The computation of a time period allowed or prescribed in this Chapter is governed by Code of Civil Procedure Article 5059.</p>
<p align="justify" class="A0002">Acts 1995, No. 947, §1, eff. Jan. 1, 1996.</p>
