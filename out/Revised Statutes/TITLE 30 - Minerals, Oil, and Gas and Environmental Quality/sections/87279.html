<h1>RS 30:2251 - Payment of tax</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=87279">https://www.legis.la.gov/legis/Law.aspx?d=87279</a></div>
<p align="justify" class="A0001">§2251.  Payment of tax </p>
<p align="justify" class="A0002">The tax determined to be due under this Chapter shall be due January 1, 1985, and payable on January 1, 1985.  </p>
<p align="justify" class="A0002">Acts 1984, 1st Ex. Sess., No. 8, §1, eff. March 27, 1984.  </p>
