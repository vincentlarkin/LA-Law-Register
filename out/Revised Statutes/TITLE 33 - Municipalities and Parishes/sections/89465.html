<h1>RS 33:197 - Manner of holding election</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89465">https://www.legis.la.gov/legis/Law.aspx?d=89465</a></div>
<p align="justify" class="A0001">§197.  Manner of holding election</p>
<p align="justify" class="A0002">Consolidation elections shall be held in the manner provided by law for regular municipal elections, as far as applicable and except as otherwise provided in this Subpart.</p>
