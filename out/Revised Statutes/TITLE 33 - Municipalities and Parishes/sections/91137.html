<h1>RS 33:4745 - Sub-fire limits</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91137">https://www.legis.la.gov/legis/Law.aspx?d=91137</a></div>
<p align="justify" class="A0001">§4745.  Sub-fire limits </p>
<p align="justify" class="A0002">Such municipalities may establish sub-fire limits adjacent to and outside of fire limits proper, and make reasonable regulations to govern the sub-fire limits.</p>
