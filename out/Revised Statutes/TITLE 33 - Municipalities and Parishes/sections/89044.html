<h1>RS 33:1330 - Protection of property</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89044">https://www.legis.la.gov/legis/Law.aspx?d=89044</a></div>
<p align="justify" class="A0001">§1330.  Protection of property</p>
<p align="justify" class="A0002">The police power of parishes and municipalities shall extend to any property acquired by them under the provisions of this Part.</p>
