<p align="justify" class="A0001">§4684.  Evangeline and St. Landry parishes excepted </p>
<p align="justify" class="A0002">The provisions of this part shall not apply to the parishes of Evangeline and St. Landry.</p>
<p align="justify" class="A0002">Acts 1972, No. 440, §4.</p>
