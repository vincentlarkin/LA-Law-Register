<h1>RS 33:130.756 - Performance audit required</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=452530">https://www.legis.la.gov/legis/Law.aspx?d=452530</a></div>
<p align="justify" class="A0001">§130.756.  Performance audit required</p>
<p align="justify" class="A0002">The department shall contract for a performance audit at the end of the fourth year of implementation of this Subpart.</p>
<p align="justify" class="A0002">Acts 2007, No. 374, §1, eff. July 10, 2007.</p>
