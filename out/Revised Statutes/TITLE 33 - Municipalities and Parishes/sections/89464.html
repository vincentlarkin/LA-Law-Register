<h1>RS 33:1969 - Equal recognition for equal performance</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89464">https://www.legis.la.gov/legis/Law.aspx?d=89464</a></div>
<p align="justify" class="A0001">§1969.  Equal recognition for equal performance </p>
<p align="justify" class="A0002">Equal recognition and compensation shall be received for equal performance of duty and responsibility.</p>
