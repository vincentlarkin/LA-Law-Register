<h1>RS 33:161 - Subsequent elections</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89350">https://www.legis.la.gov/legis/Law.aspx?d=89350</a></div>
<p align="justify" class="A0001">§161.  Subsequent elections</p>
<p align="justify" class="A0002">No election proposing to annex to the corporate limits of any city or town the same contiguous and adjacent lots or land shall be held oftener than once in twelve months.</p>
