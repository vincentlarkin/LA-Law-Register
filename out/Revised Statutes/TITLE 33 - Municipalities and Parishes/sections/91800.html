<h1>RS 33:9505 - Staff</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91800">https://www.legis.la.gov/legis/Law.aspx?d=91800</a></div>
<p align="justify" class="A0001">§9505.  Staff </p>
<p align="justify" class="A0002">The board of commissioners may appoint such staff as is necessary to provide adequate animal control service in the district.  </p>
<p align="justify" class="A0002">Acts 1993, No. 816, §1, eff. June 22, 1993.  </p>
