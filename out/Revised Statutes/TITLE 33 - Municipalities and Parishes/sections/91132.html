<h1>RS 33:4732 - Authority to enforce regulations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91132">https://www.legis.la.gov/legis/Law.aspx?d=91132</a></div>
<p align="justify" class="A0001">§4732.  Authority to enforce regulations </p>
<p align="justify" class="A0002">Municipalities may enforce the ordinances adopted under R.S. 33:4731 by fine or imprisonment, or both.</p>
