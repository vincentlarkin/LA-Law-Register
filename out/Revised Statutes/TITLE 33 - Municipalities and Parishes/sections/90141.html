<h1>RS 33:3316 - Certificates to be tax exempt</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=90141">https://www.legis.la.gov/legis/Law.aspx?d=90141</a></div>
<p align="justify" class="A0001">§3316.  Certificates to be tax exempt</p>
<p align="justify" class="A0002">All certificates issued under the provisions of this Sub-part shall be exempt from taxation.  They shall be acceptable as security for any deposit of public funds.</p>
