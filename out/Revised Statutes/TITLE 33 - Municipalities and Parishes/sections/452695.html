<h1>RS 33:4720.144 - Cumulative clause</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=452695">https://www.legis.la.gov/legis/Law.aspx?d=452695</a></div>
<p align="justify" class="A0001">§4720.144.  Cumulative clause</p>
<p align="justify" class="A0002">The powers conferred by this Chapter shall be in addition and supplemental to the powers conferred by any other law.</p>
<p align="justify" class="A0002">Acts 2007, No. 390, §1, eff. July 10, 2007.</p>
