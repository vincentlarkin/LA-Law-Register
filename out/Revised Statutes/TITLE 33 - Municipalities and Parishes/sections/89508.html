<h1>RS 33:2029 - Review of board action</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89508">https://www.legis.la.gov/legis/Law.aspx?d=89508</a></div>
<p align="justify" class="A0001">§2029.  Review of board action </p>
<p align="justify" class="A0002">The board is a quasi-judicial body.  Its action is reviewable only by a writ of certiorari to the courts.</p>
