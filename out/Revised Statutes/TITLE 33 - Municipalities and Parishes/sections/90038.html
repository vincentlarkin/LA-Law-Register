<h1>RS 33:2802 - Special taxes excepted</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=90038">https://www.legis.la.gov/legis/Law.aspx?d=90038</a></div>
<p align="justify" class="A0001">§2802.  Special taxes excepted </p>
<p align="justify" class="A0002">Taxes authorized in R.S. 33:2801 shall be exclusive of and in addition to taxes levied in pursuance of special elections held by authority of law relating to special taxes.</p>
