<h1>RS 33:2030 - Meetings of board</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89510">https://www.legis.la.gov/legis/Law.aspx?d=89510</a></div>
<p align="justify" class="A0001">§2030.  Meetings of board </p>
<p align="justify" class="A0002">The board shall meet quarterly.  A special meeting shall be called on forty-eight hours' notice by the president at the request of any three members.</p>
