<h1>RS 33:1944 - Duty to wear medal</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89446">https://www.legis.la.gov/legis/Law.aspx?d=89446</a></div>
<p align="justify" class="A0001">§1944.  Duty to wear medal </p>
<p align="justify" class="A0002">Every member of the police or fire department honored with the reward of a medal shall wear the medal when in service or on parade.</p>
