<p align="center" class="A0001">CHAPTER 10-A.  LOUISIANA ENERGY AND POWER AUTHORITY</p>
<p align="justify" class="A0002">§4545.1.  Short Title </p>

<p align="justify" class="A0003">Added by Acts 1979, No. 772, §1, eff. July 20, 1979.</p>
