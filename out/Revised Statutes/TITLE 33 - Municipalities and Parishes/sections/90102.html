<h1>RS 33:2951 - Subscription to corporate stock</h1>

<p align="center" class="A0001">PART IV.  INVESTMENTS</p>
<p align="justify" class="A0002">§2951.  Subscription to corporate stock</p>
<p align="justify" class="A0003">Municipalities and parishes may subscribe to the stock of corporations undertaking works of internal improvement.</p>
