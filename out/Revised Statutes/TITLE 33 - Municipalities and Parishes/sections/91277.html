<h1>RS 33:5053 - Penalty for violation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91277">https://www.legis.la.gov/legis/Law.aspx?d=91277</a></div>
<p align="justify" class="A0001">§5053.  Penalty for violation </p>
<p align="justify" class="A0002">Any person, agent, or attorney in fact who violates R.S. 33:5051 or R.S. 33:5052 shall be fined not less than ten dollars nor more than five hundred dollars for each offense.</p>
