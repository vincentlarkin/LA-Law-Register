<h1>RS 33:2925 - Penalty for violations</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=90093">https://www.legis.la.gov/legis/Law.aspx?d=90093</a></div>
<p align="justify" class="A0001">§2925.  Penalty for violations</p>
<p align="justify" class="A0002">Any officer violating R.S. 33:2921 through R.S. 33:2924 shall be imprisoned or fined, or both.  The fine shall not exceed one thousand dollars or the imprisonment one year.</p>
