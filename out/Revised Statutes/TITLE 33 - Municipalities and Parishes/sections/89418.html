<h1>RS 33:1813 - Additional counsel</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89418">https://www.legis.la.gov/legis/Law.aspx?d=89418</a></div>
<p align="justify" class="A0001">§1813.  Additional counsel</p>
<p align="justify" class="A0002">A municipality may employ, fix the compensation for, and pay additional counsel in cases of extreme necessity.</p>
<p align="justify" class="A0002">Acts 1983, No. 364, §1, eff. July 2, 1983.</p>
