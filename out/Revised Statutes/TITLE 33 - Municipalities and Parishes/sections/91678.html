<h1>RS 33:9039.37 - Construction of Chapter</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91678">https://www.legis.la.gov/legis/Law.aspx?d=91678</a></div>
<p align="justify" class="A0001">§9039.37.  Construction of Chapter</p>
<p align="justify" class="A0002">This Chapter, being necessary for the welfare of the state and its residents, shall be liberally construed to effect the purposes of the Chapter.</p>
<p align="justify" class="A0002">Acts 2001, No. 992, §1.</p>
