<h1>RS 33:5061 - Right to adopt ordinances</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=91286">https://www.legis.la.gov/legis/Law.aspx?d=91286</a></div>
<p align="justify" class="A0001">§5061.  Right to adopt ordinances </p>
<p align="justify" class="A0002">All municipalities may adopt ordinances necessary to carry out the provisions of R.S. 33:5060 and provide penalties for the violation thereof. </p>
