<h1>RS 33:1367 - Effective date of revised ordinances</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=89085">https://www.legis.la.gov/legis/Law.aspx?d=89085</a></div>
<p align="justify" class="A0001">§1367.  Effective date of revised ordinances</p>
<p align="justify" class="A0002">The revised ordinances shall take effect ten days after being promulgated as provided in R.S. 33:1366.</p>
<p align="justify" class="A0002">Amended by Acts 1975, No. 635, §1.</p>
