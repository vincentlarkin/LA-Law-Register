<p align="justify" class="A0001">§140.117.  Competitive bids</p>
<p align="justify" class="A0002">The district shall be subject to the provisions of Chapter 10 of Title 38 of the Louisiana Revised Statutes of 1950.</p>
<p align="justify" class="A0002">Acts 2010, No. 780, §1.</p>
