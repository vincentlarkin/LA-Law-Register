<h1>RS 14:329.2 - Inciting to riot</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78430">https://www.legis.la.gov/legis/Law.aspx?d=78430</a></div>
<p align="justify" class="A0001">§329.2.  Inciting to riot </p>
<p align="justify" class="A0002">Inciting to riot is the endeavor by any person to incite or procure any other person to create or participate in a riot.  </p>
<p align="justify" class="A0002">Acts 1969, No. 176, §3.  </p>
