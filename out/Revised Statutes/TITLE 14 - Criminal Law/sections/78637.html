<h1>RS 14:7 - Crime defined</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78637">https://www.legis.la.gov/legis/Law.aspx?d=78637</a></div>
<p align="center" class="A0001">SUBPART B.  ELEMENTS OF CRIMES </p>
<p align="justify" class="A0002">§7.  Crime defined </p>
<p align="justify" class="A0003">A crime is that conduct which is defined as criminal in this Code, or in other acts of the legislature, or in the constitution of this state.  </p>
