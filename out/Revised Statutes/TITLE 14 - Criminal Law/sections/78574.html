<h1>RS 14:6 - Civil remedies not affected</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78574">https://www.legis.la.gov/legis/Law.aspx?d=78574</a></div>
<p align="justify" class="A0001">§6.  Civil remedies not affected </p>
<p align="justify" class="A0002">Nothing in this Code shall affect any civil remedy provided by the law pertaining to civil matters, or any legal power to inflict penalties for contempt.  </p>
