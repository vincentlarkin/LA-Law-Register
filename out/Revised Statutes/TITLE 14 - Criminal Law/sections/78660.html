<h1>RS 14:74.1 - Right of action</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78660">https://www.legis.la.gov/legis/Law.aspx?d=78660</a></div>
<p align="justify" class="A0001">§74.1.  Right of action </p>
<p align="justify" class="A0002">The provisions of Art. 242 of the Louisiana Revised Civil Code of 1870 shall not apply to any proceeding brought under the provisions of R.S. 14:74.  </p>
<p align="justify" class="A0002">Added by Acts 1954, No. 298, §1.  </p>
