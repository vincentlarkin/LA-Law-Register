<h1>RS 14:36 - Assault defined</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=78467">https://www.legis.la.gov/legis/Law.aspx?d=78467</a></div>
<p align="justify" class="A0001">§36.  Assault defined </p>
<p align="justify" class="A0002">Assault is an attempt to commit a battery, or the intentional placing of another in reasonable apprehension of receiving a battery.  </p>
<p align="justify" class="A0002">Acts 1978, No. 394, §1.  </p>
