<h1>RS 27:17 - Offices</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=84895">https://www.legis.la.gov/legis/Law.aspx?d=84895</a></div>
<p align="justify" class="A0001">§17.  Offices</p>
<p align="justify" class="A0002">The board shall be domiciled and shall maintain an office in East Baton Rouge Parish but may maintain such branch offices as it deems necessary.</p>
<p align="justify" class="A0002">Acts 1996, 1st Ex. Sess., No. 7, §1, eff. May 1, 1996.</p>
