<h1>RS 27:393 - State tax; levy</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=85039">https://www.legis.la.gov/legis/Law.aspx?d=85039</a></div>
<p align="justify" class="A0001">§393.  State tax; levy</p>
<p align="justify" class="A0002">There is hereby levied a license tax of eighteen and one-half percent upon taxable net slot machine proceeds.</p>
<p align="justify" class="A0002">Acts 2000, No. 41, §1, eff. June 27, 2000.</p>
