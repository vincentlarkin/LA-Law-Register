<h1>CE 303 - Conclusive presumptions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72449">https://www.legis.la.gov/legis/Law.aspx?d=72449</a></div>
<p align="justify" class="A0001">Art. 303.  Conclusive presumptions</p>
<p align="justify" class="A0002">A "conclusive presumption" is a rule of substantive law and is not regulated by this Chapter.</p>
<p align="justify" class="A0002">Acts 1997, No. 577, §1.</p>
