<h1>CE 101 - Scope</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72436">https://www.legis.la.gov/legis/Law.aspx?d=72436</a></div>
<p align="center" class="A0001">CHAPTER 1</p>
<p align="center" class="A0001">GENERAL PROVISIONS </p>
<p align="justify" class="A0002">Art. 101.  Scope </p>
<p align="justify" class="A0003">This Code governs proceedings in the courts of Louisiana to the extent and with the exceptions stated in Article 1101.</p>
<p align="justify" class="A0003">Acts 1988, No. 515, §1, eff. Jan. 1, 1989.</p>
