<h1>CE 307 - Jury instructions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=72453">https://www.legis.la.gov/legis/Law.aspx?d=72453</a></div>
<p align="justify" class="A0001">Art. 307.  Jury instructions</p>
<p align="justify" class="A0002">In jury cases, upon request, the jury shall be instructed of the existence of a presumption and instructed as to its effect in accordance with Articles 305 and 306.</p>
<p align="justify" class="A0002">Acts 1997, No. 577, §1.</p>
