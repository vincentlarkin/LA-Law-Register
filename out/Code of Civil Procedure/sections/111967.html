<h1>CCP 428 - No abatement on death of party</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111967">https://www.legis.la.gov/legis/Law.aspx?d=111967</a></div>
<p align="justify" class="A0001">Art. 428.  No abatement on death of party </p>
<p align="justify" class="A0002">An action does not abate on the death of a party.  The only exception to this rule is an action to enforce a right or obligation which is strictly personal.</p>
