<h1>CCP 4398 - Cost of accounting</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111989">https://www.legis.la.gov/legis/Law.aspx?d=111989</a></div>
<p align="justify" class="A0001">Art. 4398.  Cost of accounting </p>
<p align="justify" class="A0002">Accounts filed by a tutor are at the expense of the minor, except that an account filed by a tutor who has been removed or an account not filed timely is at the expense of the tutor.</p>
