<h1>CCP 699 - Trust estate</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112225">https://www.legis.la.gov/legis/Law.aspx?d=112225</a></div>
<p align="justify" class="A0001">Art. 699.  Trust estate </p>
<p align="justify" class="A0002">Except as otherwise provided by law, the trustee of an express trust is the proper plaintiff to sue to enforce a right of the trust estate.</p>
