<h1>CCP 4602 - Judicial partition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112028">https://www.legis.la.gov/legis/Law.aspx?d=112028</a></div>
<p align="justify" class="A0001">Art. 4602.  Judicial partition </p>
<p align="justify" class="A0002">Partition must be judicial when: </p>
<p align="justify" class="A0002">(1)  A party is an unrepresented absentee, minor, or mental incompetent; or </p>
<p align="justify" class="A0002">(2)  All the interested parties cannot agree upon a nonjudicial partition.</p>
