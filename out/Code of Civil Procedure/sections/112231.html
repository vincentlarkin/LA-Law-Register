<h1>CCP 731 - Individuals having procedural capacity</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112231">https://www.legis.la.gov/legis/Law.aspx?d=112231</a></div>
<p align="center" class="A0001">CHAPTER 3.  PARTIES DEFENDANT</p>
<p align="justify" class="A0002">Art. 731.  Individuals having procedural capacity </p>
<p align="justify" class="A0003">A competent major and a competent emancipated minor have the procedural capacity to be sued.</p>
