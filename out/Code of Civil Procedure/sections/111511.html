<p align="justify" class="A0001">Art. 2722.  Advertisement of sale </p>
<p align="justify" class="A0002">After the seizure of the property, the sheriff shall proceed to advertise the sale of the property, in accordance with the provisions of the first paragraph of Article 2331.</p>
