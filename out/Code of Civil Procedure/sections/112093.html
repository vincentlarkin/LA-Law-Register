<h1>CCP 4849 - Jurisdiction over the person</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112093">https://www.legis.la.gov/legis/Law.aspx?d=112093</a></div>
<p align="justify" class="A0001">Art. 4849.  Jurisdiction over the person </p>
<p align="justify" class="A0002">A parish court or a city court may exercise jurisdiction over the person to the same extent, and in the same manner, as a district court.</p>
<p align="justify" class="A0002">Acts 1986, No. 156, §1.</p>
