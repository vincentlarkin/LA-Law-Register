<h1>CCP 3283 - Who may file opposition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111688">https://www.legis.la.gov/legis/Law.aspx?d=111688</a></div>
<p align="justify" class="A0001">Art. 3283.  Who may file opposition </p>
<p align="justify" class="A0002">An opposition to a proposed private sale of succession property may be filed only by an heir, legatee, or creditor.</p>
