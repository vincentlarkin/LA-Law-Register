<h1>CCP 4832 - Trial courts of limited jurisdiction</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112084">https://www.legis.la.gov/legis/Law.aspx?d=112084</a></div>
<p align="justify" class="A0001">Art. 4832.  Trial courts of limited jurisdiction </p>
<p align="justify" class="A0002">Trial courts of limited jurisdiction are parish courts, city courts, and justice of the peace courts.</p>
<p align="justify" class="A0002">Acts 1979, No. 46, §1, eff. Jan. 1, 1980.</p>
