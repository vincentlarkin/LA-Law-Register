<h1>CCP 41 - Definition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111917">https://www.legis.la.gov/legis/Law.aspx?d=111917</a></div>
<p align="center" class="A0001">CHAPTER 2.  VENUE</p>
<p align="center" class="A0001">SECTION 1.  GENERAL DISPOSITIONS</p>
<p align="justify" class="A0002">Art. 41.  Definition </p>
<p align="justify" class="A0003">Venue means the parish where an action or proceeding may properly be brought and tried under the rules regulating the subject.</p>
