<h1>CCP 3691 - Boundary action</h1>

<p align="center" class="A0001">CHAPTER 2.  BOUNDARY ACTION </p>
<p align="justify" class="A0002">Art. 3691.  Boundary action </p>
<p align="justify" class="A0003">An action to fix the boundary is an ordinary proceeding.</p>
<p align="justify" class="A0003">Amended by Acts 1977, No. 169, §2, eff. Jan. 1, 1978.</p>
