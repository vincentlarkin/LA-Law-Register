<h1>CCP 374 - Legal representative</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111847">https://www.legis.la.gov/legis/Law.aspx?d=111847</a></div>
<p align="justify" class="A0001">Art. 374.  Legal representative </p>
<p align="justify" class="A0002">A legal representative appointed or confirmed by a court is an officer of this court from the time of his qualification for the office until his discharge.</p>
