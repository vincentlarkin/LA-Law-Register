<h1>CCP 1073 - Additional parties</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111130">https://www.legis.la.gov/legis/Law.aspx?d=111130</a></div>
<p align="justify" class="A0001">Art. 1073.  Additional parties </p>
<p align="justify" class="A0002">Persons other than those made parties to the original action may be made parties to a cross-claim.</p>
<p align="justify" class="A0002">Added by Acts 1983, No. 63, §1.</p>
