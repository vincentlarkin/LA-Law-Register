<h1>CCP 3392 - Effect of judgment of discharge</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111735">https://www.legis.la.gov/legis/Law.aspx?d=111735</a></div>
<p align="justify" class="A0001">Art. 3392.  Effect of judgment of discharge </p>
<p align="justify" class="A0002">The judgment discharging the succession representative relieves him of further duty, responsibility, and authority as succession representative.</p>
