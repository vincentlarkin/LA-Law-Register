<h1>CCP 4848 - Contempt power</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=112092">https://www.legis.la.gov/legis/Law.aspx?d=112092</a></div>
<p align="justify" class="A0001">Art. 4848.  Contempt power </p>
<p align="justify" class="A0002">A city court and parish court have the same power to punish a contempt of court as a district court.</p>
<p align="justify" class="A0002">Acts 1986, No. 156, §1.</p>
<p align="justify" class="A0003">{{NOTE:  SEE ACTS 1986, NO. 156, §3.}}</p>
