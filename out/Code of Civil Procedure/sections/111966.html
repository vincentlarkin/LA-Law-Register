<h1>CCP 4275 - Donations to or by minor</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111966">https://www.legis.la.gov/legis/Law.aspx?d=111966</a></div>
<p align="justify" class="A0001">Art. 4275.  Donations to or by minor </p>
<p align="justify" class="A0002">The tutor may accept donations made to the minor, but he cannot make donations of any property of the minor.</p>
