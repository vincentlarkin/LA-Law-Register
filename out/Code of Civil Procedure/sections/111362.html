<h1>CCP 1976 - Service of notice</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111362">https://www.legis.la.gov/legis/Law.aspx?d=111362</a></div>
<p align="justify" class="A0001">Art. 1976.  Service of notice </p>
<p align="justify" class="A0002">Notice of the motion for new trial and of the time and place assigned for hearing thereon must be served upon the opposing party as provided by Article 1314.</p>
