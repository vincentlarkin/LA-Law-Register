<h1>CCP 1035 - Answer</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111115">https://www.legis.la.gov/legis/Law.aspx?d=111115</a></div>
<p align="justify" class="A0001">Art. 1035.  Answer</p>
<p align="justify" class="A0002">The answer in an incidental action shall be filed within the delay allowed by Article 1001, and shall be subject to all of the rules set forth in Articles 1001 and 1003 through 1006.</p>
<p align="justify" class="A0002">Acts 2014, No. 655, §1.</p>
