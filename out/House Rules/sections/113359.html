<h1>HRULE 7.5 - Title only bills</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=113359">https://www.legis.la.gov/legis/Law.aspx?d=113359</a></div>
<p align="justify" class="A0001">Rule 7.5.  Title only bills </p>
<p align="justify" class="A0002">No bill shall be introduced or received by title only or in any similar form whereby its provisions are not substantially set forth in full.</p>
<p align="justify" class="A0002">HR 3, 1973; HR 21, 1977; HR 13, 1978.</p>
