<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=113302">https://www.legis.la.gov/legis/Law.aspx?d=113302</a></div>
<p align="justify" class="A0001">Rule 4.3.  Quorum </p>
<p align="justify" class="A0002">A quorum of the House of Representatives is hereby defined as a majority of the elected members of the House.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 49(2), See also 502</p>
<p align="justify" class="A0002">HR 3, 1973.</p>
