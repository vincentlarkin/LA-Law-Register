<p align="justify" class="A0001">Rule 14.36.  Quorum Defined </p>
<p align="justify" class="A0002">A quorum of a committee shall consist of a majority of the then current membership of the committee.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 500-504 and 613</p>
<p align="justify" class="A0002">HR 8, 1974.</p>
