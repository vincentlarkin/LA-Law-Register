<p align="justify" class="A0001">Rule 10.2.  Speaker's vote </p>
<p align="justify" class="A0002">The Speaker shall not be required to vote, unless the House is equally divided.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 513(2) and (3) and 514</p>
<p align="justify" class="A0002">HR 3, 1973.</p>
