<h1>HRULE 10.6 - Tie vote</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=113199">https://www.legis.la.gov/legis/Law.aspx?d=113199</a></div>
<p align="justify" class="A0001">Rule 10.6.  Tie vote </p>
<p align="justify" class="A0002">Except as provided in Rule 9.12, if the vote on any question results in a tie, the motion shall fail to pass.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 513(1)</p>
<p align="justify" class="A0002">HR 3, 1973; HR 45, 1998, eff. May 20, 1998.</p>
