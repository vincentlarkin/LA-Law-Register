<p align="justify" class="A0001">Rule 14.7.  Amendments; Members to Offer </p>
<p align="justify" class="A0002">Only a member of a committee shall be permitted to offer an amendment for consideration by the respective committee.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 616</p>
<p align="justify" class="A0002">HR 8, 1974.</p>
