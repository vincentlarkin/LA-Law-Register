<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=113242">https://www.legis.la.gov/legis/Law.aspx?d=113242</a></div>
<p align="justify" class="A0001">Rule 14.31.  Roll Call </p>
<p align="justify" class="A0002">The roll shall be called and, if a quorum is present, the chairman shall proceed in the order established by the agenda for the meeting.</p>
<p align="justify" class="A0002">Mason's Manual:  Sec. 500</p>
<p align="justify" class="A0002">HR 8, 1974.</p>
