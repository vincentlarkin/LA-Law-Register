<h1>CC 2900 - Liability of joint borrowers</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109929">https://www.legis.la.gov/legis/Law.aspx?d=109929</a></div>
<p align="justify" class="A0001">Art. 2900.  Liability of joint borrowers</p>
<p align="justify" class="A0002">When several persons jointly borrow the same thing, they are solidarily liable toward the lender.</p>
<p align="justify" class="A0002">Acts 2004, No. 743, §1, eff. Jan. 1, 2005.</p>
