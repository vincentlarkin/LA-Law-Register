<h1>CC 3121 - Arbitrators acting in excess of power, effect.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110169">https://www.legis.la.gov/legis/Law.aspx?d=110169</a></div>
<p align="justify" class="A0001">Art. 3121.  Arbitrators acting in excess of power, effect.</p>
<p align="justify" class="A0002">Arbitrators can not exceed the power which is given to them; and if they exceed it, their award is null for so much.</p>
