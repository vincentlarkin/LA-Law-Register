<h1>CC 1584 - Kinds of testamentary dispositions</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108910">https://www.legis.la.gov/legis/Law.aspx?d=108910</a></div>
<p align="center" class="A0001">SECTION 4.  TESTAMENTARY DISPOSITIONS</p>
<p align="justify" class="A0002">Art. 1584.  Kinds of testamentary dispositions</p>
<p align="justify" class="A0003">Testamentary dispositions are particular, general, or universal.</p>
<p align="justify" class="A0003">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
