<h1>CC 2359 - Obligations; community or separate.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109432">https://www.legis.la.gov/legis/Law.aspx?d=109432</a></div>
<p align="justify" class="A0001">Art. 2359.  Obligations; community or separate.</p>
<p align="justify" class="A0002">An obligation incurred by a spouse may be either a community obligation or a separate obligation.</p>
<p align="justify" class="A0002">Acts 1979, No. 709, §1.</p>
