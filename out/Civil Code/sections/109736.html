<h1>CC 2675 - The rent</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109736">https://www.legis.la.gov/legis/Law.aspx?d=109736</a></div>
<p align="center" class="A0001">SECTION 2.  THE RENT</p>
<p align="justify" class="A0002">Art. 2675.  The rent</p>
<p align="justify" class="A0003">The rent may consist of money, commodities, fruits, services, or other performanc­es sufficient to support an onerous contract.</p>
<p align="justify" class="A0003">Acts 2004, No. 821, §1, eff. Jan. 1, 2005.</p>
