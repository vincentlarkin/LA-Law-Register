<h1>CC 1987 - Right to restrain obligor</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109240">https://www.legis.la.gov/legis/Law.aspx?d=109240</a></div>
<p align="justify" class="A0001">Art. 1987.  Right to restrain obligor</p>
<p align="justify" class="A0002">The obligor may be restrained from doing anything in violation of an obligation not to do.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
