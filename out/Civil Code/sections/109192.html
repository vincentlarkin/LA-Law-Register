<h1>CC 1943 - Acceptance not in accordance with offer</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109192">https://www.legis.la.gov/legis/Law.aspx?d=109192</a></div>
<p align="justify" class="A0001">Art. 1943.  Acceptance not in accordance with offer</p>
<p align="justify" class="A0002">An acceptance not in accordance with the terms of the offer is deemed to be a counteroffer.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
