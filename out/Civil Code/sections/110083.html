<h1>CC 3041 - Kinds of suretyship</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110083">https://www.legis.la.gov/legis/Law.aspx?d=110083</a></div>
<p align="center" class="A0001">CHAPTER 2.  KINDS OF SURETYSHIP </p>
<p align="justify" class="A0002">Art. 3041.  Kinds of suretyship </p>
<p align="justify" class="A0003">There are three kinds of suretyship: commercial suretyship, legal suretyship, and ordinary suretyship.</p>
<p align="justify" class="A0003">Acts 1987, No. 409, §1, eff. Jan. 1, 1988.</p>
