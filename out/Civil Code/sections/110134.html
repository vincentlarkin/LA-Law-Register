<h1>CC 309 - Minors exempt from taking application.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110134">https://www.legis.la.gov/legis/Law.aspx?d=110134</a></div>
<p align="justify" class="A0001">Art. 309.  Minors exempt from taking application.</p>
<p align="justify" class="A0002">Minor relations are not included in the provisions contained in the preceding article.</p>
<p align="justify" class="A0002">Amended by Acts 1974, No. 163, §3.</p>
