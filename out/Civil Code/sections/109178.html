<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109178">https://www.legis.la.gov/legis/Law.aspx?d=109178</a></div>
<p align="justify" class="A0001">Art. 1930.  Revocable offer</p>
<p align="justify" class="A0002">An offer not irrevocable under Civil Code Article 1928 may be revoked before it is accepted.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
