<p align="justify" class="A0001">Art. 2369.5.  Alienation of registered movables</p>
<p align="justify" class="A0002">A spouse may alienate, encumber, or lease a movable issued or registered in his name as provided by law.</p>
<p align="justify" class="A0002">Acts 1995, No. 433, §1.</p>
