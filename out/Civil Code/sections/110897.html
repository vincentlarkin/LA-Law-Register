<h1>CC 702 - Prohibition of view.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110897">https://www.legis.la.gov/legis/Law.aspx?d=110897</a></div>
<p align="justify" class="A0001">Art. 702.  Prohibition of view.</p>
<p align="justify" class="A0002">The servitude of prohibition of view is the right of the owner of the dominant estate to prevent or limit openings of view on the servient estate. </p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
