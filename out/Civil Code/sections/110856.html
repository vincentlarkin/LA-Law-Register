<h1>CC 662 - Building near a wall.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110856">https://www.legis.la.gov/legis/Law.aspx?d=110856</a></div>
<p align="justify" class="A0001">Art. 662.  Building near a wall.</p>
<p align="justify" class="A0002">One who builds near a wall, whether common or not, is bound to take all necessary precautions to protect his neighbor against injury.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
