<h1>CC 453 - Private things.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110628">https://www.legis.la.gov/legis/Law.aspx?d=110628</a></div>
<p align="justify" class="A0001">Art. 453.  Private things.</p>
<p align="justify" class="A0002">Private things are owned by individuals, other private persons, and by the state or its political subdivisions in their capacity as private persons. </p>
<p align="justify" class="A0002">Acts 1978, No. 728, §1.</p>
