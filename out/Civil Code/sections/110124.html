<h1>CC 3080 - Preclusive effect of compromise</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110124">https://www.legis.la.gov/legis/Law.aspx?d=110124</a></div>
<p align="justify" class="A0001">Art. 3080.  Preclusive effect of compromise</p>
<p align="justify" class="A0002">A compromise precludes the parties from bringing a subsequent action based upon the matter that was compromised.</p>
<p align="justify" class="A0002">Acts 2007, No. 138, §1.</p>
