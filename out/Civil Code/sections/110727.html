<h1>CC 540 - Nature of usufruct.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110727">https://www.legis.la.gov/legis/Law.aspx?d=110727</a></div>
<p align="justify" class="A0001">Art. 540.  Nature of usufruct.</p>
<p align="justify" class="A0002">Usufruct is an incorporeal thing.  It is movable or immovable according to the nature of the thing upon which the right exists.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
