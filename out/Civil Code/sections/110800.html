<h1>CC 606 - Improvements.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110800">https://www.legis.la.gov/legis/Law.aspx?d=110800</a></div>
<p align="justify" class="A0001">Art. 606.  Improvements.</p>
<p align="justify" class="A0002">The naked owner may not make alterations or improvements on the property subject to the usufruct.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
