<h1>CC 533 - Kinds of servitudes.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110719">https://www.legis.la.gov/legis/Law.aspx?d=110719</a></div>
<p align="center" class="A0001">TITLE III--PERSONAL SERVITUDES</p>
<p align="center" class="A0001">CHAPTER 1--KINDS OF SERVITUDES </p>
<p align="justify" class="A0002">Art. 533.  Kinds of servitudes.</p>
<p align="justify" class="A0003">There are two kinds of servitudes: personal servitudes and predial servitudes.</p>
<p align="justify" class="A0003">Acts 1976, No. 103, §1.</p>
