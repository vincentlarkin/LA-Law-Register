<p align="justify" class="A0001">Art. 3059.  Extinction of principal obligation </p>
<p align="justify" class="A0002">The extinction of the principal obligation extinguishes the suretyship. </p>
<p align="justify" class="A0002">Acts 1987, No. 409, §1, eff. Jan. 1, 1988.</p>
