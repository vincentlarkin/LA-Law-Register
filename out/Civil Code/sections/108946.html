<h1>CC 1616 - Legacy to creditor</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108946">https://www.legis.la.gov/legis/Law.aspx?d=108946</a></div>
<p align="justify" class="A0001">Art. 1616.  Legacy to creditor</p>
<p align="justify" class="A0002">A legacy to a creditor is not applied toward satisfaction of the debt unless the testator clearly so indicates.</p>
<p align="justify" class="A0002">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
