<p align="center" class="A0001">§1--OF FUNERAL CHARGES</p>
<p align="justify" class="A0002">Art. 3192.  Funeral charges, definition.</p>
<p align="justify" class="A0003">Funeral charges are those which are incurred for the interment of a person deceased.</p>
