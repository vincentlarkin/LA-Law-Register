<h1>CC 607 - Death of the usufructuary.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110801">https://www.legis.la.gov/legis/Law.aspx?d=110801</a></div>
<p align="center" class="A0001">SECTION 5--TERMINATION OF USUFRUCT </p>
<p align="justify" class="A0002">Art. 607.  Death of the usufructuary.</p>
<p align="justify" class="A0003">The right of usufruct expires upon the death of the usufructuary.</p>
<p align="justify" class="A0003">Acts 1976, No. 103, §1.</p>
