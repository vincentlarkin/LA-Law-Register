<h1>CC 3131 - Retraction or change of award prohibited.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110179">https://www.legis.la.gov/legis/Law.aspx?d=110179</a></div>
<p align="justify" class="A0001">Art. 3131.  Retraction or change of award prohibited.</p>
<p align="justify" class="A0002">The arbitrators having once given their award, can not retract it nor change any thing in it.</p>
