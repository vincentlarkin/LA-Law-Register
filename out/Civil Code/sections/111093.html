<h1>CC 963 - Requirement of formality</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111093">https://www.legis.la.gov/legis/Law.aspx?d=111093</a></div>
<p align="justify" class="A0001">SECTION 3.  RENUNCIATION</p>
<p align="justify" class="A0002">Art. 963.  Requirement of formality</p>
<p align="justify" class="A0003">Renunciation must be express and in writing.</p>
<p align="justify" class="A0003">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
