<h1>CC 500 - Shore of the sea or of a lake.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110683">https://www.legis.la.gov/legis/Law.aspx?d=110683</a></div>
<p align="justify" class="A0001">Art. 500.  Shore of the sea or of a lake.</p>
<p align="justify" class="A0002">There is no right to alluvion or dereliction on the shore of the sea or of lakes.</p>
<p align="justify" class="A0002">Acts 1979, No. 180, §1.</p>
