<p align="center" class="A0001">SECTION 2.  ADOPTION OF MINORS</p>
<p align="justify" class="A0001">Art. 200.  Adoption of minors</p>
<p align="justify" class="A0002">The adoption of minors is also governed by the provisions of the Children's Code.</p>
<p align="justify" class="A0002">Acts 2009, No. 3, §1, eff. June 9, 2009.</p>
