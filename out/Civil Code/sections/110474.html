<p align="justify" class="A0001">Art. 3451.  Capacity to renounce </p>
<p align="justify" class="A0002">To renounce prescription, one must have capacity to alienate.</p>
<p align="justify" class="A0002">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
