<h1>CC 1475 - Nullity of donation to person incapable of receiving</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108795">https://www.legis.la.gov/legis/Law.aspx?d=108795</a></div>
<p align="justify" class="A0001">Art. 1475.  Nullity of donation to person incapable of receiving</p>
<p align="justify" class="A0002">A donation in favor of a person who is incapable of receiving is null.</p>
<p align="justify" class="A0002">Acts 1991, No. 363, §1.</p>
