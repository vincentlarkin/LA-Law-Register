<p align="justify" class="A0001">Art. 3459.  Application of rules of prescription </p>
<p align="justify" class="A0002">The provisions on prescription governing computation of time apply to peremption.</p>
<p align="justify" class="A0002">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
