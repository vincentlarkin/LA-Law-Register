<h1>CC 1247 - Share of partnership with ascendant.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108597">https://www.legis.la.gov/legis/Law.aspx?d=108597</a></div>
<p align="justify" class="A0001">Art. 1247.  Share of partnership with ascendant.</p>
<p align="justify" class="A0002">Also no collation is due for a partnership made without fraud with the deceased, if the conditions of the partnership are proved by an authentic act.</p>
