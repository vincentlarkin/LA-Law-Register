<h1>CC 88 - Impediment of existing marriage</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111030">https://www.legis.la.gov/legis/Law.aspx?d=111030</a></div>
<p align="justify" class="A0001">Art. 88.  Impediment of existing marriage </p>
<p align="justify" class="A0002">A married person may not contract another marriage.</p>
<p align="justify" class="A0002">Acts 1987, No. 886, §1, eff. Jan. 1, 1988.</p>
