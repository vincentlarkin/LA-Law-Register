<h1>CC 3038 - Formal requirements of suretyship</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110080">https://www.legis.la.gov/legis/Law.aspx?d=110080</a></div>
<p align="justify" class="A0001">Art. 3038.  Formal requirements of suretyship </p>
<p align="justify" class="A0002">Suretyship must be express and in writing.</p>
<p align="justify" class="A0002">Acts 1987, No. 409, §1, eff. Jan. 1, 1988.</p>
