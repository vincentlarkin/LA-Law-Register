<h1>CC 740 - Modes of acquisition of servitudes.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110935">https://www.legis.la.gov/legis/Law.aspx?d=110935</a></div>
<p align="justify" class="A0001">Art. 740.  Modes of acquisition of servitudes.</p>
<p align="justify" class="A0002">Apparent servitudes may be acquired by title, by destination of the owner, or by acquisitive prescription.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
