<h1>CC 709 - Mandatary.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110904">https://www.legis.la.gov/legis/Law.aspx?d=110904</a></div>
<p align="justify" class="A0001">Art. 709.  Mandatary.</p>
<p align="justify" class="A0002">A mandatary may establish a predial servitude if he has an express and special power to do so.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
