<h1>CC 2372 - Necessaries.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109459">https://www.legis.la.gov/legis/Law.aspx?d=109459</a></div>
<p align="justify" class="A0001">Art. 2372.  Necessaries.</p>
<p align="justify" class="A0002">A spouse is solidarily liable with the other spouse who incurs an obligation for necessaries for himself or the family.</p>
<p align="justify" class="A0002">Acts 1979, No. 709, §1.</p>
