<h1>CC 13 - Laws on the same subject matter</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108650">https://www.legis.la.gov/legis/Law.aspx?d=108650</a></div>
<p align="justify" class="A0001">Art. 13.  Laws on the same subject matter </p>
<p align="justify" class="A0002">Laws on the same subject matter must be interpreted in reference to each other.</p>
<p align="justify" class="A0002">Acts 1987, No. 124, §1, eff. Jan. 1, 1988.</p>
