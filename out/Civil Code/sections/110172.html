<h1>CC 3124 - Extension of time for making award.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110172">https://www.legis.la.gov/legis/Law.aspx?d=110172</a></div>
<p align="justify" class="A0001">Art. 3124.  Extension of time for making award.</p>
<p align="justify" class="A0002">Nevertheless the parties may give power to the arbitrators to prolong the time, and in this case their power lasts during the time of the prorogation.</p>
