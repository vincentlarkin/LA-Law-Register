<h1>CC 1891 - Release of real security</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109136">https://www.legis.la.gov/legis/Law.aspx?d=109136</a></div>
<p align="justify" class="A0001">Art. 1891.  Release of real security</p>
<p align="justify" class="A0002">Release of a real security given for performance of the obligation does not give rise to a presumption of remission of debt.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
