<h1>CC 728 - Limitation of use.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110923">https://www.legis.la.gov/legis/Law.aspx?d=110923</a></div>
<p align="justify" class="A0001">Art. 728.  Limitation of use.</p>
<p align="justify" class="A0002">The use of a predial servitude may be limited to certain times.  Thus, the rights of drawing water and of passage may be confined to designated hours.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
