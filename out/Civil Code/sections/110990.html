<h1>CC 795 - Effect of boundary agreement.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110990">https://www.legis.la.gov/legis/Law.aspx?d=110990</a></div>
<p align="justify" class="A0001">Art. 795.  Effect of boundary agreement.</p>
<p align="justify" class="A0002">When the boundary is fixed extrajudicially, the agreement of the parties has the effect of a compromise.</p>
<p align="justify" class="A0002">Acts 1977, No. 169, §1.</p>
