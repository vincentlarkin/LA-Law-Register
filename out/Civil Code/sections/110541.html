<h1>CC 3521 - Divorce or separation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110541">https://www.legis.la.gov/legis/Law.aspx?d=110541</a></div>
<p align="justify" class="A0001">Art. 3521.  Divorce or separation </p>
<p align="justify" class="A0002">A court of this state may grant a divorce or separation only for grounds provided by the law of this state.</p>
<p align="justify" class="A0002">Acts 1991, No. 923, §1, eff. Jan. 1, 1992.</p>
