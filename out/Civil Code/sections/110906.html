<h1>CC 711 - Usufructuary.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110906">https://www.legis.la.gov/legis/Law.aspx?d=110906</a></div>
<p align="justify" class="A0001">Art. 711.  Usufructuary.</p>
<p align="justify" class="A0002">The usufructuary may not establish on the estate of which he has the usufruct any charges in the nature of predial servitudes.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
