<h1>CC 3235 - Travelers, definition.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110285">https://www.legis.la.gov/legis/Law.aspx?d=110285</a></div>
<p align="justify" class="A0001">Art. 3235.  Travelers, definition.</p>
<p align="justify" class="A0002">The term travelers applies to strangers and such as being transiently in a place where they have no domicile, take their board and lodging at an inn.</p>
