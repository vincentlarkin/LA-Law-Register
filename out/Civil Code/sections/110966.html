<h1>CC 771 - Renunciation of servitude.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110966">https://www.legis.la.gov/legis/Law.aspx?d=110966</a></div>
<p align="justify" class="A0001">Art. 771.  Renunciation of servitude.</p>
<p align="justify" class="A0002">A predial servitude is extinguished by an express and written renunciation by the owner of the dominant estate.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
