<h1>CC 3043 - Legal suretyship</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110085">https://www.legis.la.gov/legis/Law.aspx?d=110085</a></div>
<p align="justify" class="A0001">Art. 3043.  Legal suretyship </p>
<p align="justify" class="A0002">A legal suretyship is one given pursuant to legislation, administrative act or regulation, or court order.</p>
<p align="justify" class="A0002">Acts 1987, No. 409, §1, eff. Jan. 1, 1988.</p>
