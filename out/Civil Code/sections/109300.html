<h1>CC 2040 - Contract made in course of business</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109300">https://www.legis.la.gov/legis/Law.aspx?d=109300</a></div>
<p align="justify" class="A0001">Art. 2040.  Contract made in course of business</p>
<p align="justify" class="A0002">An obligee may not annul a contract made by the obligor in the regular course of his business.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
