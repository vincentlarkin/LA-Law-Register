<h1>CC 462 - Tracts of land.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110638">https://www.legis.la.gov/legis/Law.aspx?d=110638</a></div>
<p align="center" class="A0001">SECTION 2--IMMOVABLES </p>
<p align="justify" class="A0002">Art. 462.  Tracts of land.</p>
<p align="justify" class="A0003">Tracts of land, with their component parts, are immovables.</p>
<p align="justify" class="A0003">Acts 1978, No. 728, §1.</p>
