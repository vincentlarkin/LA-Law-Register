<p align="justify" class="A0001">Art. 3301.  Creation of legal mortgage </p>
<p align="justify" class="A0002">A legal mortgage is created by complying with the law providing for it.</p>
<p align="justify" class="A0002">Acts 1992, No. 1132, §2, eff. Jan. 1, 1993.</p>
