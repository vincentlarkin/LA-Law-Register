<p align="center" class="A0001">SECTION 2--RIGHTS OF THE USUFRUCTUARY </p>
<p align="justify" class="A0002">Art. 550.  Right to all fruits.</p>
<p align="justify" class="A0003">The usufructuary is entitled to the fruits of the thing subject to usufruct according to the following articles.</p>
<p align="justify" class="A0003">Acts 1976, No. 103, §1.</p>
