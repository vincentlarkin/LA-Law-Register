<h1>CC 2991 - Interest served</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110028">https://www.legis.la.gov/legis/Law.aspx?d=110028</a></div>
<p align="justify" class="A0001">Art. 2991.  Interest served</p>
<p align="justify" class="A0002">The contract of mandate may serve the exclusive or the common interest of the principal, the mandatary, or a third person.</p>
<p align="justify" class="A0002">Acts 1997, No. 261, §1, eff. Jan. 1, 1998.</p>
