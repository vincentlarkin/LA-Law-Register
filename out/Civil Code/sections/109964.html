<h1>CC 2933 - Return of the thing deposited</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109964">https://www.legis.la.gov/legis/Law.aspx?d=109964</a></div>
<p align="justify" class="A0001">Art. 2933.  Return of the thing deposited</p>
<p align="justify" class="A0002">The depositary is bound to return the precise thing that he received in deposit.</p>
<p align="justify" class="A0002">Acts 2003, No. 491, §1, eff. Jan. 1, 2004.</p>
