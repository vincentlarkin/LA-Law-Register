<h1>CC 3290 - Power to mortgage</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110340">https://www.legis.la.gov/legis/Law.aspx?d=110340</a></div>
<p align="justify" class="A0001">Art. 3290.  Power to mortgage </p>
<p align="justify" class="A0002">A conventional mortgage may be established only by a person having the power to alienate the property mortgaged.</p>
<p align="justify" class="A0002">Acts 1991, No. 652, §1, eff. Jan. 1, 1992.</p>
