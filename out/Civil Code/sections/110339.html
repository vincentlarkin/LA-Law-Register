<h1>CC 3289 - Acceptance</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110339">https://www.legis.la.gov/legis/Law.aspx?d=110339</a></div>
<p align="justify" class="A0001">Art. 3289.  Acceptance </p>
<p align="justify" class="A0002">A contract of mortgage need not be signed by the mortgagee, whose consent is presumed and whose acceptance may be tacit.</p>
<p align="justify" class="A0002">Acts 1991, No. 652, §1, eff. Jan. 1, 1992.</p>
