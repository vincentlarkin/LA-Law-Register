<h1>CC 766 - Resolutory condition.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110961">https://www.legis.la.gov/legis/Law.aspx?d=110961</a></div>
<p align="justify" class="A0001">Art. 766.  Resolutory condition.</p>
<p align="justify" class="A0002">When the union of the two estates is made under resolutory condition, or if it cease by legal eviction, the servitude is suspended and not extinguished.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
