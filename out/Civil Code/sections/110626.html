<h1>CC 451 - Seashore.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110626">https://www.legis.la.gov/legis/Law.aspx?d=110626</a></div>
<p align="justify" class="A0001">Art. 451.  Seashore.</p>
<p align="justify" class="A0002">Seashore is the space of land over which the waters of the sea spread in the highest tide during the winter season.</p>
<p align="justify" class="A0002">Acts 1978, No. 728, §1.</p>
