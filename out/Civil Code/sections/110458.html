<h1>CC 3435 - Vices of possession</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110458">https://www.legis.la.gov/legis/Law.aspx?d=110458</a></div>
<p align="center" class="A0001">SECTION 3.  VICES OF POSSESSION</p>
<p align="justify" class="A0002">Art. 3435.  Vices of possession </p>
<p align="justify" class="A0003">Possession that is violent, clandestine, discontinuous, or equivocal has no legal effect.</p>
<p align="justify" class="A0003">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
