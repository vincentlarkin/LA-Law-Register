<h1>CC 1733 - Donation of extra portion not affected by rescission.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108967">https://www.legis.la.gov/legis/Law.aspx?d=108967</a></div>
<p align="justify" class="A0001">Art. 1733.  Donation of extra portion not affected by rescission.</p>
<p align="justify" class="A0002">The rescission of the partition does not carry with it the nullity of a donation made as an advantage.</p>
