<h1>CC 940 - Same; unborn child</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111068">https://www.legis.la.gov/legis/Law.aspx?d=111068</a></div>
<p align="justify" class="A0001">Art. 940.  Same; unborn child</p>
<p align="justify" class="A0002">An unborn child conceived at the death of the decedent and thereafter born alive shall be considered to exist at the death of the decedent.</p>
<p align="justify" class="A0002">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
