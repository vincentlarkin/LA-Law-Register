<h1>CC 1545 - Acceptance in person or by mandatary</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108868">https://www.legis.la.gov/legis/Law.aspx?d=108868</a></div>
<p align="justify" class="A0001">Art. 1545.  Acceptance in person or by mandatary</p>
<p align="justify" class="A0002">The donee may accept a donation personally or by a mandatary having power to accept a donation for him.</p>
<p align="justify" class="A0002">Acts 2008, No. 204, §1, eff. Jan. 1, 2009.</p>
