<h1>CC 2746 - Limited duration of contract.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109811">https://www.legis.la.gov/legis/Law.aspx?d=109811</a></div>
<p align="center" class="A0001">SECTION 1--OF THE HIRING OF SERVANTS AND LABORERS</p>
<p align="justify" class="A0002">Art. 2746.  Limited duration of contract.</p>
<p align="justify" class="A0003">A man can only hire out his services for a certain limited time, or for the performance of a certain enterprise.</p>
