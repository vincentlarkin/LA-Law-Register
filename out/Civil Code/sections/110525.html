<h1>CC 3499 - Personal action</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110525">https://www.legis.la.gov/legis/Law.aspx?d=110525</a></div>
<p align="center" class="A0001">SECTION 4.  TEN YEAR PRESCRIPTION</p>
<p align="justify" class="A0002">Art. 3499.  Personal action </p>
<p align="justify" class="A0003">Unless otherwise provided by legislation, a personal action is subject to a liberative prescription of ten years.</p>
<p align="justify" class="A0003">Acts 1983, No. 173, §1, eff. Jan. 1, 1984.</p>
