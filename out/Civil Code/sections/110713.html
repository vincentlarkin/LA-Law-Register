<h1>CC 528 - Useful expenses.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110713">https://www.legis.la.gov/legis/Law.aspx?d=110713</a></div>
<p align="justify" class="A0001">Art. 528.  Useful expenses.</p>
<p align="justify" class="A0002">An evicted possessor in good faith is entitled to recover from the owner his useful expenses to the extent that they have enhanced the value of the thing.</p>
<p align="justify" class="A0002">Acts 1979, No. 180, §1.</p>
