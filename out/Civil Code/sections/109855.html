<h1>CC 2789 - Applicable law</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109855">https://www.legis.la.gov/legis/Law.aspx?d=109855</a></div>
<p align="justify" class="A0001">Art. 2789.  Applicable law</p>
<p align="justify" class="A0002">In all matters for which no special provision is made in this Chapter, the annuity charge is governed by the provisions of Chapter 1 of this Title.</p>
<p align="justify" class="A0002">Acts 2012, No. 258, §1, eff. Jan. 1, 2013.</p>
