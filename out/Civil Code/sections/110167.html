<h1>CC 3119 - Oath of umpire.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110167">https://www.legis.la.gov/legis/Law.aspx?d=110167</a></div>
<p align="justify" class="A0001">Art. 3119.  Oath of umpire.</p>
<p align="justify" class="A0002">The umpire shall take an oath similar to that taken by the arbitrators, before examining the matter or the point submitted to him.</p>
