<h1>CC 3048 - Surety's right of subrogation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110090">https://www.legis.la.gov/legis/Law.aspx?d=110090</a></div>
<p align="justify" class="A0001">Art. 3048.  Surety's right of subrogation </p>
<p align="justify" class="A0002">The surety who pays the principal obligation is subrogated by operation of law to the rights of the creditor.</p>
<p align="justify" class="A0002">Acts 1987, No. 409, §1, eff. Jan. 1, 1988.</p>
