<h1>CC 1854 - Extinction by performance</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109095">https://www.legis.la.gov/legis/Law.aspx?d=109095</a></div>
<p align="center" class="A0001">CHAPTER 6.  EXTINCTION OF OBLIGATIONS</p>
<p align="center" class="A0001">SECTION 1.  PERFORMANCE</p>
<p align="justify" class="A0002">Art. 1854.  Extinction by performance</p>
<p align="justify" class="A0003">Performance by the obligor extinguishes the obligation.</p>
<p align="justify" class="A0003">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
