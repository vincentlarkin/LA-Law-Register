<h1>CC 753 - Prescription for nonuse.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110948">https://www.legis.la.gov/legis/Law.aspx?d=110948</a></div>
<p align="justify" class="A0001">Art. 753.  Prescription for nonuse.</p>
<p align="justify" class="A0002">A predial servitude is extinguished by nonuse for ten years.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
