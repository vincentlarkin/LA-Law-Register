<h1>CC 27 - General legal capacity</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109762">https://www.legis.la.gov/legis/Law.aspx?d=109762</a></div>
<p align="justify" class="A0001">Art. 27.  General legal capacity </p>
<p align="justify" class="A0002">All natural persons enjoy general legal capacity to have rights and duties.</p>
<p align="justify" class="A0002">Acts 1987, No. 125, §1, eff. Jan. 1, 1988.</p>
