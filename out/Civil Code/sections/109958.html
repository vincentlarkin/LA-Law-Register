<h1>CC 2928 - Nature of the contract</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109958">https://www.legis.la.gov/legis/Law.aspx?d=109958</a></div>
<p align="justify" class="A0001">Art. 2928.  Nature of the contract</p>
<p align="justify" class="A0002">The contract of deposit may be either onerous or gratuitous.  It is gratuitous in the absence of contrary agreement, custom, or usage.</p>
<p align="justify" class="A0002">Acts 2003, No. 491, §1, eff. Jan. 1, 2004.</p>
