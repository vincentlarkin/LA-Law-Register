<h1>CC 1792 - Remission by one obligee</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109028">https://www.legis.la.gov/legis/Law.aspx?d=109028</a></div>
<p align="justify" class="A0001">Art. 1792.  Remission by one obligee</p>
<p align="justify" class="A0002">Remission of debt by one solidary obligee releases the obligor but only for the portion of that obligee.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
