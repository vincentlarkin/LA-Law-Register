<h1>CC 664 - Rain drip from roof.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110858">https://www.legis.la.gov/legis/Law.aspx?d=110858</a></div>
<p align="justify" class="A0001">Art. 664.  Rain drip from roof.</p>
<p align="justify" class="A0002">A landowner is bound to fix his roof so that rainwater does not fall on the ground of his neighbor.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
