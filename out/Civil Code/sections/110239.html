<p align="center" class="A0001">CHAPTER 3--OF PRIVILEGES ON MOVABLES</p>
<p align="justify" class="A0002">Art. 3190.  General or special privileges on movables.</p>
<p align="justify" class="A0003">Privileges are either general, or special on certain movables.</p>
