<h1>CC 2664 - Application of the rules of sale</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109725">https://www.legis.la.gov/legis/Law.aspx?d=109725</a></div>
<p align="justify" class="A0001">Art. 2664.  Application of the rules of sale</p>
<p align="justify" class="A0002">The contract of exchange is governed by the rules of the contract of sale, with the differences provided in this Title.</p>
<p align="justify" class="A0002">Acts 2010, No. 186, §1.</p>
