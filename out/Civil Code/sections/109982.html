<h1>CC 295 - Excuse for remote relationship.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109982">https://www.legis.la.gov/legis/Law.aspx?d=109982</a></div>
<p align="justify" class="A0001">Art. 295.  Excuse for remote relationship.</p>
<p align="justify" class="A0002">No person, who is not a relation of the minor by consanguinity, or who is only related to him beyond the fourth degree, can be compelled to accept the tutorship.</p>
