<h1>CC 2316 - Negligence, imprudence or want of skill.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109377">https://www.legis.la.gov/legis/Law.aspx?d=109377</a></div>
<p align="justify" class="A0001">Art. 2316.  Negligence, imprudence or want of skill.</p>
<p align="justify" class="A0002">Every person is responsible for the damage he occasions not merely by his act, but by his negligence, his imprudence, or his want of skill.</p>
