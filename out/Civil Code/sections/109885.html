<h1>CC 2815 - Effect of loss stipulation on third persons.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109885">https://www.legis.la.gov/legis/Law.aspx?d=109885</a></div>
<p align="justify" class="A0001">Art. 2815.  Effect of loss stipulation on third persons.</p>
<p align="justify" class="A0002">A provision that a partner shall not participate in losses does not affect third persons.</p>
<p align="justify" class="A0002">Acts 1980, No. 150, §1.</p>
