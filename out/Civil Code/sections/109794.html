<h1>CC 273 - Necessity for appointment.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109794">https://www.legis.la.gov/legis/Law.aspx?d=109794</a></div>
<p align="center" class="A0001">SECTION 6--OF THE UNDERTUTOR </p>
<p align="justify" class="A0002">Art. 273.  Necessity for appointment.</p>
<p align="justify" class="A0003">In every tutorship there shall be an undertutor.</p>
<p align="justify" class="A0003">Amended by Acts 1960, No. 30, §1, eff. Jan. 1, 1961.</p>
