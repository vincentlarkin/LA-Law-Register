<p align="justify" class="A0001">Art. 2037.  Insolvency</p>
<p align="justify" class="A0002">An obligor is insolvent when the total of his liabilities exceeds the total of his fairly appraised assets.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985; Acts 2003, No. 552, §1; Acts 2004, No. 447, §1.</p>
