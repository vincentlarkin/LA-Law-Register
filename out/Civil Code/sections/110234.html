<h1>CC 3185 - Privileges established only by law, stricti juris.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110234">https://www.legis.la.gov/legis/Law.aspx?d=110234</a></div>
<p align="justify" class="A0001">Art. 3185.  Privileges established only by law, stricti juris.</p>
<p align="justify" class="A0002">Privilege can be claimed only for those debts to which it is expressly granted in this Code.</p>
