<h1>CC 1937 - Time when revocation is effective</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109185">https://www.legis.la.gov/legis/Law.aspx?d=109185</a></div>
<p align="justify" class="A0001">Art. 1937.  Time when revocation is effective</p>
<p align="justify" class="A0002">A revocation of a revocable offer is effective when received by the offeree prior to acceptance.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
