<h1>CC 3117 - Nomination of umpire.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110165">https://www.legis.la.gov/legis/Law.aspx?d=110165</a></div>
<p align="justify" class="A0001">Art. 3117.  Nomination of umpire.</p>
<p align="justify" class="A0002">The nomination of the umpire is either made by the parties themselves at the time of the submission, or left to the discretion of the arbitrators.</p>
