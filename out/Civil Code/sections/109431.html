<h1>CC 2358.1 - Source of reimbursement</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109431">https://www.legis.la.gov/legis/Law.aspx?d=109431</a></div>
<p align="justify" class="A0001">Art. 2358.1.  Source of reimbursement</p>
<p align="justify" class="A0002">Reimbursement shall be made from the patrimony of the spouse who owes reimbursement.</p>
<p align="justify" class="A0002">Acts 1990, No. 991, §1.</p>
