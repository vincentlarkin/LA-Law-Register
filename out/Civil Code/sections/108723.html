<h1>CC 1367 - Formation of lots by experts.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108723">https://www.legis.la.gov/legis/Law.aspx?d=108723</a></div>
<p align="justify" class="A0001">Art. 1367.  Formation of lots by experts.</p>
<p align="justify" class="A0002">The lots are formed by experts chosen for that purpose and sworn by the officer charged with the partition, and are afterwards drawn for by the coheirs.</p>
