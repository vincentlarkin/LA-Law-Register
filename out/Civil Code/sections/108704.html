<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108704">https://www.legis.la.gov/legis/Law.aspx?d=108704</a></div>
<p align="justify" class="A0001">Art. 135.  Closed custody hearing </p>
<p align="justify" class="A0002">A custody hearing may be closed to the public.</p>
<p align="justify" class="A0002">Acts 1990, No. 361, §1, eff. Jan. 1, 1991; Acts 1993, No. 261, §1, eff. Jan. 1, 1994.</p>
