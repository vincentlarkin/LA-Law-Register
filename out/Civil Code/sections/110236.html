<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110236">https://www.legis.la.gov/legis/Law.aspx?d=110236</a></div>
<p align="justify" class="A0001">Art. 3187.  Basis of preferences among privileges.</p>
<p align="justify" class="A0002">Among creditors who are privileged, the preference is settled by the different nature of their privileges.</p>
