<h1>CC 546 - Usufruct in favor of successive usufructuaries.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110733">https://www.legis.la.gov/legis/Law.aspx?d=110733</a></div>
<p align="justify" class="A0001">Art. 546.  Usufruct in favor of successive usufructuaries.</p>
<p align="justify" class="A0002">Usufruct may be established in favor of successive usufructuaries.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
