<h1>CC 686 - Common ditches.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110880">https://www.legis.la.gov/legis/Law.aspx?d=110880</a></div>
<p align="justify" class="A0001">Art. 686.  Common ditches.</p>
<p align="justify" class="A0002">A ditch between two estates is presumed to be common unless there be proof to the contrary.</p>
<p align="justify" class="A0002">Adjoining owners are responsible for the maintenance of a common ditch.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
