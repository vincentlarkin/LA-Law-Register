<h1>CC 2726 - Amendment</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109790">https://www.legis.la.gov/legis/Law.aspx?d=109790</a></div>
<p align="justify" class="A0001">Art. 2726.  Amendment</p>
<p align="justify" class="A0002">An amendment to a provision of the lease contract that is made without an intent to effect a novation does not create a new lease.</p>
<p align="justify" class="A0002">Acts 2004, No. 821, §1, eff. Jan. 1, 2005.</p>
