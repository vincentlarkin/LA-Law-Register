<h1>CC 1997 - Obligor in bad faith</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109251">https://www.legis.la.gov/legis/Law.aspx?d=109251</a></div>
<p align="justify" class="A0001">Art. 1997.  Obligor in bad faith</p>
<p align="justify" class="A0002">An obligor in bad faith is liable for all the damages, foreseeable or not, that are a direct consequence of his failure to perform.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
