<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109846">https://www.legis.la.gov/legis/Law.aspx?d=109846</a></div>
<p align="justify" class="A0001">Art. 2780.  Recipient of payments</p>
<p align="justify" class="A0002">The recipient of payments under an annuity contract may be a natural person or a juridical person.</p>
<p align="justify" class="A0002"> Acts 2012, No. 258, §1, eff. Jan. 1, 2013.</p>
