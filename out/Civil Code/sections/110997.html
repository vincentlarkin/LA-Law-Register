<h1>CC 801 - Use and management by agreement</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110997">https://www.legis.la.gov/legis/Law.aspx?d=110997</a></div>
<p align="justify" class="A0001">Art. 801.  Use and management by agreement </p>
<p align="justify" class="A0002">The use and management of the thing held in indivision is determined by agreement of all the co-owners.</p>
<p align="justify" class="A0002">Acts 1990, No. 990, §1, eff. Jan. 1, 1991.</p>
