<p align="justify" class="A0001">Art. 3505.2.  Commencement of period of extension</p>
<p align="justify" class="A0002">The period of extension commences to run on the date of the juridical act granting it.</p>
<p align="justify" class="A0002">Acts 2013, No. 88, §1.</p>
