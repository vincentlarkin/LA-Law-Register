<h1>CC 730 - Interpretation of servitude.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110925">https://www.legis.la.gov/legis/Law.aspx?d=110925</a></div>
<p align="justify" class="A0001">Art. 730.  Interpretation of servitude.</p>
<p align="justify" class="A0002">Doubt as to the existence, extent, or manner of exercise of a predial servitude shall be resolved in favor of the servient estate.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
