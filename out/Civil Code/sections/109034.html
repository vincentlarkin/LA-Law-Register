<h1>CC 1798 - Obligation subject to condition or term</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109034">https://www.legis.la.gov/legis/Law.aspx?d=109034</a></div>
<p align="justify" class="A0001">Art. 1798.  Obligation subject to condition or term</p>
<p align="justify" class="A0002">An obligation may be solidary though for one of the obligors it is subject to a condition or term.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
