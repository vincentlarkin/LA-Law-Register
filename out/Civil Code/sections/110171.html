<h1>CC 3123 - Award null after time limit.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110171">https://www.legis.la.gov/legis/Law.aspx?d=110171</a></div>
<p align="justify" class="A0001">Art. 3123.  Award null after time limit.</p>
<p align="justify" class="A0002">The arbitrators ought to give their award within the time limited by the submission, and it would be null if it were given after the time is expired.</p>
<p align="justify" class="A0003"><br/></p>
