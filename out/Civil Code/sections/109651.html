<h1>CC 2595 - Peremption of action for lesion</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109651">https://www.legis.la.gov/legis/Law.aspx?d=109651</a></div>
<p align="justify" class="A0001">Art. 2595.  Peremption of action for lesion</p>
<p align="justify" class="A0002">The action for lesion must be brought within a peremptive period of one year from the time of the sale.</p>
<p align="justify" class="A0002">Acts 1993, No. 841, §1, eff. Jan. 1, 1995.</p>
