<h1>CC 1297 - Stipulations against partition.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108647">https://www.legis.la.gov/legis/Law.aspx?d=108647</a></div>
<p align="justify" class="A0001">Art. 1297.  Stipulations against partition.</p>
<p align="justify" class="A0002">It can not be stipulated that there never shall be a partition of a succession or of a thing held in common.  Such a stipulation would be null and of no effect.</p>
