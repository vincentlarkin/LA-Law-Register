<h1>CC 3232 - Innkeepers, definition.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110282">https://www.legis.la.gov/legis/Law.aspx?d=110282</a></div>
<p align="center" class="A0001"> §6--OF THE PRIVILEGE OF THE INNKEEPER ON THE</p>
<p align="center" class="A0001">EFFECTS OF THE TRAVELER</p>
<p align="justify" class="A0002">Art. 3232.  Innkeepers, definition.</p>
<p align="justify" class="A0003">Those are called innkeepers, who keep a tavern or hotel, and make a business of lodging travelers.</p>
