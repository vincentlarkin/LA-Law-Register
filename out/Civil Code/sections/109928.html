<h1>CC 29 - Age of majority</h1>

<p align="justify" class="A0001">Art. 29.  Age of majority </p>
<p align="justify" class="A0002">Majority is attained upon reaching the age of eighteen years.</p>
<p align="justify" class="A0002">Acts 1987, No. 125, §1, eff. Jan. 1.  1988.</p>
