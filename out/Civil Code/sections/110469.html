<h1>CC 3446 - Acquisitive prescription</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110469">https://www.legis.la.gov/legis/Law.aspx?d=110469</a></div>
<p align="justify" class="A0001">Art. 3446.  Acquisitive prescription </p>
<p align="justify" class="A0002">Acquisitive prescription is a mode of acquiring ownership or other real rights by possession for a period of time.</p>
<p align="justify" class="A0002">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
