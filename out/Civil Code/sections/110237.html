<h1>CC 3188 - Concurrent privileges.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110237">https://www.legis.la.gov/legis/Law.aspx?d=110237</a></div>
<p align="justify" class="A0001">Art. 3188.  Concurrent privileges.</p>
<p align="justify" class="A0002">The creditors who are in the same rank of privileges, are paid in concurrence, that is on an equal footing.*</p>
<p align="justify" class="A0003">*"That is on an equal footing" has no counterpart in French text.</p>
