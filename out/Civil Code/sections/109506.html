<h1>CC 2463 - Expenses</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109506">https://www.legis.la.gov/legis/Law.aspx?d=109506</a></div>
<p align="justify" class="A0001">Art. 2463.  Expenses</p>
<p align="justify" class="A0002">The expenses of the act and other expenses incidental to the sale must be borne by the buyer.</p>
<p align="justify" class="A0002">Acts 1993, No. 841, §1, eff. Jan. 1, 1995.</p>
