<h1>CC 3 - Custom</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110037">https://www.legis.la.gov/legis/Law.aspx?d=110037</a></div>
<p align="justify" class="A0001">Art. 3.  Custom </p>
<p align="justify" class="A0002">Custom results from practice repeated for a long time and generally accepted as having acquired the force of law.  Custom may not abrogate legislation.</p>
<p align="justify" class="A0002">Acts 1987, No. 124, §1, eff. Jan. 1, 1988.</p>
