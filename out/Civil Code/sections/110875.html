<h1>CC 681</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110875">https://www.legis.la.gov/legis/Law.aspx?d=110875</a></div>
<p align="justify" class="A0001">Art 681.  Opening in common wall.</p>
<p align="justify" class="A0002">The co-owner of a common wall may not make any opening in the wall without the consent of his neighbor.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
