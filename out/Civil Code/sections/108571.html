<h1>CC 122 - Nature of action</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108571">https://www.legis.la.gov/legis/Law.aspx?d=108571</a></div>
<p align="justify" class="A0001">Art. 122.  Nature of action </p>
<p align="justify" class="A0002">The claim for contributions made to the education or training of a spouse is strictly personal to each party.</p>
<p align="justify" class="A0002">Acts 1990, No. 1008, §2, eff. Jan. 1, 1991.</p>
