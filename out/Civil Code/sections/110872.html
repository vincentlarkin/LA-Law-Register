<h1>CC 678 - Cost of repairs.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110872">https://www.legis.la.gov/legis/Law.aspx?d=110872</a></div>
<p align="justify" class="A0001">Art. 678.  Cost of repairs.</p>
<p align="justify" class="A0002">Necessary repairs to a common wall, including partial rebuilding, are to be made at the expense of those who own it in proportion to their interests.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.</p>
