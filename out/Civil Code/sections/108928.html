<p align="justify" class="A0001">Art. 1600.  Particular legacies; preference of payment</p>
<p align="justify" class="A0002">A particular legacy must be discharged in preference to all others.</p>
<p align="justify" class="A0002">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
