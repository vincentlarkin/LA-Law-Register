<h1>CC 365 - Emancipation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110581">https://www.legis.la.gov/legis/Law.aspx?d=110581</a></div>
<p align="center" class="A0001">CHAPTER 2.  EMANCIPATION</p>
<p align="justify" class="A0002">Art. 365.  Emancipation</p>
<p align="justify" class="A0003">There are three kinds of emancipation: judicial emancipation, emancipation by marriage, and limited emancipation by authentic act.</p>
<p align="justify" class="A0003">Acts 2008, No. 786, §1, eff. Jan. 1, 2009.</p>
