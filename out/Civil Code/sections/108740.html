<h1>CC 1386 - Eviction through fault of coheir.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108740">https://www.legis.la.gov/legis/Law.aspx?d=108740</a></div>
<p align="justify" class="A0001">Art. 1386.  Eviction through fault of coheir.</p>
<p align="justify" class="A0002">The warranty ceases, if it be by the fault of the coheir, that he has suffered the eviction.</p>
