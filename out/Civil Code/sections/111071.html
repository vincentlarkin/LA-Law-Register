<h1>CC 943 - Reconciliation or forgiveness</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111071">https://www.legis.la.gov/legis/Law.aspx?d=111071</a></div>
<p align="justify" class="A0001">Art. 943.  Reconciliation or forgiveness</p>
<p align="justify" class="A0002">A successor shall not be declared unworthy if he proves reconciliation with or forgiveness by the decedent.</p>
<p align="justify" class="A0002">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
