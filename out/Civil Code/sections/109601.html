<h1>CC 2549 - Obligations of the buyer</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109601">https://www.legis.la.gov/legis/Law.aspx?d=109601</a></div>
<p align="center" class="A0001">CHAPTER 10.  OF THE OBLIGATIONS OF THE BUYER</p>
<p align="justify" class="A0002">Art. 2549.  Obligations of the buyer</p>
<p align="justify" class="A0003">The buyer is bound to pay the price and to take delivery of the thing.</p>
<p align="justify" class="A0003">Acts 1993, No. 841, §1, eff. Jan. 1, 1995.</p>
