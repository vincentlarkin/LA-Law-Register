<h1>CC 640 - Content of the servitude.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110834">https://www.legis.la.gov/legis/Law.aspx?d=110834</a></div>
<p align="justify" class="A0001">Art. 640.  Content of the servitude.</p>
<p align="justify" class="A0002">The right of use may confer only an advantage that may be established by a predial servitude.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
