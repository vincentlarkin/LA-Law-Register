<h1>CC 469 - Transfer or encumbrance of immovable.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110645">https://www.legis.la.gov/legis/Law.aspx?d=110645</a></div>
<p align="justify" class="A0001">Art. 469.  Transfer or encumbrance of immovable.</p>
<p align="justify" class="A0002">The transfer or encumbrance of an immovable includes its component parts.</p>
<p align="justify" class="A0002">Acts 1978, No. 728, §1.  Amended by Acts 1979, No. 180, §2.</p>
