<h1>CC 542 - Divisibility of naked ownership.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110729">https://www.legis.la.gov/legis/Law.aspx?d=110729</a></div>
<p align="justify" class="A0001">Art. 542.  Divisibility of naked ownership.</p>
<p align="justify" class="A0002">The naked ownership may be partitioned subject to the rights of the usufructuary.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
