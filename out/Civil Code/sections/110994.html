<h1>CC 799 - Liability of a co-owner</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110994">https://www.legis.la.gov/legis/Law.aspx?d=110994</a></div>
<p align="justify" class="A0001">Art. 799.  Liability of a co-owner </p>
<p align="justify" class="A0002">A co-owner is liable to his co-owner for any damage to the thing held in indivision caused by his fault.</p>
<p align="justify" class="A0002">Acts 1990, No. 990, §1, eff. Jan. 1, 1991.</p>
