<h1>CC 479 - Necessity of a person.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110656">https://www.legis.la.gov/legis/Law.aspx?d=110656</a></div>
<p align="justify" class="A0001">Art. 479.  Necessity of a person.</p>
<p align="justify" class="A0002">The right of ownership may exist only in favor of a natural person or a juridical person.</p>
<p align="justify" class="A0002">Acts 1979, No. 180, §1.</p>
