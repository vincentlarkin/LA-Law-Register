<h1>CC 739 - Acquisition by title only.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110934">https://www.legis.la.gov/legis/Law.aspx?d=110934</a></div>
<p align="justify" class="A0001">Art. 739.  Acquisition by title only.</p>
<p align="justify" class="A0002">Nonapparent servitudes may be acquired by title only, including a declaration of destination under Article 741.</p>
<p align="justify" class="A0002">Acts 1977, No. 514, §1.  Amended by Acts 1978, No. 479, §1.</p>
