<h1>CC 178 - Definition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=669805">https://www.legis.la.gov/legis/Law.aspx?d=669805</a></div>
<p align="center" class="A0001">TITLE VII.  PARENT AND CHILD</p>
<p align="center" class="A0001">CHAPTER 1.  FILIATION</p>
<p align="justify" class="A0002">Art. 178.  Definition</p>
<p align="justify" class="A0003">Filiation is the legal relationship between a child and his parent.</p>
<p align="justify" class="A0003">Acts 2009, No. 3, §1, eff. June 9, 2009.</p>
