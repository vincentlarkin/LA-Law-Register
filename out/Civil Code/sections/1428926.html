<p style="text-align:left; text-indent: -0.5in; margin-left: 0.5in"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt">Art. 15.  Use of number</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>Unless the context indicates otherwise, words used in the singular include the plural,
and the plural includes the singular.</span></span></p>
<p style="text-align:left"><span style="font-family: 'Times New Roman', serif"><span style="font-size: 12pt"><span>            </span>Acts 2025, No. 488, §1.</span></span></p>
