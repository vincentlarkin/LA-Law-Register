<h1>CC 1863 - Expenses</h1>

<p align="justify" class="A0001">Art. 1863.  Expenses</p>
<p align="justify" class="A0002">Expenses that may be required to render performance shall be borne by the obligor.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
