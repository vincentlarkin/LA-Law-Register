<h1>CC 961 - Effect of acceptance</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111091">https://www.legis.la.gov/legis/Law.aspx?d=111091</a></div>
<p align="justify" class="A0001">Art. 961.  Effect of acceptance</p>
<p align="justify" class="A0002">Acceptance obligates the successor to pay estate debts in accordance with the provisions of this Title and other applicable laws.</p>
<p align="justify" class="A0002">Acts 1997, No. 1421, §1, eff. July 1, 1999.</p>
