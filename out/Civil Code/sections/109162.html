<p align="justify" class="A0001">Art. 1915.  Rules applicable to all contracts</p>
<p align="justify" class="A0002">All contracts, nominate and innominate, are subject to the rules of this title.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
