<h1>CC 3009 - Liability of multiple mandataries</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110049">https://www.legis.la.gov/legis/Law.aspx?d=110049</a></div>
<p align="justify" class="A0001">Art. 3009.  Liability of multiple mandataries</p>
<p align="justify" class="A0002">Multiple mandataries are not solidarily liable to their common principal, unless the mandate provides otherwise.</p>
<p align="justify" class="A0002">Acts 1997, No. 261, §1, eff. Jan. 1, 1998.</p>
