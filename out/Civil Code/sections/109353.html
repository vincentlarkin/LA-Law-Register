<h1>CC 2300 - Obligation that does not exist</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109353">https://www.legis.la.gov/legis/Law.aspx?d=109353</a></div>
<p align="justify" class="A0001">Art. 2300.  Obligation that does not exist</p>
<p align="justify" class="A0002">A thing is not owed when it is paid or delivered for the discharge of an obligation that does not exist.</p>
<p align="justify" class="A0002">Acts 1995, No. 1041, §1, eff. Jan. 1, 1996.</p>
