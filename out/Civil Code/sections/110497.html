<h1>CC 3474 - Incompetents</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110497">https://www.legis.la.gov/legis/Law.aspx?d=110497</a></div>
<p align="justify" class="A0001">Art. 3474.  Incompetents </p>
<p align="justify" class="A0002">This prescription runs against absent persons and incompetents, including minors and interdicts.</p>
<p align="justify" class="A0002">Acts 1982, No. 187, §1, eff. Jan. 1, 1983; Acts 1991, No. 107, §1. </p>
