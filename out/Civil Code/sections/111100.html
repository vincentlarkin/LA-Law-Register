<h1>CC 97 - Civil effects of relatively null marriage</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111100">https://www.legis.la.gov/legis/Law.aspx?d=111100</a></div>
<p align="justify" class="A0001">Art. 97.  Civil effects of relatively null marriage </p>
<p align="justify" class="A0002">A relatively null marriage produces civil effects until it is declared null.</p>
<p align="justify" class="A0002">Acts 1987, No. 886, §1, eff., Jan. 1, 1988.</p>
