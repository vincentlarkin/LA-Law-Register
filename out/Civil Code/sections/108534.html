<h1>CC 104 - Reconciliation</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108534">https://www.legis.la.gov/legis/Law.aspx?d=108534</a></div>
<p align="justify" class="A0001">Art. 104.  Reconciliation </p>
<p align="justify" class="A0002">The cause of action for divorce is extinguished by the reconciliation of the parties.</p>
<p align="justify" class="A0002">Amended by Acts 1979, No. 677, §1; Acts 1980, No. 351, §1; Acts 1990, No. 1009, §2, eff. Jan. 1, 1991.</p>
