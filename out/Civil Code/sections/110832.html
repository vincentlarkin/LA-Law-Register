<h1>CC 638 - Duration of habitation.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110832">https://www.legis.la.gov/legis/Law.aspx?d=110832</a></div>
<p align="justify" class="A0001">Art. 638.  Duration of habitation.</p>
<p align="justify" class="A0002">The right of habitation terminates at the death of the person having it unless a shorter period is stipulated.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
