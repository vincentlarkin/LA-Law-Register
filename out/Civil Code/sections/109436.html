<h1>CC 2362 - Alimentary obligation.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109436">https://www.legis.la.gov/legis/Law.aspx?d=109436</a></div>
<p align="justify" class="A0001">Art. 2362.  Alimentary obligation.</p>
<p align="justify" class="A0002">An alimentary obligation imposed by law on a spouse is deemed to be a community obligation.</p>
<p align="justify" class="A0002">Acts 1979, No. 709, §1.</p>
