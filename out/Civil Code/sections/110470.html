<h1>CC 3447 - Liberative prescription</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110470">https://www.legis.la.gov/legis/Law.aspx?d=110470</a></div>
<p align="justify" class="A0001">Art. 3447.  Liberative prescription </p>
<p align="justify" class="A0002">Liberative prescription is a mode of barring of actions as a result of inaction for a period of time.</p>
<p align="justify" class="A0002">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
