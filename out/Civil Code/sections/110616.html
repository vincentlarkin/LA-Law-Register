<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110616">https://www.legis.la.gov/legis/Law.aspx?d=110616</a></div>
<p align="justify" class="A0001">Art. 40.  Domicile of spouses</p>
<p align="justify" class="A0002">Spouses may have either a common domicile or separate domiciles.</p>
<p align="justify" class="A0002">Acts 2008, No. 801, §1, eff. Jan. 1, 2009.</p>
