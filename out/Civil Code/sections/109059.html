<h1>CC 1820 - Solidarity is not indivisibility</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109059">https://www.legis.la.gov/legis/Law.aspx?d=109059</a></div>
<p align="justify" class="A0001">Art. 1820.  Solidarity is not indivisibility</p>
<p align="justify" class="A0002">A stipulation of solidarity does not make an obligation indivisible.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
