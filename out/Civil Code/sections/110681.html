<p align="justify" class="A0001">Art. 5.  Ignorance of law </p>
<p align="justify" class="A0002">No one may avail himself of ignorance of the law.</p>
<p align="justify" class="A0002">Acts 1987, No. 124, §1, eff. Jan. 1, 1988.</p>
