<h1>CC 2893 - Things that may be lent</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109921">https://www.legis.la.gov/legis/Law.aspx?d=109921</a></div>
<p align="justify" class="A0001">Art. 2893.  Things that may be lent</p>
<p align="justify" class="A0002">Any nonconsumable thing that is susceptible of ownership may be the object of a loan for use.</p>
<p align="justify" class="A0002">Acts 2004, No. 743, §1, eff. Jan. 1, 2005.</p>
