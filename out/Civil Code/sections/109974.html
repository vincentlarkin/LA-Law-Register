<h1>CC 2942 - Innkeeper as compensated depositary</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109974">https://www.legis.la.gov/legis/Law.aspx?d=109974</a></div>
<p align="justify" class="A0001">Art. 2942.  Innkeeper as compensated depositary</p>
<p align="justify" class="A0002">An innkeeper is a compensated depositary as to things that guests deliver to him for safekeeping.</p>
<p align="justify" class="A0002">Acts 2003, No. 491, §1, eff. Jan. 1, 2004.</p>
