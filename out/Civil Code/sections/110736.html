<h1>CC 549 - Capacity to receive usufruct</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110736">https://www.legis.la.gov/legis/Law.aspx?d=110736</a></div>
<p align="justify" class="A0001">Art. 549.  Capacity to receive usufruct</p>
<p align="justify" class="A0002">Usufruct may be established in favor of a natural person or a juridical person.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1; Acts 2010, No. 881, §1, eff. July 2, 2010.</p>
