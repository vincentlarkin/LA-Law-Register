<h1>CC 1763 - Definition</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=108997">https://www.legis.la.gov/legis/Law.aspx?d=108997</a></div>
<p align="center" class="A0001">CHAPTER 3.  KINDS OF OBLIGATIONS</p>
<p align="center" class="A0001">SECTION 1.  REAL OBLIGATIONS</p>
<p align="justify" class="A0002">Art. 1763.  Definition</p>
<p align="justify" class="A0003">A real obligation is a duty correlative and incidental to a real right.</p>
<p align="justify" class="A0003">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
