<h1>CC 554 - Commencement of the right to fruits.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110742">https://www.legis.la.gov/legis/Law.aspx?d=110742</a></div>
<p align="justify" class="A0001">Art. 554.  Commencement of the right to fruits.</p>
<p align="justify" class="A0002">The usufructuary's right to fruits commences on the effective date of the usufruct.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
