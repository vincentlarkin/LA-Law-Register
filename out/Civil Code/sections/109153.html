<h1>CC 1907 - Unilateral contracts</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109153">https://www.legis.la.gov/legis/Law.aspx?d=109153</a></div>
<p align="justify" class="A0001">Art. 1907.  Unilateral contracts</p>
<p align="justify" class="A0002">A contract is unilateral when the party who accepts the obligation of the other does not assume a reciprocal obligation.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
