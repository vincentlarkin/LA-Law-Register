<h1>CC 98 - Mutual duties of married persons</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=111101">https://www.legis.la.gov/legis/Law.aspx?d=111101</a></div>
<p align="center" class="A0001">CHAPTER 3.  INCIDENTS AND EFFECTS OF MARRIAGE </p>
<p align="justify" class="A0002">Art. 98.  Mutual duties of married persons </p>
<p align="justify" class="A0003">Married persons owe each other fidelity, support, and assistance.</p>
<p align="justify" class="A0003">Acts 1987, No. 886, §1, eff. Jan. 1, 1988.</p>
