<h1>CC 3273 - Recordation, effect against third persons.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110323">https://www.legis.la.gov/legis/Law.aspx?d=110323</a></div>
<p align="justify" class="A0001">Art. 3273.  Recordation, effect against third persons.</p>
<p align="justify" class="A0002">Privileges are valid against third persons, from the date of the recording of the act or evidence of indebtedness as provided by law.</p>
