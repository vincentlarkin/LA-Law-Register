<h1>CC 2906 - Loan of nonfungible things</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109935">https://www.legis.la.gov/legis/Law.aspx?d=109935</a></div>
<p align="justify" class="A0001">Art. 2906.  Loan of nonfungible things</p>
<p align="justify" class="A0002">A loan of a nonfungible thing, in the absence of contrary agreement, is not a loan for consumption, but is a loan for use.</p>
<p align="justify" class="A0002">Acts 2004, No. 743, §1, eff. Jan. 1, 2005.</p>
