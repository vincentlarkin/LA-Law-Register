<h1>CC 3441 - Transfer of possession</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110464">https://www.legis.la.gov/legis/Law.aspx?d=110464</a></div>
<p align="center" class="A0001">SECTION 5.  TRANSFER, TACKING, AND PROOF OF POSSESSION</p>
<p align="justify" class="A0002">Art. 3441.  Transfer of possession </p>
<p align="justify" class="A0003">Possession is transferable by universal title or by particular title.</p>
<p align="justify" class="A0003">Acts 1982, No. 187, §1, eff. Jan. 1, 1983.</p>
