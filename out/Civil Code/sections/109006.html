<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=109006">https://www.legis.la.gov/legis/Law.aspx?d=109006</a></div>
<p align="justify" class="A0001">Art. 1772.  Fault of a party</p>
<p align="justify" class="A0002">A condition is regarded as fulfilled when it is not fulfilled because of the fault of a party with an interest contrary to the fulfillment.</p>
<p align="justify" class="A0002">Acts 1984, No. 331, §1, eff. Jan. 1, 1985.</p>
