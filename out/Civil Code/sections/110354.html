<h1>CC 3304 - Judgment; suspensive appeal</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110354">https://www.legis.la.gov/legis/Law.aspx?d=110354</a></div>
<p align="justify" class="A0001">Art. 3304.  Judgment; suspensive appeal </p>
<p align="justify" class="A0002">A judicial mortgage is not affected or suspended by a suspensive appeal or stay of execution of the judgment.</p>
<p align="justify" class="A0002">Acts 1992, No. 1132, §2, eff. Jan. 1, 1993.</p>
