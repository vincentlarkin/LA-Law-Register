<h1>CC 576 - Standard of care.</h1>
<div class="src"><a href="https://www.legis.la.gov/legis/Law.aspx?d=110766">https://www.legis.la.gov/legis/Law.aspx?d=110766</a></div>
<p align="justify" class="A0001">Art. 576.  Standard of care.</p>
<p align="justify" class="A0002">The usufructuary is answerable for losses resulting from his fraud, default, or neglect.</p>
<p align="justify" class="A0002">Acts 1976, No. 103, §1.</p>
